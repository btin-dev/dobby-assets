<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blockstream Help Center — Full Mockup (App + Jade)</title>
<link rel="stylesheet" href="https://use.typekit.net/ejl7etf.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--blue:#00BCFF;--ink:#1a1a1a;--body:#33373b;--chip:#d6ecfb;--chipink:#0a5c80;--active:#eaf6ff;}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,-apple-system,sans-serif;color:var(--body);background:#fff;font-weight:300}
a{color:var(--blue);text-decoration:none}a:hover{color:#fff}
.content a{color:var(--blue)}.content a:hover{color:var(--ink)}
header{background:#0b0d0f;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:84px;position:sticky;top:0;z-index:10}
header .logo{height:30px}
nav.top{display:flex;gap:34px;align-items:center}
nav.top a{font-family:"rigid-square",Inter,sans-serif;color:#fff;font-weight:500;font-size:15px;letter-spacing:.02em}
nav.top a:hover{color:var(--blue)}
.acct{width:46px;height:38px;border:1px solid #3a4047;border-radius:7px;display:flex;align-items:center;justify-content:center}
.acct svg{width:18px;height:18px;stroke:#cfd6dd}
.wrap{max-width:1480px;margin:0 auto;padding:34px 48px 120px}
.catbar{display:flex;gap:10px;margin-bottom:26px}
.catbar button{font-family:"rigid-square",Inter,sans-serif;font-size:15px;font-weight:500;letter-spacing:.02em;color:#5a636b;background:#f3f6f8;border:1px solid #e4e9ec;border-radius:9px;padding:11px 20px;cursor:pointer}
.catbar button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.crumb{font-size:14px;color:#9aa3ab;margin-bottom:30px}
.crumb a{color:var(--blue)}.crumb span.sep{margin:0 10px;color:#c4ccd3}
.layout{display:grid;grid-template-columns:300px 1fr;gap:80px;align-items:start}
.side{position:sticky;top:108px;max-height:calc(100vh-130px);overflow-y:auto}
.side .secname{font-family:"rigid-square",Inter,sans-serif;font-weight:500;color:var(--ink);font-size:14px;line-height:1.3;margin:22px 0 8px;letter-spacing:.01em}
.side .secname:first-child{margin-top:0}
.side a{display:block;padding:8px 14px;border-radius:8px;color:#3c444b;font-size:14px;margin-bottom:1px;cursor:pointer;line-height:1.35}
.side a:hover{background:#f3f6f8;color:var(--ink)}
.side a.active{background:var(--active);color:var(--blue);font-weight:500}
/* article body */
.content{min-width:0}
.content h1{font-family:"rigid-square",Inter,sans-serif;font-weight:500;color:var(--ink);font-size:42px;margin:0 0 26px;line-height:1.12}
.content h2{font-family:"rigid-square",Inter,sans-serif;font-weight:500;color:var(--ink);font-size:28px;margin:44px 0 16px}
.content h3{font-family:"rigid-square",Inter,sans-serif;font-weight:500;color:var(--ink);font-size:21px;margin:32px 0 12px}
.content p{font-size:17px;line-height:1.75;margin:0 0 18px;font-weight:300}
.content strong{font-weight:600;color:var(--ink)}
.content em{font-style:italic}
.content ul,.content ol{margin:0 0 20px;padding-left:24px}
.content li{font-size:17px;line-height:1.7;margin-bottom:9px;font-weight:300}
.content a{word-break:break-word}
/* numbered custom steps */
.content .num-list-custom{display:flex;gap:16px;align-items:flex-start;margin:0 0 14px}
.content .num-list-custom .num-list{flex:0 0 auto;width:30px;height:30px;background:#eef2f5;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;color:var(--ink);margin:0}
.content .num-list-custom .num-list-text{margin:0;font-size:17px;line-height:1.7;font-weight:300;padding-top:3px}
/* callouts */
.content blockquote{margin:0 0 24px;padding:16px 20px;border-radius:10px;font-size:16px;line-height:1.7}
.content blockquote.note{background:#f6f8fa;color:#566069}
.content blockquote.note,.content blockquote.tip{background:#f6f8fa;color:#566069}
.content blockquote.warning{background:#fdecea}
.content blockquote.warning strong{color:#c0392b}
.content blockquote p:last-child{margin-bottom:0}
.content div.callout{margin:0 0 24px;padding:16px 20px;border-radius:10px;background:#fdecea}
/* figures / images */
.content figure{margin:26px auto;text-align:center;max-width:960px}
.content figure img{max-width:100%;max-height:820px;width:auto;height:auto;display:block;margin:0 auto}
.content figure.image.grp img,.content figure.image img{max-width:100%}
.content figure.wysiwyg-image{max-width:340px}
.content figure figcaption{font-size:13px;color:#8a929a;margin-top:8px;font-style:italic}
.content p.wysiwyg-text-align-center{text-align:center}
/* tables */
.content table{border-collapse:collapse;width:100%;margin:0 0 22px;font-size:15px}
.content td,.content th{border:1px solid #e4e9ec;padding:10px 13px;text-align:left;line-height:1.6}
.content figure.table{max-width:100%}
.content .mobile_table_scroll{overflow-x:auto}
/* code + video */
.content pre{background:#f6f8fa;border-radius:8px;padding:14px 16px;overflow-x:auto;font-size:14px;margin:0 0 22px}
.content code{font-family:Inter,sans-serif;background:#f1f4f6;padding:2px 6px;border-radius:4px;font-size:14px;font-variant-numeric:tabular-nums}
.content pre code{background:none;padding:0}
.content .video-iframe,.content iframe{max-width:100%;margin:0 0 22px}
.content iframe.responsive-iframe{width:100%;aspect-ratio:16/9;height:auto}
.content span.wysiwyg-underline{text-decoration:underline}
.emptymsg{color:#9aa3ab;font-size:16px;font-style:italic;padding:30px 0}
@media(max-width:980px){.layout{grid-template-columns:1fr;gap:34px}.side{position:static;max-height:none}nav.top{display:none}}
</style></head><body>

p__fix-issues-with-recovery-phrase-entry", "app__fix-invalid-address-error", "app__fix-insufficient-funds-error", "app__fix-issues-with-unexpected-wallet-balance", "app__lost-access-to-2fa-method", "app__submit-log-data-for-troubleshooting"]}, {"name": "FAQs", "articles": ["app__why-do-i-have-to-pay-transaction-fees-and-why-are-they-sometimes-high", "app__why-is-my-transaction-taking-so-long-to-confirm", "app__why-does-my-receive-address-keep-changing", "app__what-is-a-recovery-phrase", "app__how-is-my-software-wallet-security-different-from-jades", "app__how-does-the-blockstream-app-generate-my-recovery-phrase", "app__what-is-pseudonymous-data-collection-and-how-is-it-used", "app__what-are-blockstreams-official-social-channels"]}]}, "Blockstream Jade": {"crumb": "Blockstream Jade", "sections": [{"name": "Set Up, Transact, & Recover Your Wallet", "articles": ["jade__jade-overview", "jade__download-a-companion-app-for-jade", "jade__update-jade-firmware", "jade__set-up-jade", "jade__connect-jade-to-a-companion-app", "jade__receive-bitcoin-using-jade", "jade__send-bitcoin-using-jade", "jade__verify-your-recovery-phrase", "jade__restore-recovery-phrase-to-jade", "jade__perform-a-genuine-check-with-jade", "jade__migrate-to-jade-from-another-hardware-wallet", "jade__set-up-watch-only-access-for-jade"]}, {"name": "Use Jade Air-Gapped", "articles": ["jade__air-gapped-jade-plus-setup", "jade__perform-an-air-gapped-firmware-upgrade", "jade__create-a-seedqr-from-my-recovery-phrase", "jade__seedqr-vs-qr-pin-unlock", "jade__access-jade-air-gapped-with-qr-pin-unlock", "jade__access-jade-plus-air-gapped-with-seedqr", "jade__add-jade-plus-to-an-air-gap-supported-app", "jade__verify-receive-addresses-with-an-air-gapped-jade-plus", "jade__send-air-gapped-bitcoin-transactions-via-qr", "jade__send-air-gapped-bitcoin-transactions-via-jadelink", "jade__supported-air-gapped-functionality-via-qr", "jade__supported-air-gapped-functionality-via-jadelink"]}, {"name": "Add More Security & Functionality", "articles": ["jade__enable-swaps-with-jade", "jade__enable-a-duress-pin", "jade__use-jade-as-a-stateless-signing-device", "jade__use-jade-as-a-2fa-authentication-device", "jade__use-jade-as-a-bitcoin-miner", "jade__use-jade-with-testnet", "jade__add-a-bip39-passphrase-for-jade", "jade__create-a-bip85-child-recovery-phrase", "jade__create-a-recovery-phrase-using-dice", "jade__calculate-the-final-word-from-a-provided-recovery-phrase-entry", "jade__back-up-a-multisig-configuration-on-jade", "jade__disable-bluetooth", "jade__manually-verify-firmware-binary", "jade__set-up-a-personal-blind-oracle", "jade__set-up-a-personal-blind-oracle-with-umbrel", "jade__use-cases-for-temporary-signer"]}, {"name": "Use Jade with Third-Party Apps", "articles": ["jade__best-platforms-for-jade-plus-qr-scan", "jade__compatible-services-with-jade", "jade__use-jade-with-electrum", "jade__use-jade-plus-qr-scan-with-nunchuk", "jade__use-jade-plus-qr-scan-with-specter", "jade__use-jade-plus-qr-scan-with-bluewallet", "jade__use-jade-with-nunchuk-honey-badger-wallet", "jade__use-jade-qr-scan-with-sparrow", "jade__use-jade-with-sparrow"]}, {"name": "Troubleshooting", "articles": ["jade__fix-issues-upgrading-jade", "jade__fix-issues-connecting-jade-via-usb", "jade__fix-issues-pairing-jade-via-bluetooth", "jade__fix-issues-scanning-qr-codes", "jade__perform-a-factory-reset", "jade__use-ledger-nano-with-blockstream-app"]}, {"name": "FAQs", "articles": ["jade__how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle", "jade__why-doesnt-jade-have-a-secure-element", "jade__jade-security-model-faqs", "jade__blockstream-jade-vs-blockstream-app", "jade__how-does-a-passphrase-work-on-jade", "jade__how-does-jade-generate-my-recovery-phrase", "jade__how-do-i-set-up-a-wallet-erase-pin", "jade__what-is-anti-exfil-and-how-does-it-work", "jade__what-is-a-seedqr", "jade__what-is-exporting-a-child-key-from-jade", "jade__what-is-the-wallet-id-shown-on-the-jade-home-screen", "jade__should-i-export-the-master-blinding-key", "jade__blockstream-jade-quickstart-guide-for-ios", "jade__blockstream-jade-quickstart-guide-for-android", "jade__blockstream-jade-quickstart-guide-for-desktop", "jade__how-do-lightning-accounts-work-with-my-jade", "jade__which-xpub-export-settings-should-i-use"]}]}};const ART={"app__set-up-a-new-wallet": {"title": "Set up a new wallet", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>The Blockstream app (formerly Blockstream Green) allows you to set up a bitcoin wallet with just a few taps. Following the standard setup flow, you will create a mobile wallet with private keys stored on your mobile device. This is ideal for beginners with smaller amounts of bitcoin and for those looking for easy, convenient spending.</p><h2>Set up a new wallet</h2><figure class=\"image grp\"><img src=\"_setup-section/set-up-a-new-wallet_group-1.png\" alt=\"\"></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Open the Blockstream app and select <strong>Get Started</strong> to create a new mobile (software) wallet.</p></div><p></p><blockquote class=\"note\"><p><strong>Note:</strong> If you have a <a href=\"https://store.blockstream.com/collections/physical-storage\" target=\"_blank\" rel=\"noopener noreferrer\">Jade hardware device</a>, choose <strong>Connect Jade</strong> instead to get set up.</p></blockquote><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Tap <strong>Setup Mobile Wallet</strong> to create a new Bitcoin wallet. By default, the Blockstream app will secure your wallet with your device biometrics and prompt a biometrics scan at this time (i.e. FaceID). If biometrics are not enabled or the app does not have permission, you can set up a PIN instead.</p></div><p></p><blockquote><p><strong>Tip:</strong> If you'd like to use a recovery phrase that you've already generated from another wallet, select <strong>Restore from backup</strong>.</p></blockquote><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">The Blockstream app will then generate your private keys. Tap <strong>Continue</strong> to proceed.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Your wallet is now ready for use! You can begin purchasing, receiving, and sending bitcoin.</p></div><p></p><blockquote class=\"warning\"><p><strong>Warning:</strong> At this point, the keys to your bitcoin wallet are only stored on this device. <strong>If you lose or break this phone, there is no way to access your funds unless you have </strong><a href=\"https://help.blockstream.com/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet#entry:283@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>backed up your recovery phrase</strong></a><strong>.</strong></p></blockquote>"}, "app__back-up-wallet": {"title": "Back up wallet", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>After setting up your wallet, the keys to your bitcoin are stored solely on your mobile device. This means if you lose or break your phone, you will lose access to your funds unless you\u2019ve backed up your recovery phrase.</p><p>\"Backing up\" simply means <strong>writing down your recovery phrase</strong> and storing it somewhere safe and offline. Your recovery phrase is the only way to restore your wallet and access your bitcoin if something happens to your device.</p><blockquote class=\"warning\"><p><strong>Warning: Your recovery phrase is your wallet</strong>. Anyone who has it can spend your funds. Never share it and keep it protected from theft, damage, and loss.</p></blockquote><figure class=\"image\"><img style=\"aspect-ratio:1542/902;\" src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/back-up-wallet_group-1_steps-1-3_v2.png#asset:7576:url\" width=\"1542\" height=\"902\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Log in to the Blockstream app and tap <strong>Security</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">If you have not yet performed a manual backup, you will see a warning to backup your wallet and write down your recovery phrase. Tap <strong>Backup Now</strong> on the notice to proceed. <strong>Backing up your recovery phrase is critical for your funds' security</strong>. You will also see this notice on other screens, such as Buy and Receive, until completing the backup process.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">After tapping Backup Now, the app will display your recovery phrase. Write it down carefully and store it somewhere safe. Remember, your recovery phrase is your wallet. <strong>Keep it offline and protected, and never give your recovery phrase to anyone.</strong></p></div><figure class=\"image\"><img style=\"aspect-ratio:1542/902;\" src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/back-up-wallet_group-2_steps-4-5_v2.png#asset:7577:url\" width=\"1542\" height=\"902\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">After writing down your recovery phrase, the app will perform a verification check to ensure that you wrote your recovery phrase down correctly and in the right order. Afterwards, you will be asked to create a PIN that you can use as an alternative to unlock your wallet.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">5.</p><p class=\"num-list-text\">After the process is complete, store your recovery phrase somewhere safe. If you ever need to restore your wallet, you can simple enter your recovery phrase to regain access.</p></div>"}, "app__restore-wallet": {"title": "Restore wallet", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>If you\u2019ve lost access to your wallet, you can restore it using your <strong>recovery phrase</strong>, so you can continue sending, receiving, and managing your funds as normal.</p><figure class=\"image\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/restore-wallet_group-1.png#asset:7673:url\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Open the Blockstream app and select <strong>Get Started</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Tap <strong>Restore from backup</strong> and retrieve your written recovery phrase.</p></div><figure class=\"image\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/restore-wallet_group-2.png#asset:7674:url\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Enter your recovery phrase in the correct order. If any word is not accepted, make sure to check for typos, or <a href=\"https://help.blockstream.com/blockstream-app/troubleshooting/fix-issues-with-recovery-phrase-entry#entry:592@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">refer to our troubleshooting guide</a>. When you are finished, tap <strong>Continue</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">If you entered the correct recovery phrase, you should see your full wallet balance after the restoration process is complete.</p></div>"}, "app__buy-bitcoin": {"title": "Buy bitcoin", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>The Blockstream app allows you to conveniently purchase bitcoin directly to self-custody, supported in both mobile and Jade wallets. A wide range of exchanges are supported to help users find the best price or a platform they are already registered with.</p><figure class=\"image\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/buy-bitcoin_group-1.png#asset:7669:url\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Log in to the Blockstream app and tap <strong>Buy Now</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.&nbsp;</p><p class=\"num-list-text\">Enter the amount of bitcoin you would like to purchase or tap one of the quick selection values. The default exchange displayed will be the best price currently available, however you can tap the <strong>Exchange</strong> field to change platforms to one that you may already be registered with. Once you are ready to continue, tap <strong>Buy Bitcoin</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">3.&nbsp;</p><p class=\"num-list-text\">The app will direct you to the third-party exchange to complete your purchase. After filling out the necessary fields and submitting payment, your bitcoin will be sent directly to your wallet.</p></div>"}, "app__receive-bitcoin": {"title": "Receive bitcoin", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>In order to receive bitcoin, you will need to generate an <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> with the Blockstream app and share it with the sender.</p><h1 id=\"h_01JATGSKD0SJYNF1YSR2HYC4B6\">Receive bitcoin</h1><figure class=\"image\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/receive-bitcoin_group-1.png#asset:7670:url\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Log in to the Blockstream app and tap <strong>Transact</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Select <strong>Receive</strong> from the available actions.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Share the address with the sender and wait for them to broadcast the transaction. You will see your new balance appear on the home screen once they have successfully done so.</p></div>"}, "app__send-bitcoin": {"title": "Send bitcoin", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>To send bitcoin using the Blockstream App, you\u2019ll need two things: a valid recipient <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> and enough funds in your wallet to cover both the amount you want to send and the network fee required to process the transaction.</p><h1 id=\"h_01JATGSKD0SJYNF1YSR2HYC4B6\">Send bitcoin</h1><figure class=\"image\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/send-bitcoin_group-1.png#asset:7671:url\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Log in to the Blockstream app and tap <strong>Transact</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Select <strong>Send</strong> from the available actions.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\"><strong>Paste</strong> the address of the recipient or tap <strong>Scan QR Code</strong>, then select <strong>Next</strong>.</p></div><figure class=\"image\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/send-bitcoin_group-2.png#asset:7672:url\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Enter the amount of bitcoin you would like to send, then choose <strong>Next</strong>. Select <strong>Change speed</strong> to adjust the fee you will pay depending on the transaction's urgency. Please note that this fee is paid to bitcoin miners, not Blockstream.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">5.</p><p class=\"num-list-text\">Confirm that the recipient address, amount, and network fee are as you intended, then <strong>Slide to Send</strong> to broadcast your transaction to the network.</p></div>"}, "app__change-mobile-wallet-security-settings": {"title": "Change mobile wallet security settings", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>The Blockstream app's <strong>Security</strong> tab allows you to change how you unlock your wallet, back up your recovery phrase, and more.</p><p class=\"wysiwyg-text-align-center\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/change-mobile-wallet-security-settings_phone.png#asset:7678:url\" alt=\"Security screen in the Blockstream app\" width=\"280\" /></p><p>On the Security screen, you can access your recovery phrase and alter your preferred unlock method:&nbsp;</p><ul><li data-list-item-id=\"ef1cc9e7c5036966209795b243b7217d2\"><strong>FaceID:</strong> If you'd like to use FaceID to unlock your wallet, make sure it is enabled in your device's system settings first. You must turn on FaceID at the operating system (OS) level for it to work within the app.</li><li data-list-item-id=\"ead5ca81e72308bb378a09773c38729c1\"><strong>PIN:</strong> The PIN is a locally stored security feature. It will not transfer across devices\u2014even if you're restoring your wallet on a new phone. You\u2019ll need to set up a new PIN after restoring with your recovery phrase.</li></ul><blockquote class=\"note\"><p><strong>Note:</strong> In addition to keeping your PIN number and recovery phrase hidden from others, it's also important to properly back them up for your own use. Remember, you will lose access to your bitcoin and other assets if you are unable to unlock your wallet and do not have access to your recovery phrase.</p></blockquote>"}, "app__rename-wallet": {"title": "Rename wallet", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<figure class=\"image\"><img style=\"aspect-ratio:1542/902;\" src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/rename-wallet_group-1.png#asset:7675:url\" width=\"1542\" height=\"902\" alt=\"\" /></figure><p>You can manage multiple separate wallets within the Blockstream app. It is useful to give each wallet its own unique name so you can differentiate one from another.</p><ul><li data-list-item-id=\"e23e8e14766f59f93e639d81c0b4e961e\"><a href=\"#h_01KQTBW49P67PXNN76A18ZNRZ4\">Rename Wallet on iOS</a></li><li data-list-item-id=\"ec2a2e910259c614f3414c641d8f5f001\"><a href=\"#h_01KQTBX2EQ5AW52EWARGXHP1SG\">Rename Wallet on Android</a></li></ul><h2 id=\"h_01KQTBW49P67PXNN76A18ZNRZ4\">Rename Wallet on iOS</h2><figure class=\"image\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/rename-wallet_group-1.png#asset:7675:url\" alt=\"\" /></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">From the <strong>My Wallets</strong> screen, swipe right on the wallet you would like to rename. Tap <strong>Rename</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">A pop-up window will appear where you can change your wallet name. Type your new wallet name in the provided text box and tap <strong>Submit</strong> to complete the process.</p></div><h2 id=\"h_01KQTBX2EQ5AW52EWARGXHP1SG\"><br>Rename Wallet on Android</h2><p>To rename your wallet on Android, open the wallet you want to rename, then navigate to <strong>Settings</strong> \u2192 <strong>Rename</strong>.</p>"}, "app__remove-wallet": {"title": "Remove wallet", "cat": "Blockstream App", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>The <strong>Blockstream app</strong> is <strong>self-custodial</strong>, which means that you have full control over your funds, private keys, and recovery data. Because of this, deleting or removing a wallet from your device can be permanent if you do not have your recovery phrase.</p><h2 id=\"h_01KC7W9HJQQRCYB2RY9MN4ZE5T\">Before You Begin</h2><p><strong>Your recovery phrase is critical</strong>. Before deleting or removing a wallet, make sure you have your recovery phrase written down and stored safely.</p><ul><li data-list-item-id=\"e94af3e137c86da16178dcf22a55f9406\">Your recovery phrase is typically a 12- or 24-word phrase shown when you first create the wallet.</li><li data-list-item-id=\"e476a525d248d4a78fe793da023acb40c\">This phrase is the <strong>only way</strong> to restore your wallet and regain access to your funds.</li><li data-list-item-id=\"ec22f9b66564870abad9c3f171fa44605\">If you remove a wallet and do not have the recovery phrase, the wallet will <strong>never be accessible again</strong>.</li></ul><p>Blockstream cannot recover your recovery phrase or access your funds for you.</p><ul><li data-list-item-id=\"e21052f230f58995abfa4f1f09cf7fd38\"><a href=\"#h_01KC7W9HJRPFHAZD5FC58CJS5K\">Remove Wallet on iOS</a></li><li data-list-item-id=\"e5b27d1999e29df58a046464a893dc34f\"><a href=\"#h_01KC7W9HJRTA7HZ0Q7DVRXPA2F\">Remove Wallet on Android</a></li><li data-list-item-id=\"ecdd1443a10f5e0c9787628757e431589\"><a href=\"#h_01KKXVKDT8SB75HTJZJFA97MXD\">Remove Wallet on Desktop</a></li></ul><h2 id=\"h_01KC7W9HJRPFHAZD5FC58CJS5K\">On iOS</h2><figure class=\"image\"><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/set-up-transact-recover-your-wallet/back-up-wallet/remove-wallet_group-1.png#asset:7676:url\" alt=\"\" /></figure><ol><li data-list-item-id=\"e1d39930d1d3fc159b9ca80af20b0f257\">From the <strong>My Wallets</strong> list, swipe<strong> left</strong> on the wallet you want to remove.</li><li data-list-item-id=\"e3eccebef8d9cb12521b3075cee8887ea\">Tap the red trash bin icon, then tap <strong>Remove Wallet</strong>.</li></ol><h2 id=\"h_01KC7W9HJRTA7HZ0Q7DVRXPA2F\">On Android</h2><ol><li data-list-item-id=\"e5119b06fbdcc97114eea2f7472a46bb4\">From the <strong>My Wallets</strong> list, <strong>press and hold</strong> on the wallet you want to remove.</li><li data-list-item-id=\"e58f336c1733cb406151cc158a836545c\">Select <strong>Remove</strong>.</li></ol><p>Please note that this only archives your wallet on the device. However, if you do not have the recovery phrase, the wallet will never be accessible again.</p><h2 id=\"h_01KKXVKDT8SB75HTJZJFA97MXD\">On Desktop</h2><ol><li data-list-item-id=\"efa45592fd1c376ffd7133cb646336fe0\">From the <strong>My Wallets</strong> list, click the wallet you want to remove.</li><li data-list-item-id=\"eb66fdb304316f9c1100c5f38781e4a0d\">From the PIN-entry interface, click the <strong>three dots</strong> icon in the top-right corner of the screen.</li><li data-list-item-id=\"e110c51ecd484d1905df95f60aed66a38\">Click <strong>Remove Wallet</strong>.</li><li data-list-item-id=\"e0ada13d1875e3b3b0515d066e85bf6fb\">Enter the <strong>confirmation code</strong> to remove the wallet.</li></ol><h2 id=\"h_01KC7W9HJRFCDFG58D7PCGEJ4R\">Removing Wallet Data from Blockstream Jade (Factory Reset)</h2><p>If you are using a <strong>Blockstream Jade</strong> hardware wallet, performing a factory reset will erase all wallet data stored on the device.</p><p>After a factory reset, you will need your 12- or 24-word recovery phrase to restore your wallet on Jade or in the Blockstream app. Without the recovery phrase, the wallet and its funds cannot be recovered.</p>"}, "app__onboard-to-liquid-bitcoin": {"title": "Onboard to Liquid bitcoin", "cat": "Blockstream App", "section": "Use Liquid Bitcoin", "html": "<p>Liquid bitcoin (LBTC) is bitcoin on the Liquid Network. Transactions settle in roughly two minutes, fees stay low, and Confidential Transactions hide both amounts and asset types from outside observers. Your Liquid balance also lets you send and receive Lightning payments without managing channels.</p><p>The Blockstream app supports two ways to get LBTC: receiving it from a Lightning payment, or swapping bitcoin for LBTC with an on-chain swap.</p><h2 id=\"h_01KMJGTQ6426TC9ND07BRQRYWX\">Receive LBTC via Lightning</h2><p>When someone sends you a payment over the Lightning Network, the Blockstream app receives it as LBTC directly into your Liquid wallet. The conversion happens automatically through a Lightning \u2194 Liquid swap. No existing bitcoin balance is required.</p><p>For step-by-step instructions, see our <a href=\"https://help.blockstream.com/blockstream-app/use-lightning-bitcoin/receive-lbtc-via-lightning-and-pay-lightning-invoice-with-lbtc#entry:498@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">guide to receiving LBTC via Lightning</a>.</p><h2 id=\"h_01KMJGTQ646T2ACDZCCY9T52YB\">Swap Bitcoin for LBTC</h2><p>You can convert bitcoin you hold in the Blockstream app to LBTC using an on-chain swap. The swap is 1:1, minus network fees.</p><p>If you do not have bitcoin in the Blockstream app yet, you can get it two ways:</p><ul>\n<li>\n<strong>Buy bitcoin</strong> directly in the app. Tap <strong>Transact</strong>, then tap <strong>Buy</strong>, or tap <strong>Buy Now</strong> under the Bitcoin price chart on the home screen. The app supports Apple Pay, Google Pay, debit card, and wire transfer in 200+ currencies.</li>\n<li>\n<strong>Receive bitcoin</strong> from another wallet. Tap <strong>Transact</strong>, then tap <strong>Receive</strong>, and choose <strong>Bitcoin</strong> as the asset.</li>\n</ul><p>Once you have bitcoin, follow our <a href=\"https://help.blockstream.com/blockstream-app/use-liquid-bitcoin/perform-an-on-chain-swap#entry:93@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">on-chain swap guide</a> to convert it to LBTC.</p>"}, "app__perform-an-on-chain-swap": {"title": "Perform an on-chain swap", "cat": "Blockstream App", "section": "Use Liquid Bitcoin", "html": "<p>The Blockstream app lets you swap between bitcoin and Liquid bitcoin (LBTC) directly from your wallet. You may also pair the app with your Jade device to protect swap transactions with offline security.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4077.png?v=13\"/></figure><ol>\n<li>Tap <strong>Transact</strong> at the bottom of the screen, then tap <strong>Swap</strong>.<br/>\n</li>\n<li>Select the assets you want to swap (<strong>Bitcoin</strong> and <strong>Liquid Bitcoin</strong> are the default pair), then enter the amount you want to swap using the keypad. Optionally, tap <strong>Change Speed</strong> to adjust the network fee. Tap <strong>Continue</strong> to proceed.<br/>\n</li>\n<li>Review the swap details, including the total amount to receive and fees. <strong>Slide to Swap</strong> to confirm.<br/>\n</li>\n</ol><p>Your swap will begin processing. You will see the transaction in your history once confirmed.</p><h2 id=\"h_01KJTAE33RBKQBC4MAZ86DPENK\"><strong>Swap with Jade</strong></h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4082.png?v=13\"/></figure><p>You can also perform a swap with Jade to swap safely from <a href=\"https://glossary.blockstream.com/cold-storage-security/\" rel=\"noopener noreferrer\" target=\"_blank\">cold storage</a>.</p><ol>\n<li>First, <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/enable-swaps-with-jade#entry:102@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">enable on-chain swaps with Jade</a> within the mobile Blockstream app.</li>\n<li>Within your Jade-secured wallet, follow the same steps for a typical swap.</li>\n<li>When you slide to confirm, the app prompts you to <strong>verify the swap <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a></strong> on your hardware wallet. Compare the address shown on Jade with the one on your phone, then select the checkmark on Jade to confirm.</li>\n</ol><p></p><ol start=\"4\"><li>Next, <strong>confirm the transaction details</strong> on Jade. Review the output address and amount, then select the checkmark to approve the transaction.</li></ol><p></p><blockquote class=\"note\"><p><strong>Note:</strong> Funds are sent to a temporary swap address which won't match the final recipient address. Once the swap completes, the swapped asset is delivered to the destination address.</p></blockquote><p>Your swap will begin processing. You will see the transaction in your history once confirmed.</p>"}, "app__multisig-security-overview-for-liquid-wallets": {"title": "Multisig security overview for Liquid wallets", "cat": "Blockstream App", "section": "Use Liquid Bitcoin", "html": "<p>If you selected <strong>Multisig Shield</strong> during the setup process, your Liquid wallet in the <a href=\"https://blockstream.com/app/\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream app</a> uses a 2-of-2 multisig model, similar to your Bitcoin wallet.</p><p>Sending a transaction from your Liquid wallet requires signatures from both your device (protected by PIN) and the Blockstream server (protected by <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">two-factor authentication</a>).</p><p>Currently, the Blockstream app does not support the creation of <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">2-of-3 accounts</a> for Liquid wallets. This feature is only available for Bitcoin wallets at this time.</p>"}, "app__receive-and-send-liquid-assets": {"title": "Receive and send Liquid assets", "cat": "Blockstream App", "section": "Use Liquid Bitcoin", "html": "<p>Liquid is a Bitcoin sidechain that enables additional functionality for Bitcoin users, including enhanced confidentiality, faster block times, and new smart contracts. One of the most popular use cases of Liquid is tokenization, which allows alternative assets, such as tokenized securities, to be transferred between users in a Bitcoin-like manner. An example of such a Liquid-based asset is Tether (USDT), which is a stablecoin pegged to the U.S. dollar.</p><blockquote class=\"note\">\n<strong>Note:</strong> If using a Jade hardware wallet, Liquid transactions require a USB or Bluetooth connection. QR mode does not support Liquid.</blockquote><blockquote class=\"note\">\n<strong>Note: </strong>LBTC is the Bitcoin-pegged base currency on Liquid. You will need LBTC to pay transaction fees when sending an asset via Liquid. There are a variety of <a href=\"https://help.blockstream.com/liquid-network/acquire-lbtc/get-liquid-bitcoin-lbtc#entry:366@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">ways to obtain LBTC</a> in a manner similar to obtaining bitcoin.</blockquote><h2 id=\"h_01JVACHQKHX2NF42ENT9JA4BNT\">Receiving Liquid assets</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4078.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">To receive a Liquid asset from someone else, navigate to the <strong>Transact</strong> tab and tap <strong>Receive</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">The Receive page displays Bitcoin by default. You can change the type of receiving <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a> in the <strong>Asset</strong> field near the top of the screen. Tap where it already says <strong>Bitcoin</strong> to bring up the <strong>Select Asset</strong> page. Here you can pick a specific Liquid asset to receive, or simply select <strong>Receive any Liquid Asset</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Once you've selected the type of asset you'd like to receive, you can display the resulting QR code to the sender or copy the address to share it with the sender. A QR code image can also be shared with the sender after clicking the Share button at the bottom of the screen.</p>\n</div><h2 id=\"h_01JVDCW946JG5TM8M8BRW4XRRJ\">Sending Liquid assets</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4079.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4080.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">To send a Liquid asset, navigate to the <strong>Transact</strong> tab and tap <strong>Send</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Enter the Liquid address that you want to send a Liquid asset to. Alternatively, you can tap <strong>Scan QR code</strong> to scan a QR code displayed by the recipient's wallet. Tap <strong>Next</strong> after entering the address.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">On the next screen, select the specific Liquid asset you would like to send. Then, select the amount of the token you would like to send.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Finally, slide the arrow near the bottom of the screen on the next page to send the selected asset. After sending the transaction, the Blockstream app will show you a message indicating the transaction was successful.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p>"}, "app__generate-amp-id": {"title": "Generate AMP ID", "cat": "Blockstream App", "section": "Use Liquid Bitcoin", "html": "<p>AMP accounts allow you to send, receive, and store managed assets issued on the <a href=\"https://glossary.blockstream.com/liquid-network/\" rel=\"noopener noreferrer\" target=\"_blank\">Liquid Network</a>. In order to receive approval to move certain security tokens, you will need to share your AMP ID with the issuer.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4081.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Log in to your wallet and tap <strong>Settings</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select <strong>AMP ID</strong> under the Wallet Settings section to create an AMP account.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">After creating your account, tap <strong>Copy AMP ID</strong> to share it with your issuer.</p>\n</div><p></p>"}, "app__receive-amp-assets-desktop": {"title": "Receive AMP assets (Desktop)", "cat": "Blockstream App", "section": "Use Liquid Bitcoin", "html": "<p><a href=\"https://blockstream.com/amp/\" rel=\"noopener noreferrer\" target=\"_blank\">AMP assets</a>, such as the <strong>Blockstream Mining Note</strong>\u00a0or other security tokens, require special authorization from the token issuer in order to receive and send. You must have an AMP ID whitelisted with the issuer before you can successfully receive AMP assets to your Liquid wallet.</p><h2 id=\"h_01K5HRD2V81W8EVQG9EAKTN8W5\">Desktop</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4083.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\"><strong>Open the Blockstream app</strong> and <a href=\"https://help.blockstream.com/blockstream-app/use-liquid-bitcoin/generate-amp-id#entry:448@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">create an AMP wallet</a>. If you already have a <a href=\"https://help.blockstream.com/liquid-network/acquire-lbtc/get-a-liquid-wallet#entry:246@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">Liquid wallet</a>, you can instead choose to <a href=\"https://help.blockstream.com/blockstream-app/use-liquid-bitcoin/generate-amp-id#entry:448@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">add an AMP account to your existing wallet</a>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\"><strong>Copy your AMP ID</strong> and share it with the token issuer.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">After the token issuer has successfully whitelisted your AMP ID, select <strong>Receive</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\"><strong>Copy</strong> the address that is generated, then share this with the platform that is currently holding your AMP asset to request a withdrawal.</p>\n</div><blockquote><p><strong>Tip:</strong> You can use Liquid addresses to receive every type of Liquid asset, so there is no need to generate one specific to yours.</p></blockquote><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">After the platform processes your request, return to the home page of your Liquid wallet where you have now taken self-custody of your AMP asset.</p>\n</div><p></p>"}, "app__understand-lightning-support-in-the-blockstream-app": {"title": "Understand Lightning support in the Blockstream app", "cat": "Blockstream App", "section": "Use Lightning Bitcoin", "html": "<p>Lightning support in the Blockstream app lets you send and receive bitcoin payments quickly using the Lightning Network. Lightning works inside the same wallet as your on-chain Bitcoin and Liquid balances.</p><p>Lightning is currently in beta. Your underlying funds remain secure, but you may experience occasional payment failures or temporary delays when accessing your Lightning balance during network updates. We recommend only keeping funds on Lightning that you don't need immediate, urgent access to.</p><h2>Where Lightning Is Available</h2><p>You enable Lightning one wallet at a time, and the first step differs by platform. On iOS, you turn on <strong>Experimental Features</strong> in App Settings before Lightning appears in your wallet's settings. On Android, you turn on the Lightning toggle directly in your wallet's settings. See <a href=\"https://help.blockstream.com/hc/en-us/articles/46687226665497-Enable-Lightning\" target=\"_blank\" rel=\"noopener noreferrer\">Enable Lightning</a> for the full walkthrough on both platforms.</p><h2>What You Can Do With Lightning</h2><ul><li data-list-item-id=\"ea870f89fbb3f82629b0c87ac9270739d\">In a wallet with Lightning enabled, you receive payments by sharing a Lightning invoice and send payments by paying someone else's invoice. See <a href=\"https://help.blockstream.com/hc/en-us/articles/47010141141273\" target=\"_blank\" rel=\"noopener noreferrer\">Receive and send Lightning bitcoin</a> for how this works.&nbsp;</li><li data-list-item-id=\"e8d3a04618ab2852efb0d29b681395418\">You can also <a href=\"https://help.blockstream.com/hc/en-us/articles/52967603674265\" target=\"_blank\" rel=\"noopener noreferrer\">receive LBTC via Lightning and pay Lightning invoices with LBTC</a> to move value between Lightning and Liquid Bitcoin, and <a href=\"https://help.blockstream.com/hc/en-us/articles/53373520222105\" target=\"_blank\" rel=\"noopener noreferrer\">transfer your Lightning balance to on-chain</a> when you want those funds held on-chain instead.</li></ul><h2>Receive Capacity and Funding Fees</h2><p>How much you can receive over Lightning at any moment depends on your Instant Lightning account's receive capacity, and the first inbound payment may include a one-time funding fee. See <a href=\"https://help.blockstream.com/hc/en-us/articles/18788499177753\" target=\"_blank\" rel=\"noopener noreferrer\">Understand receive capacity and funding fees on your Instant Lightning account</a> for the details.</p><h2>If a Payment Fails or Stalls</h2><p>Because Lightning is in beta, a payment can occasionally fail or take longer than expected, especially during network updates. Your funds stay secure when this happens. Retry the payment, or wait a short while and try again. If the problem persists, <a href=\"https://help.blockstream.com/hc/en-us/requests/new?ticket_form_id=8613\" target=\"_blank\" rel=\"noopener noreferrer\">contact our support team online</a> or through the app.</p>"}, "app__enable-lightning": {"title": "Enable Lightning", "cat": "Blockstream App", "section": "Use Lightning Bitcoin", "html": "<blockquote class=\"note\"><p><strong>Note:</strong> Lightning is currently in beta. Your underlying funds remain secure, but you may experience occasional payment failures or temporary delays when accessing your Lightning balance during network updates. We recommend only using funds that you don't need immediate, urgent access to. If you run into issues with Lightning, <a href=\"https://help.blockstream.com/hc/en-us/requests/new?ticket_form_id=8613\" rel=\"noopener noreferrer\" target=\"_blank\">contact our support team online</a> or through the app.</p></blockquote><ul><li data-list-item-id=\"e974df22b902a249521cc3fd9262773f5\"><a href=\"#enable-lightning-for-ios\">Enable Lightning for iOS</a></li><li data-list-item-id=\"ef0c9492c91b02e8412f9373038e03eb6\"><a href=\"#enable-lightning-on-android\">Enable Lightning on Android</a></li></ul><h2 id=\"enable-lightning-for-ios\">Enable Lightning for iOS</h2><p>iOS requires <strong>Experimental Features</strong> to be turned on before you can enable Lightning.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4084.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">From the <strong>My Wallets</strong> screen, tap the <strong>three dots</strong> icon in the top right.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">In the <strong>Options</strong> menu, tap <strong>App Settings</strong>.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Turn on <strong>Enable Experimental Features</strong>.</p></div><p></p><p>With Experimental Features enabled, you can now enable Lightning from your wallet's Settings.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4085.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4086.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">From <strong>My Wallets</strong>, tap the wallet you want to use.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Tap <strong>Settings</strong> in the bottom navigation.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Under <strong>Account Settings</strong>, tap <strong>Lightning</strong>.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Review the <strong>Lightning Is in Beta</strong> information, then tap <strong>Enable Lightning</strong>.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">5.</p><p class=\"num-list-text\">A green <strong>Lightning Enabled</strong> banner appears at the top of the Settings screen.</p></div><p></p><p>You can now send and receive Lightning bitcoin from this wallet.</p><h2 id=\"enable-lightning-on-android\">Enable Lightning on Android</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4087.png?v=13\"/></figure><p>You enable Lightning directly from your wallet's settings. No Experimental Features step required.</p><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">From your wallet's <strong>Settings</strong>, scroll to <strong>Account Settings</strong> and tap the <strong>Lightning</strong> toggle.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Review the <strong>Lightning is in Beta</strong> dialog and tap <strong>I Understand</strong>.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Wait for <strong>Creating your Lightning account...</strong> to complete.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">The <strong>Lightning</strong> toggle is now on.</p></div><p></p><p>You can send and receive Lightning bitcoin from this wallet.</p>"}, "app__receive-and-send-lightning-bitcoin": {"title": "Receive and send Lightning bitcoin", "cat": "Blockstream App", "section": "Use Lightning Bitcoin", "html": "<p>While we complete our <a href=\"https://help.blockstream.com/blockstream-app/use-lightning-bitcoin/understand-lightning-support-in-the-blockstream-app#entry:161@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">Lightning migration</a>, you can use the Blockstream app's <a href=\"https://help.blockstream.com/blockstream-app/use-lightning-bitcoin/receive-lbtc-via-lightning-and-pay-lightning-invoice-with-lbtc#entry:498@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">Lightning \u2194 Liquid swap</a> functionality to receive and send Lightning payments.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4088.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4089.png?v=13\"/></figure>"}, "app__receive-lbtc-via-lightning-and-pay-lightning-invoice-with-lbtc": {"title": "Receive LBTC via Lightning and pay Lightning invoice with LBTC", "cat": "Blockstream App", "section": "Use Lightning Bitcoin", "html": "<p>With the 5.1.4 update to the Blockstream app, you can receive Liquid bitcoin (LBTC) from someone sending you Lightning bitcoin and pay Lightning invoices using your Liquid balance.</p><p>This feature is compatible with any Liquid- or Lightning-enabled Bitcoin wallet. If you are using a Jade-secured wallet, you must confirm transaction details on Jade prior to sending or receiving.</p><ul>\n<li><a href=\"#h_01KBFHH0Z7QPMWDWSGJCRK03Y5\"><span class=\"wysiwyg-underline\">Receive LBTC via Lightning</span></a></li>\n<li><a href=\"#h_01KBFHH0ZGRNCHVFFYBXV1T67F\"><span class=\"wysiwyg-underline\">Pay Lightning Invoice with LBTC</span></a></li>\n</ul><h2 id=\"h_01KBFHH0Z7QPMWDWSGJCRK03Y5\"><strong>Receive LBTC via Lightning</strong></h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4090.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4091.png?v=14\"/></figure><ol><li>Tap <strong>Transact</strong> at the bottom of the screen, then tap <strong>Receive</strong>.</li></ol><p></p><ol start=\"2\"><li>Choose <strong>Liquid Bitcoin</strong> as the asset to receive.</li></ol><p></p><ol start=\"3\"><li>On the next screen, you can select between Liquid or Lightning as the asset to receive from the sender. <strong>Liquid</strong> will be selected by default, but tap <strong>Lightning</strong> instead to receive LBTC via Lightning.</li></ol><p><strong></strong></p><ol start=\"4\"><li>Enter the amount you\u2019d like to receive. Sats is the default denomination, however, you can change it by tapping on <strong>sats</strong> and selecting your denomination of choice. Then tap <strong>Confirm</strong>.</li></ol><p></p><ol start=\"5\"><li>The app will generate a Lightning invoice which you can share with the sender to receive LBTC via Lightning.</li></ol><p></p><blockquote class=\"note\"><p><strong>Note:</strong> <a href=\"https://glossary.blockstream.com/bolt12/\" rel=\"noopener noreferrer\" target=\"_blank\">BOLT12</a>, LNURL, and Amountless Invoices are not currently supported.</p></blockquote><h2 id=\"h_01KBFHH0ZGRNCHVFFYBXV1T67F\"><strong>Pay Lightning Invoice with LBTC</strong></h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4092.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4093.png?v=14\"/></figure><ol><li>Tap <strong>Transact</strong> at the bottom of the screen, then tap <strong>Send</strong>.</li></ol><p></p><ol start=\"2\"><li>Paste or scan the QR of the Lightning Invoice you will be sending LBTC to.</li></ol><p></p><ol start=\"3\"><li>If you have both a Liquid and Lightning balance, select <strong>Liquid</strong> as the asset to pay the invoice with.</li></ol><p></p><ol start=\"4\"><li>If you have multiple accounts with Liquid balances, select the account you\u2019d like to spend LBTC from.</li></ol><p></p><ol start=\"5\"><li>Confirm the transaction details, then <strong>Slide to Send</strong>.</li></ol><p></p><p>\u00a0</p>"}, "app__transfer-lightning-balance-to-on-chain": {"title": "Transfer Lightning balance to on-chain", "cat": "Blockstream App", "section": "Use Lightning Bitcoin", "html": "<p>With the latest changes to our Lightning integration, you may notice a missing Lightning balance in the Blockstream app. <strong>Don\u2019t worry: your funds are safe</strong>. <a href=\"https://help.blockstream.com/blockstream-app/use-lightning-bitcoin/enable-lightning#entry:291@1:url\" rel=\"noopener noreferrer\" target=\"_blank\"><span class=\"wysiwyg-underline\">Read this notice</span></a> for more information.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4094.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4095.png?v=13\"/></figure><p>You will need to transfer your Lightning node balance to on-chain while we finish our full Lightning solution.<br/><br/>To get started, you first need a destination\u2014a Bitcoin <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a>\u2014to transfer your Lighting sats to. You can use any on-chain Bitcoin wallet you'd like. For this example and for convenience, we will use an on-chain Bitcoin receive address generated within the same wallet on the Blockstream app.</p><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">From the home page of the wallet where you held Lightning bitcoin, tap <strong>Transact</strong> on the bottom navigation bar, then tap <strong>Receive</strong>.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Choose <strong>Bitcoin</strong> as the asset to receive.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\"><strong>Copy</strong> the receive address, then return to the wallet home page.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Tap on your <strong>Lightning bitcoin balance</strong>, then tap <strong>Transfer Funds.</strong></p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">5.</p><p class=\"num-list-text\"><strong>Paste</strong> the receive address you copied. Confirm the transaction details, then <strong>Slide to Send</strong>, and tap <strong>Ok</strong> on the confirmation popup.</p></div><p></p>"}, "app__understand-receive-capacity-and-funding-fees-on-your-instant-lightning-account": {"title": "Understand receive capacity and funding fees on your Instant Lightning account", "cat": "Blockstream App", "section": "Use Lightning Bitcoin", "html": "<h2 id=\"h_01KAHF0WFANZSDKX5KZSH7RR9Z\">Receive Capacity</h2><p><span style=\"background-color:#ffffff;\">The receive capacity, or inbound liquidity, is the approximate amount of bitcoin that you can receive over a Lightning channel.</span></p><ul>\n<li><span style=\"background-color:#ffffff;\">Receiving bitcoin decreases your receive capacity, and increases your available balance.&nbsp;</span></li>\n<li><span style=\"background-color:#ffffff;\">Sending bitcoin decreases your receive balance and increases your receive capacity.</span></li>\n</ul><p><span style=\"background-color:#ffffff;\">From time to time\u2014especially if you frequently receive more than you spend\u2014you will receive a warning that a <strong>funding fee</strong> will be deducted from your incoming payment, because a new channel will be created for you.</span></p><h2 id=\"h_01KAHF0WFEFS7S2MFT93X277TJ\">Funding Fees</h2><p><span style=\"background-color:#ffffff;\">If the payment you are trying to receive exceeds your current receive capacity, or it's below the minimum threshold of 10,000 sats, you will incur into channel funding fees:</span></p><ul>\n<li><span style=\"background-color:#ffffff;\">On-the-fly channel creation (receive via lightning invoice): 0.4% of the amount received, with a 10,000 sats minimum fee. This covers the cost of opening a channel. The amount received must be at least 10,000 sats.</span></li>\n<li><span style=\"background-color:#ffffff;\">Swap-in (receive via onchain <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a>): 0.4% of the amount received, with a 10,000 sats minimum fee. This covers the cost of opening a channel. The amount received must be at least 10 000 sats.</span></li>\n</ul><p><span style=\"background-color:#ffffff;\">Once your receive capacity is replenished, no fees will be applied for incoming transactions. Spending from your instant account and funding new channels increases your receive capacity.</span></p>"}, "app__sign-message-to-verify-wallet-ownership": {"title": "Sign message to verify wallet ownership", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>Message signing is useful whenever you want to prove ownership over the keys associated with a certain address. Some exchanges require you to do such operation before enabling you to withdraw from the exchange onto such address. They will provide you a message template including some code or ID that will allow them to be compliant with their local regulation regime.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4100.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4101.png?v=13\"/></figure><blockquote class=\"note\"><p><strong>Note:</strong> Message signing is only available for singlesig accounts.</p></blockquote><ol class=\"steps\">\n<li>\n<p>\n      First, open the relevant wallet and navigate to the\n      <strong>Transact</strong> tab via the navigation bar at the bottom\n      of the\n      screen. Then, select <strong>Receive</strong>.\n    </p>\n<div class=\"img-row\">\n\n</div>\n</li>\n<li>\n<p>\n      Your Blockstream App should now display an unused Bitcoin receiving\n      <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a>\n      by default. Tap the icon with the three dots in the top-right corner\n      to bring\n      up <strong>More Options</strong>. In that list of options, select\n      <strong>List of Addresses</strong>.\n    </p>\n<blockquote class=\"note\">\n<p>\n<strong>Note: </strong>You will need to switch the Asset to Liquid\n        Bitcoin\n        if you'd like to prove ownership over a Liquid address rather\n        than a\n        traditional, on-chain Bitcoin address.\n      </p>\n</blockquote>\n<div class=\"img-row\">\n\n</div>\n</li>\n<li>\n<p>\n      You will then be presented with a list of addresses associated\n      with your\n      wallet. Find the address you'd like to use and tap the signature\n      icon on\n      the far-right side of it.\n    </p>\n<div class=\"img-row\">\n\n</div>\n</li>\n<li>\n<p>\n      Finally, you can type or paste the message you'd like to sign\n      with your\n      chosen address and tap <strong>Sign message</strong>. You will then\n      be presented\n      with the signature for the message you signed with the chosen address,\n      and\n      you can use copy and paste to send that signature anywhere you'd\n      like.\n    </p>\n</li>\n</ol><p class=\"wysiwyg-text-align-center undefined\">\n\n</p>"}, "app__set-up-watch-only-wallet": {"title": "Set up watch-only wallet", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>A watch-only wallet allows you to track the balance of your Bitcoin wallet without exposing its associated private keys to the device that you generate the watch-only wallet on. Since Bitcoin addresses are publicly viewable on the <a href=\"https://glossary.blockstream.com/blockchain/\" rel=\"noopener noreferrer\" target=\"_blank\">blockchain</a> by anyone, anyone can track the balance associated with a particular Bitcoin <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a>, even if it's not their own.</p><blockquote><p><strong>Tip:</strong> Watch-only wallets can be particularly useful when used with your <a href=\"https://store.blockstream.com/products/jade-plus\" rel=\"noopener noreferrer\" target=\"_blank\">Jade</a>, as you can still receive funds without needing your Jade device with you.</p></blockquote><p>The setup flow will be different depending on which mobile device you are using:</p><ul><li data-list-item-id=\"edb5eae8be90bd0486ccc6f2ac2d76486\"><a href=\"#h_01KJQBMBADQ72RVMWNJXTVEZTW\">iOS</a></li><li data-list-item-id=\"e6954301a08332941d6dd81823bc80096\"><a href=\"#h_01KJQBPBR9MMEC1BD3F2J8K5S6\">Android</a></li></ul><h2 id=\"h_01KJQBMBADQ72RVMWNJXTVEZTW\">iOS</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4102.png?v=13\"/></figure><div class=\"num-list-custom\"><ol><li data-list-item-id=\"e1d17749a1aafc649f728b8312d8a6e8e\"><p class=\"num-list-text\">Open the wallet for which you'd like to create a <strong>watch-only wallet</strong>.</p></li></ol></div><blockquote class=\"note\"><p><strong>Note:</strong> Watch-only mode only allows you to view the wallet it was set up for. This means you will need to set up watch-only mode for each of your wallets separately.</p></blockquote><p></p><div class=\"num-list-custom\"><ol start=\"2\"><li data-list-item-id=\"ea9ccd0bb41757669cbc91959e1c89b80\"><p class=\"num-list-text\">Tap the <strong>Settings</strong> tab on the bottom navigation bar, then select <strong>Wallet Details</strong> under the <strong>Account Settings</strong> section.</p></li></ol></div><p></p><div class=\"num-list-custom\"><ol start=\"3\"><li data-list-item-id=\"ea5cedbeaffcddfbafe8100733bd58466\"><p class=\"num-list-text\">What you will see on the next screen depends on whether or not you're using <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/set-up-watch-only-for-2fa-accounts#entry:701@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">two-factor authentication</a> (2FA) on your wallet. Multisig wallet users will need to generate a username and password to create a watch-only wallet, while singlesig wallet users can copy the <strong>extended public keys</strong> or <strong>output descriptors</strong> associated with their wallet. You will need to paste this data when creating the watch-only wallet.</p></li></ol></div><blockquote class=\"warning\"><p><strong>Warning:</strong> Anyone with access to the watch-only username and password associated with your multisig wallet can view your accounts and transaction history, which may compromise your privacy. Do not share your watch-only username and password in public and update the login details regularly.</p></blockquote><p></p><p></p><p>Now, skip the Android section below and proceed with the <a href=\"#h_01KJQC5EHGRVAC6C0EJ3ZTBTHF\">Set Up Watch-Only Access</a> instructions.</p><h2 id=\"h_01KJQBPBR9MMEC1BD3F2J8K5S6\">Android</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4103.png?v=13\"/></figure><ol><li data-list-item-id=\"e04537e08d27ff6045fabcb8b17b4980c\">Tap on the asset in the wallet you'd like to set up watch-only access for (LBTC in this example).</li></ol><p></p><ol start=\"2\"><li data-list-item-id=\"e6f7cb6c275be0a2651339acbb504e823\">From the <strong>three dots</strong> icon in the top-right corner, tap <strong>Watch-only</strong>.</li></ol><p></p><ol start=\"3\"><li data-list-item-id=\"e4235005fa099af8a9f417bbc251612f1\">Select the account (Choose Standard unless you have enabled AMP and want to set up watch-only access for that account).</li></ol><p></p><ol start=\"4\"><li data-list-item-id=\"eb9bc198a6eb23e8753ba4c87a103249b\">Copy the <strong>output descriptor</strong>.</li></ol><p></p><h2 id=\"h_01KJQC5EHGRVAC6C0EJ3ZTBTHF\">Set Up Watch-Only Access</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4104.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4105.png?v=13\"/></figure><div class=\"num-list-custom\"><ol><li data-list-item-id=\"e5742335ffc1c8de95e14a3b391e32130\"><p class=\"num-list-text\">Return to your wallet's <strong>Home</strong> screen, then tap the Wallet icon at the top-right corner of the screen (next to your wallet's name) to open the <strong>Wallets</strong> page. Once there, tap <strong>Set Up a New Wallet</strong>, then tap <strong>Get Started</strong> on the next screen. Select <strong>Set Up Watch Only </strong>at the top-right corner of the screen.</p></li></ol></div><p></p><p></p><p></p><p>\u00a0</p><div class=\"num-list-custom\"><ol start=\"2\"><li data-list-item-id=\"e318d4fb8dc2de0bdb3320cbadc8a1e2a\"><p class=\"num-list-text\">If you are a singlesig user, you can <strong>paste</strong> your copied xpub, <strong>scan its QR</strong> if you have it pulled up on another device, or <strong>Import from file</strong> if you have the xpub file saved and uploaded to your phone (You will need <a href=\"https://store.blockstream.com/products/jadelink-air-gapped-usb-drive\" rel=\"noopener noreferrer\" target=\"_blank\">JadeLink</a> to do this).<br/><br/>If you're using multisig, tap <strong>Set up with username and password</strong>, select the correct network, then enter the log in credentials that you generated in Step 3.</p></li></ol></div><p></p><p></p><p></p><div class=\"num-list-custom\"><p class=\"num-list-text\">Once completed, you will be able to select the watch-only wallet from the <strong>Wallets</strong> screen.</p></div>"}, "app__speed-up-transaction-confirmation": {"title": "Speed up transaction confirmation", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>A new Bitcoin block of transactions is mined roughly every ten minutes, and each of these blocks have a limited amount of space. Due to this limited transaction capacity on the network, transactions paying higher fees tend to get processed more quickly because they offer a greater financial incentive to miners. When many transactions are being broadcast to the network and blocks are full, transactions paying relatively low fees tend to get delayed.</p><p>Thankfully, there are various mechanisms, such as <a href=\"https://bitcoinops.org/en/topics/replace-by-fee/\" rel=\"noopener noreferrer\" target=\"_blank\">replace-by-fee</a> (RBF), which allow Bitcoin users to increase the fee associated with a transaction they have already sent.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4106.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4107.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">To speed up a transaction you previously sent in the Blockstream app, select the\u00a0<strong>Transact</strong> tab at the bottom of the screen.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">On the Transact tab, you will find your unconfirmed transaction. Tap on the transaction to view the details associated with it. On the Transaction Details page, you can tap the <strong>Increase Fee</strong> button next to <strong>Speed up Transaction</strong> near the bottom of the screen.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">On the next screen, you will see a process that looks similar to sending a normal transaction. To increase the speed of the transaction, tap <strong>Change Speed</strong> in the Network Fee section near the bottom of the screen. This will bring up a small pop-up menu that offers preconfigured speed options in the form of slow, medium, or fast. Additionally, you can set a custom fee by tapping <strong>Custom</strong>\u00a0below those three options.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">After setting your new fee, you will return back to the previous screen for sending the transaction. Tap <strong>Next</strong> at the bottom of the screen.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Finally, you will confirm the new details of the transaction and send the revised payment to the Bitcoin network. Simply slide the arrow at the bottom of the screen to the right, and you will receive a message that indicates the transaction has been successfully sent.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p>"}, "app__change-exchange-rate": {"title": "Change exchange rate", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>The Blockstream app can display the current value of a Bitcoin wallet's balance denominated in a variety of local fiat currencies next to the amount of actual bitcoin held in the wallet, giving you a better idea of how much value you're holding in the Blockstream app. You can also choose different exchanges for the current bitcoin price in the local currency, as well as alternative denominations of bitcoin, such as <a href=\"https://glossary.blockstream.com/sats/\" rel=\"noopener noreferrer\" target=\"_blank\">satoshis</a>, as the default.</p><p>Follow these steps to change the local currency used to value your bitcoin in the Blockstream app.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4108.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Tap the <strong>Settings</strong> tab located at the far right of the bottom navigation bar.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select <strong>Denominations &amp; Exchange Rate</strong> near the top of the screen.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">From the pop-up window, click <strong>Reference exchange rate</strong> and scroll through the options until you find your fiat currency and source exchange of choice. Then, tap <strong>Ok</strong> after making your selection.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><blockquote class=\"note\">\n<strong>Note: </strong>The <strong>Denomination &amp; Exchange Rate</strong> pop-up window is also where you can change the default denomination of bitcoin. Every bitcoin can be divided into 100 million satoshis (or sats), so you may prefer to view your balance in smaller denominations.</blockquote>"}, "app__export-transactions-desktop": {"title": "Export transactions (Desktop)", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>The Blockstream desktop app let's you export your wallet's transaction history for record-keeping, tax reporting, or offline review.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4118.png?v=13\"/></figure><blockquote class=\"note\"><p><strong>Note:</strong> Most Blockstream app users are on mobile. To export from desktop, connect your Jade to the computer with the USB-C cable included in the box, then log in to your existing wallet or <a href=\"https://help.blockstream.com/blockstream-app/set-up-transact-recover-your-wallet/restore-wallet#entry:389@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">restore your wallet from your recovery phrase</a>. For full setup steps, see the <a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-desktop#entry:1197@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">Jade Desktop Quickstart Guide</a>.</p></blockquote><ol>\n<li>Open the Blockstream app and unlock your wallet.</li>\n<li>Click the <strong>Transactions</strong> icon in the left sidebar.</li>\n<li>Click <strong>Export</strong> in the top-right corner of the transaction list.<br/>\n</li>\n<li>Review the default filename, choose a save location, and click <strong>Save</strong>.<br/>\n</li>\n</ol><p>Your transaction history is saved to the location you selected.</p>"}, "app__export-psbt": {"title": "Export PSBT", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>The Blockstream app enables you to export Partially Signed Bitcoin Transactions (PSBTs), which may be useful when signing transactions with an offline device (like a <a href=\"https://store.blockstream.com/products/jade-plus\" rel=\"noopener noreferrer\" target=\"_blank\">Jade Plus</a>).</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4109.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4110.png?v=13\"/></figure><p>Before beginning, ensure that you've <a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/set-up-watch-only-wallet#entry:336@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">set up a watch-only account</a> in the Blockstream app for the Jade device that you will be signing transactions with.</p><blockquote class=\"note\"><p><strong>Note:</strong> This workflow requires a <a href=\"https://store.blockstream.com/products/jadelink-air-gapped-usb-drive\" rel=\"noopener noreferrer\" target=\"_blank\">JadeLink</a>, an SD card reader, or other generic USB-C drives for file storage.</p></blockquote><p>Here's how to export a PSBT using the Blockstream app:</p><ol>\n<li>Navigate to the <strong>Transact</strong> tab, then tap <strong>Send</strong>.</li>\n</ol><p> </p><ol start=\"2\">\n<li>\n<strong>Enter the <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a></strong> you will be sending to, then <strong>enter the amount</strong> to send.</li>\n</ol><p> </p><ol start=\"3\">\n<li>Tap <strong>Sign Transaction via QR</strong>, <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-air-gapped-with-qr-pin-unlock#entry:650@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">unlock your Jade Plus</a>, then tap <strong>Export Transaction</strong>.</li>\n</ol><p>  </p><ol start=\"4\">\n<li>\n<strong>Plug JadeLink</strong> into your mobile device, then <strong>save the transaction file</strong> to your JadeLink.</li>\n</ol><p> </p><ol start=\"5\">\n<li>\n<strong>Unplug JadeLink</strong> from your mobile device and <strong>plug it into your Jade Plus</strong>. Unlock your Jade account that's paired with your watch-only wallet, then navigate to <strong>Options</strong> \u2192 <strong>USB Storage</strong> \u2192 <strong>Sign</strong>. The transaction details should appear. Verify them, then sign the transaction. This will save the signed PSBT file on JadeLink. Unplug JadeLink from Jade Plus and plug back into your mobile device.</li>\n</ol><p>  </p><ol start=\"6\">\n<li>Tap <strong>Next</strong>, tap <strong>Import from file</strong>, then select your signed PSBT file from the JadeLink folder on your mobile device.</li>\n</ol><blockquote class=\"note\"><p><strong>Tip:</strong> Pay attention to the time and date on your transaction file name to pick the right file. It should correspond with the time you signed the PSBT on Jade Plus and saved to JadeLink.</p></blockquote><p>   </p><p>That's it! You have successfully exported, signed, and broadcast your PSBT.</p><blockquote class=\"note\"><p><strong>Tip:</strong> Delete transaction files you have already broadcast from your JadeLink to easily find new transaction files in the future.</p></blockquote>"}, "app__sweep-funds-from-a-private-key": {"title": "Sweep funds from a private key", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>Sweeping funds from a private key allows you to move funds stored on a paper wallet to a wallet in the Blockstream app.</p><blockquote class=\"note\">\n<strong>Note: </strong>Instead of sweeping funds from a private key into an existing wallet, you can also import an outside wallet via its associated BIP39 passphrase. Importing is the correct option if you're more interested in simply adding your wallet to the Blockstream app rather than moving the funds into an exis
