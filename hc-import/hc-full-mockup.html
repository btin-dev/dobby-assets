ade in this list, you may have an older version of Sparrow. Simply choose <strong>xPub/Watch-Only Wallet</strong> instead, then select the <strong>QR</strong> icon to open the webcam scanner.</p></div><blockquote><p><strong>Tip:</strong> If Sparrow is not reading your xpub QR, try enabling the <strong>Use HD Capture</strong> option in the scanning window that appears. If you are still having trouble, you may need a higher quality webcam. There are is also software available that allows you to use your mobile phone's camera with your desktop - which may help as well.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/11960810861977.png\" alt=\"2.png\" /></p><div class=\"num-list-custom\"><p class=\"num-list\">5.</p><p class=\"num-list-text\">Once your xpub is imported, select <strong>Apply</strong> to finalize the creation of your wallet.</p></div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/11961214040473.png\" alt=\"3.png\" /></p><h2 id=\"h_01GGG2DAMDQ3QRGYRET2KRTQPW\">Send Bitcoin</h2><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Choose the <strong>Send</strong> option in the left menu bar, then enter your recipient's <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>address</strong></a>&nbsp;and the <strong>intended</strong> amount. Select <strong>Create Transaction</strong> to continue.</p></div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/11961275258905.png\" alt=\"4.png\" /></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Next select <strong>Show QR</strong> to view the PSBT in this format. Navigate to the <strong>QR Scan</strong> function on your Jade and point the camera at the QR codes. Jade will need to capture every frame that is displayed to continue.</p></div><blockquote><p><strong>Tip:</strong> The progress bar will fill up as you successfully scan new frames. If the progress bar is not updating, change Jade's angle or distance from the QR until you find the <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">optimal placement</a> for scanning.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/11961293249561.png\" alt=\"5.png\" /></p><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Once Jade has successfully read the PSBT, it will display the transaction details on your device for you to <strong>review</strong> and <strong>confirm</strong>.&nbsp;</p></div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/55341673316121.png\" alt=\"txconf.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/55341715245849.png\" alt=\"fee.png\" width=\"306\" /></p><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Jade will then <strong>display</strong> your signed transaction as a series of QR codes. Click <strong>Scan QR</strong> and scan Jade's screen with Sparrow until all frames have been captured.</p></div><blockquote><p><strong>Tip:</strong> For a better scan experience, enable<strong> Use HD Capture</strong> on Sparrow. You may also adjust the <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">QR settings</a> on Jade which may be helpful for low quality cameras.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/11961335283097.png\" alt=\"6.png\" /></p><div class=\"num-list-custom\"><p class=\"num-list\">5.</p><p class=\"num-list-text\">After Sparrow has successfully scanned back the signed transaction, select <a href=\"https://glossary.blockstream.com/broadcast-transaction/\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>Broadcast Transaction</strong></a> and your bitcoin will be sent.</p></div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/11961364690713.png\" alt=\"7.png\" /></p>"}, "jade__use-jade-with-sparrow": {"title": "Use Jade with Sparrow", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p><a href=\"https://sparrowwallet.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Sparrow</a> is a Bitcoin wallet that supports <a href=\"https://blockstream.com/jade\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a> and features an emphasis on security, privacy and usability. Sparrow attempts to provide as much detail as possible about your transactions and UTXOs, but in a way that is manageable and usable.</p><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\"><a href=\"https://sparrowwallet.com/download/\" target=\"_blank\" rel=\"noopener noreferrer\">Download Sparrow</a>, then choose to create a <strong>New Wallet</strong>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-sparrow/55341795710489.png\" alt=\"Screenshot 2024-12-17 at 12.33.12\u202fPM.png\" /></p><div class=\"num-list-custom\">&nbsp;</div><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Plug in your Jade and select <strong>Connected Hardware Wallet</strong>, then click <strong>Scan</strong>. The default account type that will be generated is Singlesig | Native Segwit, however you may change this under Settings if you have another preference.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If you have previously used Jade as a Singlesig wallet with the Blockstream app and would like to view your transactions in Sparrow, make sure the script type matches the account type that contains your funds in the Blockstream app. You will also need the account index to match as well.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-sparrow/55341795712153.png\" alt=\"Screenshot 2024-12-17 at 12.40.31\u202fPM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Plug in your Jade and click <strong>Scan</strong>. You will then be prompted to enter your PIN on Jade.</p>\n</div><blockquote><p><strong>Tip:</strong> Before connecting your Jade, make sure the Blockstream app is not open. If the app is open, this may cause issues with your Jade being detected within Sparrow.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-sparrow/55341770674457.png\" alt=\"Screenshot 2024-12-17 at 12.47.13\u202fPM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Select <strong>Import Keystore</strong> to import the public key of the default account, or select the arrow to manually select the derivation path you would like to use.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-sparrow/55341770674457.png\" alt=\"Screenshot 2024-12-17 at 12.47.13\u202fPM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">After your desired key has been imported, click <strong>Apply</strong>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-sparrow/7561656254105.png\" alt=\"8.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">You have now successfully set up your wallet and you can begin <strong>receiving</strong>, storing and <strong>spending</strong> your bitcoin using Sparrow and Jade.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If you were previously using Jade with the Blockstream app as a <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Multisig Shield</a> wallet, you should <strong>not</strong> expect your new Sparrow wallet to show the same balance as these are different wallets. To access your Multisig Shield wallet again, simply connect your Jade back to the Blockstream app.</p></blockquote><figure class=\"wysiwyg-image image\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-sparrow/7561656273561.png\" alt=\"9.png\" /></figure><p>Now, learn how to use <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow#entry:961@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Jade's QR Scan</a> with Sparrow.</p><p>&nbsp;</p>"}, "jade__fix-issues-upgrading-jade": {"title": "Fix issues upgrading Jade", "cat": "Blockstream Jade", "section": "Troubleshooting", "html": "<p>If you experience issues when trying to update Jade's firmware, try the following troubleshooting steps. If you are attempting to upgrade using the WebUpgrader, make sure you have <a href=\"#h_01HRWK164WGJDPESJEPWPX43E8\" target=\"_blank\" rel=\"noopener noreferrer\">installed the required driver</a> beforehand if necessary.</p><blockquote class=\"note\"><p><strong>Note:</strong> We <strong>highly</strong> recommend updating to the latest version of your device's operating system to resolve any issues and ensure maximum security.</p></blockquote><ul><li data-list-item-id=\"e63510708b1332463619057c959ec1cd2\">Visit the <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-connecting-jade-via-usb#entry:442@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">USB</a> or <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-pairing-jade-via-bluetooth#entry:564@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Bluetooth</a> troubleshooting guides and attempt the relevant fixes depending on your issue.</li><li data-list-item-id=\"ee04bc775932f8ebd3e177783e0abd8f2\">If you can connect your Jade via USB, unlock your Jade with PIN,<span class=\"guide-markup\"> and try the following navigation:</span><br><br><span class=\"guide-markup\"><strong>Options</strong> \u2192 <strong>Device</strong> \u2192 <strong>Settings</strong> \u2192 <strong>Bluetooth</strong> \u2192 <strong>Status:Disabled</strong>.&nbsp;</span><br><br><span class=\"guide-markup\">Remember to unlock your Jade and re-enable Bluetooth if you use your Jade with mobile devices.</span><br>&nbsp;</li><li data-list-item-id=\"e501d75c69f0f20aa7e3a413db2d85b21\"><strong>Close</strong> all other applications on your computer that may be trying to communicate with Jade. For example, make sure the Blockstream app is closed if you are using the <a href=\"https://jadefw.blockstream.com/upgrade/fwupgrade.html\" target=\"_blank\" rel=\"noopener noreferrer\">Upgrade Web Portal</a>.</li><li data-list-item-id=\"ef59e94cc8e44fea50573c6a4af2efc54\">Turn off <strong>auto-lock</strong> in your companion device's system settings to prevent your device from going to sleep during the update process.</li><li data-list-item-id=\"e72a272f2888cccfc41298fe8a51ef6cb\">Attempt an update on a different device, communication method, or <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/update-jade-firmware#entry:436@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">upgrade option</a>. For example, if you are having trouble with a USB update, try using Bluetooth on the app (and vice versa).</li><li data-list-item-id=\"e182d268a18fcabc412e7613f70bc2641\">Try updating to a less recent version first by selecting <strong>Show All</strong> on the Web Upgrade Portal, then attempt an update to the latest version. For example, if you are on firmware 0.1.34, update to 0.1.45 and afterwards the most recent release if successful.</li><li data-list-item-id=\"e6e9c899a1989dd974cb22f34acef07c2\"><a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/perform-a-factory-reset#entry:779@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Perform a factory reset</a> on your Jade and try again. <strong>Make sure you have backed up your</strong> <strong>recovery phrase</strong>&nbsp;before doing this.</li></ul><h2 id=\"h_01HRWK164WGJDPESJEPWPX43E8\">WebUpgrader Compatibility Chart</h2><figure class=\"wysiwyg-table wysiwyg-table-align-left\"><figure class=\"table\"><table style=\"border-collapse:collapse;\"><tbody><tr style=\"height:22px;\"><td style=\"height:22px;width:20%;\"><strong>OS</strong></td><td style=\"height:22px;width:20%;\"><strong>Version</strong></td><td style=\"height:22px;width:20%;\"><strong>Driver Required</strong></td></tr><tr style=\"height:22px;\"><td style=\"height:45px;width:20%;\" rowspan=\"2\">Mac</td><td style=\"height:23px;width:20%;\">10.x - 12.x</td><td style=\"height:23px;width:20%;\"><a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-connecting-jade-via-usb#entry:442@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Yes</a>*</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:20%;\">13.x - 14.x</td><td style=\"height:22px;width:20%;\">No</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:20%;\">Windows</td><td style=\"height:22px;width:20%;\">10 - 11</td><td style=\"height:22px;width:20%;\"><a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-connecting-jade-via-usb#entry:442@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Yes</a>**</td></tr></tbody></table></figure></figure><p>* If your device requires a driver, make sure to choose the <i><strong>wchusbserial</strong>&nbsp;</i>option from the serial port prompt on your browser after the driver is installed successfully.</p><p>** Windows Update should install the driver automatically once your Jade is connected.</p>"}, "jade__fix-issues-connecting-jade-via-usb": {"title": "Fix issues connecting Jade via USB", "cat": "Blockstream Jade", "section": "Troubleshooting", "html": "<p>Jade is compatible with many different platforms, however each may require additional configurations to allow Jade to connect and communicate with your companion app device properly. Below are some recommended steps to assist in connecting Jade to each supported platform:</p><ul>\n<li><a href=\"#h_01H4PFV1R8CC9TCSBBMBTP5E6J\">MacOS</a></li>\n<li><a href=\"#h_01H4PFV7293FFKPKFVETX1FPH1\">Windows</a></li>\n<li><a href=\"#h_01H4PFVDM5QE2GE7E9KA5VQ2XX\">Linux</a></li>\n</ul><p>Before trying steps specific to your operating system, it may help to review the following if <strong>your computer is having issues recognizing Jade</strong>:</p><ol>\n<li>\n<strong>Restart the Blockstream app and reboot Jade</strong>: Close the app and reboot your Jade to establish a new connection.</li>\n<li>\n<strong>Update your operating system to the latest version</strong>: Jade may not be recognized on operating systems (OS) that are outdated or have reached their end-of-life (no longer supported by the vendor), so we recommend updating your computer's OS.</li>\n<li>\n<strong>Connect Jade to an alternate companion app</strong>: Pairing Jade with a <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">different application</a>, such as Sparrow, can help to determine if the issue is with your software or with Jade.</li>\n<li>\n<strong>Try a different USB cable</strong>: Certain USB cables may not allow data transfer and thus prevent your device from detected Jade.</li>\n<li>\n<strong>Avoid using USB adapters</strong>: Most adapters should work fine, however a low-quality accessory may also cause issues with Jade being detected.</li>\n<li>\n<strong>Plug into a different USB port</strong>: Your computer may have a defective USB port or one that is only used for charging.</li>\n<li>\n<strong>Close all applications on your computer and restart your system</strong>: You may have an application open that is trying to communicate with Jade and thus blocking the port from being used by your intended app.</li>\n</ol><h2 id=\"h_01H4PFV1R8CC9TCSBBMBTP5E6J\">MacOS</h2><h3 id=\"h_01HEQY336BYWMTDHWRD4J6E5FV\">Option #1: Jade Not Recognized, Receiving Error Messages, or Upgrade Issues</h3><p>If Jade is not recognized or you are experiencing error messages on your Jade or companion app while your device is connected, you may need to install an additional driver.</p><ol>\n<li>Download <a href=\"https://greenupdate.blockstream.com/desktop/drivers/CH34XSER_MAC.ZIP\">this driver</a> and navigate to the CH34XSER_MAC folder found in your downloads once completed.</li>\n<li>Open the folder and double-click <strong>CH34xVCPDriver.pkg</strong>.</li>\n<li>Continue through the installation helper until you see the Success message. If you encounter a \"System Extension Blocked\" error, choose to <strong>Open System Settings</strong> and select <strong>Allow</strong> under the prompt that shows that&nbsp;<strong>CH34xVCPDriver</strong>&nbsp;was blocked from loading.</li>\n<li>Reboot Jade and try again. If you are still having issues, you may need to reboot your computer for the changes to take effect.</li>\n</ol><h3 id=\"h_01HEQY336BG63PH412WBQZZB9X\">Option #2: If Jade is Still Not Recognized</h3><p>If Jade is still not recognized by your computer, you may need to install a relevant driver.</p><ol>\n<li>Download the&nbsp;<a href=\"https://www.silabs.com/documents/public/software/Mac_OSX_VCP_Driver.zip\">CP210x VCP Mac OSX Driver</a>&nbsp;and navigate to the <strong>macOS_VCP_Driver&nbsp;</strong>folder found in your downloads&nbsp;once completed.</li>\n<li>Open the folder and double-click&nbsp;<strong>SiLabsUSBDriverDisk.dmg</strong>,&nbsp;then select I<strong>nstall CP210x VCP Driver</strong>.&nbsp;</li>\n<li>Continue through the installation helper until you see the Success message. If you encounter a \"System Extension Blocked\" error, choose to <strong>Open System Settings</strong> and select <strong>Allow</strong> under the prompt that shows that CP210xVCPDriver was blocked from loading.</li>\n<li>Unplug Jade and reboot your machine for the changes to take effect.</li>\n</ol><h2 id=\"h_01H4PFV7293FFKPKFVETX1FPH1\">Windows</h2><h3>Option #1: Jade Not Recognized or Upgrade Issues</h3><p>If Jade is not recognized by your computer, you may need to install a relevant driver.</p><ol>\n<li>Download <a href=\"https://www.wch-ic.com/download/file?id=330\">this driver</a>&nbsp;and select the<strong>&nbsp;</strong>folder found in your downloads folder once completed.</li>\n<li>Click&nbsp;<strong>Extract all</strong> near the top of the File Explorer window while in the driver folder and choose <strong>Setup.exe</strong> to install the driver.</li>\n<li>Unplug Jade and reboot your machine for the changes to take effect.</li>\n</ol><h3 id=\"h_01JBEY3AS445CS8ACKBB9YDMBW\">Option #2: If Jade is Still Not Recognized</h3><p>If Jade is not recognized by your computer, you may need to install a separate relevant driver.</p><ol>\n<li>Download the <a href=\"https://www.silabs.com/documents/public/software/CP210x_Universal_Windows_Driver.zip\">CP210x Universal Windows Driver</a> and select the<strong>&nbsp;</strong>folder found in your downloads&nbsp;once completed.</li>\n<li>Click&nbsp;<strong>Extract all</strong> near the top of the File Explorer window while in the <strong>CP210X_Universal_Windows_Driver</strong> folder.</li>\n<li>Once extracted, check the box next to the <strong>silabser</strong> file with the <strong>Setup Information</strong> type, right-click and select <strong>Install</strong> from the drop-down.</li>\n<li>Choose <strong>Open</strong> and continue through the installation by allowing the driver to make changes to your device. You will then see a message that the driver was installed successfully.</li>\n<li>Unplug Jade and reboot your machine for the changes to take effect.</li>\n</ol><h2 id=\"h_01H4PFVDM5QE2GE7E9KA5VQ2XX\">Linux</h2><h3 id=\"h_01HEQY336BYFMKN8Z1ZKFXRSH6\">Option #1: Jade Not Recognized</h3><p>If Jade is not recognized by your computer, you may need to add your user to the appropriate group.</p><ol>\n<li>Add your user to the <strong>dialout</strong>,&nbsp;<strong>plugdev</strong>, or <strong>uucp</strong>&nbsp;group using the following commands:<br><br><code>sudo adduser yourusername dialout</code>&nbsp;or<br><code style=\"font-size:15px;\">sudo usermod -a -G dialout yourusername</code><br><br><code>sudo adduser yourusername plugdev</code>&nbsp;or<br><code style=\"font-size:15px;\">sudo usermod -a -G plugdev yourusername</code><br><br><code>sudo adduser yourusername uucp</code>&nbsp;or<br><code style=\"font-size:15px;\">sudo usermod -a -G uucp yourusername</code><br>&nbsp;</li>\n<li>Unplug Jade and reboot your machine for the changes to take effect.</li>\n</ol><h3 id=\"h_01HEQY336BYYCS6300GXPM8M1A\">Option #2: Error Messages when Using Jade</h3><p>If you are experiencing error messages on your Jade, this may be due to a known bug caused by Linux distributions related to auto-suspend.</p><ol>\n<li>\n<p>Create a custom udev rule: <strong>/etc/udev/rules.d/21-jade.rules</strong><br>&nbsp;</p>\n<pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">ATTRS{idProduct}==\"55d4\",\nATTRS{idVendor}==\"1a86\",\nSUBSYSTEM==\"usb\",\nTEST==\"power/control\",\nATTR{power/control}=\"on\",\nGROUP=\"plugdev\",\nMODE=\"0660\"</code></pre>\n<p>And then run:</p>\n<p><code>udevadm control --reload-rules &amp;&amp; udevadm trigger</code>&nbsp;</p>\n</li>\n<li>Unplug Jade and reboot your machine for the changes to take effect.</li>\n</ol><p>&nbsp;</p>"}, "jade__fix-issues-pairing-jade-via-bluetooth": {"title": "Fix issues pairing Jade via Bluetooth", "cat": "Blockstream Jade", "section": "Troubleshooting", "html": "<p>Jade is compatible with iOS and Android devices using Bluetooth. However, a poor pairing can sometimes cause connectivity issues with your companion device. Only the <strong>mobile</strong> version of the Blockstream app currently supports pairing with Jade via Bluetooth. It is normal for Jade to not be recognized when using a computer.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/430-9941.png?v=13\"/></figure><blockquote class=\"note\"><p><strong>Note:</strong> If the troubleshooting steps below do not resolve your issue, it may help to <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/perform-a-factory-reset#entry:779@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">factory reset</a> Jade, <strong>reboot your phone</strong>, or try pairing on another device to rule out mobile-specific errors.</p></blockquote><h2 id=\"resolve-bluetooth-issues\">Resolve Bluetooth Issues</h2><h3 id=\"connection-timeout-or-pairing-error\">Connection Timeout or Pairing Error</h3><p>Completely resetting all pairing information is often effective in resolving timeout or pairing issues.</p><ol>\n<li>In your phone's system settings, <strong>forget</strong> the Jade device from the Bluetooth list. Then, reboot both your phone and the Jade device. Try to pair again using the Blockstream App. If unsuccessful after a few attempts, continue with the steps below.</li>\n<li>On Jade, try\u00a0<strong>Reset Pairings</strong>.<ul>\n<li>Uninitialized Jade: Navigate to <strong>Options</strong> \u2192 <strong>Settings</strong> \u2192 <strong>Bluetooth</strong> \u2192 <strong>Reset Pairings</strong>.</li>\n<li>Initialized Jade: Access a session via USB or QR login, then navigate to <strong>Options</strong> \u2192 <strong>Settings</strong> \u2192 <strong>Bluetooth</strong> \u2192 <strong>Reset Pairings</strong>.</li>\n</ul>\n</li>\n<li>In the Blockstream app, go to <strong>App Settings</strong> and <strong>disable</strong> Tor or other custom network configurations. Then, force close the app completely.</li>\n<li>Retry pairing. When the pairing codes appear on both Jade and your phone, confirm the code on Jade <strong>first</strong>, then on your phone.</li>\n</ol><h3 id=\"jade-not-recognized\">Jade Not Recognized</h3><p>If Jade is not appearing in the Bluetooth list or connection attempts fail, follow these steps:</p><ol>\n<li>Confirm that Bluetooth is enabled on Jade:<ul>\n<li>Uninitialized Jade: Navigate to <strong>Options</strong> \u2192 <strong>Settings</strong> \u2192 <strong>Bluetooth</strong> \u2192<strong> Status: Enabled</strong>.</li>\n<li>Initialized Jade: Log in via USB or QR, then go to <strong>Options </strong>\u2192<strong> Device</strong> \u2192<strong> Settings </strong>\u2192 <strong>Bluetooth </strong>\u2192 <strong>Status: Enabled</strong>\n</li>\n</ul>\n</li>\n<li>Ensure you are running a firmware version that supports Bluetooth. If unsure, update to a radio-enabled firmware using the <a href=\"https://jadefw.blockstream.com/upgrade/fwupgrade.html\" rel=\"noopener noreferrer\" target=\"_blank\">Upgrade Web Portal</a>.</li>\n<li>On your mobile phone, check the system-level settings for the Blockstream app:<ul>\n<li>Ensure <strong>Bluetooth permissions</strong> are <strong>enabled</strong>.</li>\n<li>\n<strong>Disable Do Not Disturb </strong>on your phone, as it may block permission prompts.</li>\n</ul>\n</li>\n<li>\n<p>For Android 11 or earlier: <strong>Enable location services</strong> for the Blockstream app.</p>\n<blockquote><p><strong>Note:</strong> This is a platform requirement\u2014the Blockstream app does not use or store your location.</p></blockquote>\n</li>\n</ol>"}, "jade__fix-issues-scanning-qr-codes": {"title": "Fix issues scanning QR codes", "cat": "Blockstream Jade", "section": "Troubleshooting", "html": "<p><a href=\"https://store.blockstream.com/products/jade-plus\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Plus</a> is capable of communicating with a companion app solely using QR codes, which requires scanning with the cameras on both Jade Plus and your desktop or mobile phone. Below are several tips that can improve the scanning performance, speed, and reliability while using each device.&nbsp;</p><blockquote class=\"note\">\n<strong>Note:</strong> QR mode supports Bitcoin transactions only. If you are trying to send or receive Liquid assets, this is not a scanning issue. Connect Jade to the Blockstream app using USB or Bluetooth instead.</blockquote><p>In general, the best experience will come from:</p><ul>\n<li>Using a companion device with a <strong>large screen</strong> and a <strong>high quality camera</strong>, such as those found on mobile phones.</li>\n<li>Improving your <strong>lighting conditions</strong> until QR codes scan more easily, which usually comes from minimizing shadows, reflections, and glare.</li>\n</ul><h2 id=\"h_01HK58Y6CXFH90VM7EPYVVAGEW\">Improve Scanning with Jade's Camera</h2><p>The following tips will improve scanning QRs that are displayed on your companion device's screen, which Jade Plus's built-in camera will read:</p><ul>\n<li>Turn off <strong>Dark Mode</strong> in your companion device's system or app settings, which can cause high camera sensitivity leading to poor performance.</li>\n<li>Adjust the distance at which you place Jade in relation to the QR codes. Typically, Jade Plus being <strong>further away</strong> than assumed to be ideal will lead&nbsp;to better scanning.</li>\n<li>Move to different lighting conditions (natural light is usually helpful).</li>\n<li>Change the companion app's <strong>QR density</strong> to medium or low (if available on your specific platform).</li>\n<li>Zoom in or <strong>increase the size</strong> of the QR codes on screen (if available on your specific platform).</li>\n<li>\n<strong>Clean</strong> the protective lens covering Jade's camera to ensure there are no obstructions.</li>\n<li>\n<a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">If scanning a SeedQR</a>, ensure that it is large enough and high-contrast (white background, well-marked black pixels).</li>\n</ul><h2 id=\"h_01HK58Y6CXB45403SBXDSD2SPZ\">Improve Scanning with Companion Device's Camera</h2><p>The following tips will improve scanning QRs that are displayed on Jade's screen, which your companion device will read:</p><ul>\n<li>While a Partially Signed Bitcoin Transaction (PSBT) QR code is displayed on Jade Plus, select <strong>Options </strong>\u2192&nbsp;<strong>QR Density</strong> and change this setting to <strong>Low</strong>&nbsp;(xpub QR codes already default to Low).</li>\n<li>Turn down Jade Plus's screen brightness by selecting <strong>Options</strong> from the main menu, then <strong>Device </strong>\u2192&nbsp;<strong>Settings</strong> \u2192 <strong>Display </strong>\u2192<strong> Display Brightness</strong>.</li>\n<li>Try a companion app that supports <strong>auto-focus </strong>(e.g. Nunchuk), or close and reopen your companion device's camera to reset the focus.</li>\n<li>If on a laptop, use a native or third-party application to use your <strong>phone's camera</strong> instead of the built-in web camera, which may be of low quality (i.e. Continuity Camera supported on Apple devices or other solutions for Android/Windows/Linux). Alternatively you can record the QR codes with your mobile device, then scan them off of your phone's larger screen with your webcam.&nbsp;</li>\n</ul>"}, "jade__perform-a-factory-reset": {"title": "Perform a factory reset", "cat": "Blockstream Jade", "section": "Troubleshooting", "html": "<p>If your Jade is experiencing issues or you want to erase all stored information from your device, you can perform a factory reset.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-33.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-34.png?v=13\"/></figure><blockquote class=\"warning\"><p><strong>Warning:</strong> Before continuing, make sure you have your recovery phrase written down and that you are confident in your recovery process. If you do not, you will <strong>lose access</strong> to all funds stored in your wallet.</p></blockquote><h2 class=\"num-list\">Method #1: From Boot Menu</h2><p>Turn on Jade and access the boot menu by clicking (<strong>not holding</strong>) the select button once while the logo screen is showing. Select <strong>Factory Reset</strong> and enter the given confirmation number on-screen to erase all data from Jade.</p><p></p><p></p><h2 class=\"num-list\" id=\"h_01K97Y9V59FWJK86515Z7BZ5PX\">Method #2: From Options</h2><p>Navigate to <strong>Options</strong> \u2192 <strong>Device</strong> \u2192 <strong>Factory Reset</strong>. Enter the given confirmation number on-screen to erase all date from Jade.</p>"}, "jade__use-ledger-nano-with-blockstream-app": {"title": "Use your Ledger Nano S or X with the Blockstream app", "cat": "Blockstream Jade", "section": "Troubleshooting", "html": "<p>If you are having issues using your Ledger Nano S or X device with the Blockstream app, check that you are not running into a few common issues:</p><ul><li data-list-item-id=\"e832f2f662d380d4db6b685c6bd654ec9\">Make sure your Ledger Nano is turned <strong>ON</strong>, you've <strong>entered the PIN</strong>, and <strong>opened the Bitcoin Legacy app</strong></li><li data-list-item-id=\"e3be3cded724db03c4f45fdb1734a2c32\">Make sure the Ledger Live app is <strong>not open in the background</strong> while you use the Blockstream app</li><li data-list-item-id=\"ecdfae571c10aee58750538830bbeb48c\">On mobile, make sure that the Ledger Live app doesn't have any \"Open by default\" setting enabled</li><li data-list-item-id=\"ec0c741acc0d3c4a1d20f95fd1fcecbff\">Make sure you're running the <a href=\"#h_01GW4FRJXCRRRGC4QAX0HC02S2\">Bitcoin Legacy app</a></li></ul><h2 id=\"h_01GW4FRJXCRRRGC4QAX0HC02S2\">Run the Bitcoin Legacy app on your Ledger</h2><p>Ledger released an update for their Bitcoin app that causes the Blockstream app to not recognize your Ledger Nano device.</p><p>We recommend you use the Bitcoin Legacy app on your Nano device instead:</p><ol><li data-list-item-id=\"e18c0e890a96ddaa8c60cf5797c005289\">In Ledger Live, go to <strong>Settings</strong> \u2192 <strong>Experimental Features</strong> \u2192 <strong>Developer mode</strong> and toggle it <strong>ON</strong>. This enables you to download the Bitcoin Legacy app.</li><li data-list-item-id=\"e8943a877e16bdfeef9690d4ec8ab671f\">Go to <strong>My Ledger</strong> \u2192 <strong>Connect</strong> your Ledger Nano S or X device \u2192 <strong>Allow</strong> Ledger Manager on your device \u2192 <strong>Search</strong> for \"Bitcoin Legacy\" and <strong>Install</strong> it. You might need to delete other apps currently on your Ledger device if you have no available space, which you can do safely \u2014 removing an app is not a risk for your funds; you can reinstall it later.</li><li data-list-item-id=\"ebfee447eb868bdbbb04d75eb654eb5a3\">From now on, when using your Ledger Nano S or X with the Blockstream app, simply open the \"Bitcoin Legacy\" app on your device.</li></ol>"}, "jade__how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle": {"title": "How does Jade protect my recovery phrase with a blind oracle?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p class=\"pw-post-body-paragraph kh ki iz kj b kk mf km kn ko mg kq kr ks mh ku kv kw mi ky kz la mj lc ld le is gb\"><a href=\"https://blockstream.com/jade\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a> uses oracle-enforced PIN protection to encrypt your Jade's <a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a>. This unique security model functions as a <strong>virtual secure element</strong> to provide extra protection for your funds while offering several key benefits.</p><h2 class=\"pw-post-body-paragraph kh ki iz kj b kk mf km kn ko mg kq kr ks mh ku kv kw mi ky kz la mj lc ld le is gb\" id=\"h_01K4WPTEVE5H3DRA72HJHM918C\">Oracle-enforced PIN Protection Explained</h2><p>During the Jade initialization process, you will be asked to create a unique PIN. This PIN is used in combination with a <a href=\"https://glossary.blockstream.com/blind-oracle/\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a>, managed by Blockstream, to encrypt Jade's key material - at which point it will need three secrets to decrypt your recovery phrase and spend funds:</p><ul>\n<li>User-generated unique PIN</li>\n<li>Jade secret</li>\n<li>Oracle secret</li>\n</ul><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle/17057492929817.png\" alt=\"virtual_secure_element.png\" width=\"400\" /></p><p>When you are ready to unlock Jade, you will be prompted to enter your PIN. The companion app (e.g. <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream app</a>) will then establish an encrypted channel with the blind oracle, allowing for the <strong>server</strong> <strong>secret</strong> to be sent to Jade - thus decrypting <strong>Jade's secret</strong> and allowing you to spend bitcoin.</p><p><strong>The blind oracle is truly blind</strong>. Your Jade device itself does not communicate with it. It does not know anything about you or your wallet data, and you can access it over Tor. <strong>It doesn't even know your actual PIN!&nbsp;</strong></p><p>To learn more about how this&nbsp;process works, <a href=\"https://help.blockstream.com/blockstream-jade/faqs/jade-security-model-faqs#entry:402@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">visit our FAQ</a>.</p><blockquote class=\"note\"><p><strong>Note:</strong> Jade only unlocks successfully if you enter the correct PIN. To prevent against brute-forcing, the oracle and Jade will <strong>delete</strong> their keys if you enter the wrong PIN <strong>three</strong> times. At this point, you must restore Jade with the recovery phrase.</p></blockquote><h2 id=\"h_01K4WPTEVE66MYXBZ4GJ4J44NE\">Benefits &amp; Tradeoffs of Oracle-Enforced PIN Protection</h2><p>Thanks to Jade's security model, the recovery phrase's strong encryption on on your device comes with some powerful <strong>benefits:</strong></p><ul>\n<li>Attackers with access to your Jade cannot steal your funds, as they would need to compromise <strong>both</strong> your local encrypted flash and the remote PIN oracle. The seed is encrypted with random keys split between the Jade device and a lock-out oracle.</li>\n<li>By not requiring a secure element and utilizing a PIN oracle instead, <strong>Jade is</strong> <strong>fully open-source</strong>.</li>\n</ul><p>With all things Bitcoin, however, this model does not come without <strong>tradeoffs</strong>, as you may need communication with Blockstream's blind oracle.&nbsp;<br><br>To avoid needing communication with Blockstream's oracle, you can:</p><ul>\n<li>\n<a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle#entry:1199@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">run your own PIN oracle</a>.</li>\n<li>unlock Jade using your <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-cases-for-temporary-signer#entry:1209@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase directly</a>&nbsp;(by scanning a <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-plus-air-gapped-with-seedqr#entry:765@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">SeedQR</a>, for example).</li>\n</ul><h2 id=\"h_01K4WPTEVFQSZZ0BKM5P0NAKZN\">The Details Matter</h2><p class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">Once you choose your PIN, an ephemeral Elliptic Curve <a class=\"au lg\" href=\"https://en.wikipedia.org/wiki/Diffie%E2%80%93Hellman_key_exchange\" target=\"_blank\" rel=\"noopener noreferrer\">Diffie Hellman exchange</a> (ECDH) exchange occurs with the remote oracle. An <a class=\"au lg\" href=\"https://en.wikipedia.org/wiki/Elliptic-curve_Diffie%E2%80%93Hellman\" target=\"_blank\" rel=\"noopener noreferrer\">ECDH</a> key exchange allows two separate entities with no previous knowledge of each other to generate a shared secret over public insecure channels. Using a known public key of the blind PIN oracle, an ECDH key exchange occurs, and the communications channel can be fully encrypted. <strong>Once the encrypted channel is established, the Jade and the remote oracle work together to create an </strong><a class=\"au lg\" href=\"https://en.wikipedia.org/wiki/Advanced_Encryption_Standard\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>AES256</strong></a><strong>&nbsp;key.</strong></p><p class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\" id=\"a041\">When creating a recovery phrase for a new wallet, <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-generate-my-recovery-phrase#entry:813@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">entropy is gathered from the pool</a>, and it encrypts the resulting key material for the recovery phrase using the AES256 key. This data can <strong>only be decrypted</strong> when you input the correct PIN on the Jade and establish a connection with the remote PIN oracle, mediated by the companion app. Since the oracle only has a part of the AES256 key, <strong>it is blinded to any of your wallet\u2019s keys and PIN</strong>. All data at rest is encrypted on the oracle.</p><blockquote class=\"note\"><p><strong>Remember:</strong> If you enter the PIN incorrectly three times, the oracle and Jade both delete the secret, requiring you to restore your wallet using the recovery phrase.</p></blockquote><p class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\" id=\"bdc8\">The newly-encrypted key material is then stored on the&nbsp;<a class=\"au lg\" href=\"https://docs.espressif.com/projects/esp-idf/en/v4.2/esp32/security/flash-encryption.html\" target=\"_blank\" rel=\"noopener noreferrer\">encrypted off-chip flash</a>&nbsp;of the Jade and protected by&nbsp;<a class=\"au lg\" href=\"https://docs.espressif.com/projects/esp-idf/en/v4.2/esp32/security/secure-boot-v2.html\" target=\"_blank\" rel=\"noopener noreferrer\">Secure Boot</a>. Secure Boot is a technology that prevents unsigned boot firmware from running on your Jade, such as a compromised firmware image from an attacker. <strong>It ensures that only firmware you intend to run is used to boot the device.</strong></p><p class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">Your Blockstream Jade now has a robust encrypted recovery phrase.</p>"}, "jade__why-doesnt-jade-have-a-secure-element": {"title": "Why doesn't Jade have a secure element?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<blockquote class=\"note\">\n<strong>Note:</strong> Jade is a fully offline, <a href=\"https://glossary.blockstream.com/cold-storage-security/\" target=\"_blank\" rel=\"noopener noreferrer\">cold storage</a> device and your recovery phrase never leaves your hardware wallet. Even if your oracle is unavailable, you can still access your funds using Jade and your recovery phrase. <strong><a href=\"https://help.blockstream.com/blockstream-jade/faqs/jade-security-model-faqs#entry:402@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Learn more</a> about Jade's security model</strong>.<p>Secure elements are closed-source chips that are integrated into hardware wallets in order to protect them from physical attacks. They are typically covered by NDAs, increase the cost of the hardware wallet, and prevent users from building their own device.</p><p>Instead of a secure element, <a href=\"https://blockstream.com/jade/\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a> offers a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">unique security model</a> that allows it to remain <strong>fully open-source</strong> while <strong>also</strong> <strong>protecting you from physical attacks</strong>. Jade achieves similar (if not better) security from this potential threat by acting as a \"<strong>virtual\" secure element</strong>.</p><p>The <a href=\"https://glossary.blockstream.com/blind-oracle/\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a> model that Jade uses is fully open source, and is truly blind. It knows nothing about Jade wallet data, and doesn't even know the user's actual PIN. Users may use Blockstream's blind oracle to protect their wallet, or <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle#entry:1199@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">they may run their own</a>.</p><p>Don't trust us? <a href=\"https://github.com/Blockstream/Jade\" target=\"_blank\" rel=\"noopener noreferrer\">Verify the code</a>!</p><p>&nbsp;</p><div class=\"video-iframe\"><iframe class=\"responsive-iframe\" title=\"YouTube video player\" src=\"https://www.youtube.com/embed/ad3titeu9uY\" width=\"560\" height=\"315\" frameborder=\"0\"></iframe></div><p>&nbsp;</p></blockquote>"}, "jade__jade-security-model-faqs": {"title": "Jade security model FAQs", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p>The following FAQs cover common misunderstandings and misconceptions about Jade's security model options. If you have any further questions about Jade, please feel free to <a href=\"https://help.blockstream.com/hc/en-us/requests/new?ticket_form_id=8613\" target=\"_blank\" rel=\"noopener noreferrer\">reach out</a>.</p><p>&nbsp;</p><div class=\"video-iframe\"><iframe class=\"responsive-iframe\" title=\"YouTube video player\" src=\"https://www.youtube.com/embed/ad3titeu9uY\" width=\"560\" height=\"315\" frameborder=\"0\"></iframe></div><p>&nbsp;</p><h2 id=\"h_01K57785TQDXPD6DHJJ2SDRB8J\">Does Jade send wallet information to a server?</h2><p><strong>No</strong>, Jade does not send wallet information to a server. Jade offers two different security models, one of which strongly encrypts your wallet in combination with a <a href=\"https://glossary.blockstream.com/blind-oracle/\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a>\u2014while the other model allows Jade to be used statelessly without any blind oracle. Your <strong>seed phrase never leaves Jade</strong> and remains highly encrypted on your device.</p><h2 id=\"h_01K57785TQRZTX840AFSRN28XX\">What is a blind oracle?</h2><p>A blind oracle functions as a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">virtual secure element</a>. It holds the decryption mechanism to your wallet off-device, which makes Jade alone <strong>invulnerable</strong> to physical key extraction. This is unlike typical secure element devices which hold everything needed to extract your keys on the actual hardware device itself.</p><p>You can decrypt your wallet by entering your PIN on Jade and allowing your companion app to give you the decryption key via an encrypted channel. Jade is never connected to the internet or communicating with a blind oracle directly, and <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-plus-air-gapped-with-seedqr#entry:765@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">you can even do this process air-gapped via QR codes</a><strong>.</strong></p><h2 id=\"h_01K57785TQSPZZ9YWAT9NQMQW4\">Do all hardware wallets communicate with online companion apps?</h2><p><strong>Yes</strong>. Bitcoin runs on the internet and therefore its users are required to interact with the internet to send transactions. Jade's communication is <strong>no different than any other hardware wallet</strong>; it retrieves the decryption key by communicating with a companion app, which receive messages from an online app in order to fetch balances and show transaction details for confirmation on the device.&nbsp;</p><p>A benefit of hardware wallets (including Jade) is that they are not connected to the internet directly and instead rely on their companion app to do this for them.</p><h2 id=\"h_01K57785TQYBFJ3WD3C3FXDG3S\">Do I have to use a blind oracle? What happens if my oracle is not available?</h2><p><strong>No</strong>. If you want to unlock your Jade without using a companion app or blind oracle, you are free to do so by <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase#entry:413@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">scanning a SeedQR</a> for quick wallet access or by <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/restore-recovery-phrase-to-jade#entry:1040@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">manually entering your recovery phrase</a>.</p><h2 id=\"h_01K57785TQDK1EYJYJGET1C0ZX\">What are the benefits of using a blind oracle?</h2><p>Using a blind oracle to encrypt your wallet means there is <strong>nothing of value to steal from a locked Jade by itself</strong>. This is different than most other hardware wallets, which, as mentioned, store everything needed to extract your private keys on the device itself. In this way, Jade is unique in that it <strong>does not offer a single point of failure</strong>, and an attacker needs to hack two different entities (both the blind oracle and Jade) instead of just the hardware wallet alone.</p><h2 id=\"h_01K57785TQPRQZ4VRXEMR80PAR\">What do blind oracles know about my Jade or wallet?</h2><p><strong>Nothing</strong>. Blind oracles do not know your Bitcoin addresses, private keys, or<strong>&nbsp;even know your actual PIN </strong>(they also work over Tor). The only information a blind oracle stores is a hash of your PIN plus a nonce, allowing them to function completely \"blind\". <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle#entry:1199@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">You can use Jade with your own blind oracle</a> or one run by Blockstream.</p><h2 id=\"h_01K57785TQXNZT6XX8XW5K30D5\">What additional threat is added when using an oracle?</h2><p>Using a blind oracle <strong>does not pose any additional threat</strong> to your funds, as it is fully blind and does not know anything about your wallet data. In order to extract wallet information from Jade, an attacker would need to physically hack Jade <em>and</em> the blind oracle. Hacking or altering the blind oracle alone is not enough to extract any sensitive data.</p><h2 id=\"h_01K57785TQKFVJT9JS44CAQAHA\">Should I run my own blind oracle or use Blockstream's?</h2><p><strong>Whichever you prefer</strong>. Using Blockstream's blind oracle has the advantage of \"decentralizing\" your security without compromising any wallet information, however some users may still prefer to run their own blind oracle on a laptop or Raspberry Pi, for example.</p><h2 id=\"h_01K57785TQV0YS14W6NDK495X3\">Why does Jade use a blind oracle and not a secure element?</h2><p>We developed our unique security model using blind oracles as a way to avoid needing a secure element for wallet protection, <strong>which allows Jade to be truly open-source, more accessible and easy to DIY build yourself</strong>. Secure elements are typically covered by NDAs, are more expensive, and drastically increase the complexity of building a DIY device.</p><h2 id=\"h_01K57785TQKXTRE1APKGF6X0AV\">Does I have to use Jade with Blockstream app?</h2><p><strong>No</strong>. Jade works as a standalone signing device with <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">many popular wallet platforms</a>.</p>"}, "jade__blockstream-jade-vs-blockstream-app": {"title": "Blockstream Jade vs Blockstream App", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p><a href=\"https://blockstream.com/jade/\" target=\"_blank\" rel=\"noopener noreferrer\">Jade is a hardware wallet</a> that stores the <a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a> for your bitcoin and/or Liquid wallets. Hardware wallets increase the security of your funds by keeping the private keys required to spend your bitcoin or <a href=\"https://help.blockstream.com/liquid-network/faqs/what-are-liquid-assets#entry:822@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Liquid assets</a> on a secure, offline device.</p><p>Storing your recovery phrase on a phone or computer opens up potential attack vectors. For this reason, <strong>we recommend using&nbsp;a hardware wallet</strong> like Jade for additional protection.</p><p>The table below compares the use of the Blockstream app as a standalone software wallet versus pairing it with a Jade hardware wallet.</p><div class=\"mobile_table_scroll\"><figure class=\"table\"><table class=\"docutils align-default\"><thead><tr class=\"row-odd\"><th class=\"head wysiwyg-text-align-center\" style=\"padding:1px;\"><p class=\"wysiwyg-text-align-center\">Wallet</p></th><th class=\"head wysiwyg-text-align-center\" style=\"padding:1px;\"><p class=\"wysiwyg-text-align-center\">Type</p></th><th class=\"head wysiwyg-text-align-center\" style=\"padding:1px;\"><p class=\"wysiwyg-text-align-center\">Ideal Use</p></th><th class=\"head wysiwyg-text-align-center\" style=\"padding:1px;\"><p class=\"wysiwyg-text-align-center\">Benefits/Features</p></th></tr></thead><tbody><tr class=\"row-even\"><td class=\"wysiwyg-text-align-center\" style=\"padding:1px;\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app/48088934930585.png\" alt=\"blks_logo_mono_black_rgb.png\" width=\"177\" height=\"89\" /></td><td class=\"wysiwyg-text-align-center\" style=\"padding:1px;\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app/5299758177945.png\" alt=\"sww.png\" width=\"30\" /><br><strong>Software Wallet</strong></td><td class=\"wysiwyg-text-align-center\" style=\"padding:1px;\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app/5299714817945.png\" alt=\"trades.png\" width=\"30\" /><br><strong>Quick, everyday spending</strong></td><td class=\"wysiwyg-text-align-center\" style=\"padding:1px;\">No extra device needed<br>Quick login via biometrics or PIN<br>Use Blockstream app to access Jade</td></tr><tr class=\"row-odd\"><td class=\"wysiwyg-text-align-center\" style=\"padding:1px;\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app/5299925952665.png\" alt=\"jadefull.png\" width=\"124\" height=\"54\" /></td><td class=\"wysiwyg-text-align-center\" style=\"padding:1px;\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app/5299708604185.png\" alt=\"hww.png\" width=\"50\" /><br><strong>Hardware Wallet</strong></td><td class=\"wysiwyg-text-align-center\" style=\"padding:1px;\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app/5299722943769.png\" alt=\"buy_security_tokens.png\" width=\"30\" /><br><strong>Long-term </strong><a href=\"https://glossary.blockstream.com/cold-storage-security/\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>cold storage</strong></a></td><td class=\"wysiwyg-text-align-center\" style=\"padding:1px;\">Keys remain offline<br>Enable <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/set-up-watch-only-for-2fa-accounts#entry:701@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">watch-only</a> mode to receive without device<br>Add a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-a-passphrase-work-on-jade#entry:689@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">passphrase</a> for hidden/duress wallets</td></tr></tbody></table></figure></div><p>*<a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">2FA Protected</a> accounts reduce the risk of unauthorized spending. Both software and hardware wallets can use this feature for additional security.</p><h2 id=\"h_01JVZ7P69M6SWVSZ7MCQXTZ82M\">Using Jade with the Blockstream App</h2><p>Jade stores your private keys, but still requires a compatible interface to manage funds. We&nbsp; recommend Jade's native companion, the <a href=\"https://blockstream.com/app/\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream app</a>, though Jade also supports platforms like <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum#entry:426@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Electrum</a>.</p><blockquote class=\"note\"><p><strong>Note:</strong> In the Blockstream app, you can choose between two security models when using Jade: <strong>Standard (Singlesig)</strong> or <strong>2FA Protected (Multisig Shield)</strong>. <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Learn more</a>.</p></blockquote><p>After <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/jade-overview#entry:198@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">setting up your Jade</a> with the Blockstream app, you can begin <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/receive-bitcoin-using-jade#entry:786@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">receiving</a>, <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/send-bitcoin-using-jade#entry:859@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">sending</a>, and securely storing your bitcoin and Liquid assets.</p><p>Blockstream Jade is compatible with the Blockstream app on Mac, Windows, Linux, iOS, and Android.</p>"}, "jade__how-does-a-passphrase-work-on-jade": {"title": "How does a passphrase work on Jade?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p>If you select the <strong>Advanced</strong> option when setting up your <a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app#entry:560@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a>, you will be asked whether or not you want to <a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/set-up-a-bip39-passphrase#entry:1107@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">enable a passphrase</a>. Enabling a passphrase gives you the ability to add an extra layer of security to your funds by requiring an additional piece of information to access your wallet. Jade uses the BIP39 passphrase standard.</p><p>&nbsp;</p><div class=\"video-iframe\"><iframe class=\"responsive-iframe\" title=\"YouTube video player\" src=\"https://www.youtube.com/embed/QKczFUUcXw4\" width=\"560\" height=\"315\" frameborder=\"0\"></iframe></div><p>&nbsp;</p><h3 id=\"h_01KJ61WQH1F7QBHTTQTSTH60D1\">How do passphrases work?</h3><p>Simply, the passphrase you enter is added to your Jade's <a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a> or SeedQR and is used to create your wallet.</p><p>To demonstrate this, let's assume our Jade generated the following recovery phrase.</p><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">arrow garment kite truth yellow pelican roast latin discover jewel describe merry polar equip pistol next forest dignity kick word steel seminar actual genuine\n</code></pre><p>If you enable the passphrase feature and enter a passphrase of \"<em>abc</em>\", the information used to generate your wallet will be your <em>recovery phrase</em> <strong>and </strong>\"<em>abc</em>\". However if you login to your Jade again and enter a different passphrase, for example \"<em>abcd</em>\", an entirely different wallet will be created than before.</p><p>Your Jade will only store your one recovery phrase, but any number of passphrases can be entered to change the wallet you will log into upon each session. This means even a <strong>slight change to your intended passphrase</strong> will lead to a different wallet, so make sure to keep it backed up and protected!</p><ul>\n<li>\n<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Recovery phrase: \"</span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><span class=\"wysiwyg-underline\">arrow garment kite ..... seminar actual genuine</span></em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\" + Passphrase: \"</span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><span class=\"wysiwyg-underline\">bitcoin</span></em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\" = </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Wallet A</strong>\n</li>\n<li>\n<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Recovery phrase: \"</span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><span class=\"wysiwyg-underline\">arrow garment kite ..... seminar actual genuine</span></em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\" + Passphrase: \"</span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><span class=\"wysiwyg-underline\">bitcoins</span></em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\" = </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Wallet B</strong>\n</li>\n<li>\n<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Recovery phrase: \"</span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><span class=\"wysiwyg-underline\">arrow garment kite ..... seminar actual genuine</span></em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\" + Passphrase: \"</span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><span class=\"wysiwyg-underline\">bit coin</span></em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\" = </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Wallet C</strong>\n</li>\n<li>\n<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Recovery phrase: \"</span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><span class=\"wysiwyg-underline\">arrow garment kite ..... seminar actual genuine</span></em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\" + Passphrase: \"<span class=\"wysiwyg-underline\">(field left empty)</span></span><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\" = </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Wallet D</strong>\n</li>\n</ul><blockquote class=\"note\"><p><strong>Note:</strong> Your Blockstream Jade will not store your passphrase, so you will need to <strong>enter it every time you login</strong>.</p></blockquote><h3 id=\"h_01KJ61WQH1VBZMHCHT53ZNFWPX\">Why would I use a passphrase?</h3><p>There are several reasons why you might want to enable a passphrase:</p><ul>\n<li>Passphrases give you the ability to use different wallets on the same network, with only one Jade. This is because each unique passphrase leads to a different wallet.</li>\n<li>Using a passphrase provides an additional layer of security - since any possible attacker can gain access to your PIN and recovery phrase, but will be unable to spend your funds without your passphrase.</li>\n</ul><h3 id=\"h_01KJ61WQH1ABGKFA59PGF8T96E\">Why would I choose not to use a passphrase?</h3><p>You may choose to avoid using a passphrase because:</p><ul>\n<li>You will need to enter the passphrase every time you log in to your Jade.</li>\n<li>If you forget or lose your passphrase, you will permanently lose access to your funds - <strong>even if you have your recovery phrase</strong>.</li>\n</ul>"}, "jade__how-does-jade-generate-my-recovery-phrase": {"title": "How does Jade generate my recovery phrase?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p id=\"a252\" class=\"pw-post-body-paragraph kh ki iz kj b kk mf km kn ko mg kq kr ks mh ku kv kw mi ky kz la mj lc ld le is gb\">Your private keys (derived from your <a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a>) require strong randomness to avoid loss of funds. Attackers can grind private keys and search for weakly generated ones, hoping to steal funds that land on the corresponding addresses. <br><br>Jade uses a multi-faceted approach to ensure your private keys have sufficient randomness to prevent this type of attack.</p><h2 id=\"h_01JY1PW6W6T62NWVRY0PHM3J6F\" class=\"pw-post-body-paragraph kh ki iz kj b kk mf km kn ko mg kq kr ks mh ku kv kw mi ky kz la mj lc ld le is gb\">Entropy Sources</h2><p class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">While Jade is running, entropy is generated from various independent sources and sensors:</p><ul>\n<li class=\"mk ml iz kj b kk kl ko kp ks mm kw mn la mo le mp mq mr ms gb\">User input</li>\n<li class=\"mk ml iz kj b kk mt ko mu ks mv kw mw la mx le mp mq mr ms gb\">CPU counters</li>\n<li class=\"mk ml iz kj b kk mt ko mu ks mv kw mw la mx le mp mq mr ms gb\">Battery state</li>\n<li class=\"mk ml iz kj b kk mt ko mu ks mv kw mw la mx le mp mq mr ms gb\">Ambient temperature</li>\n<li class=\"mk ml iz kj b kk mt ko mu ks mv kw mw la mx le mp mq mr ms gb\">Multiple images taken with camera during boot</li>\n<li class=\"mk ml iz kj b kk mt ko mu ks mv kw mw la mx le mp mq mr ms gb\">Built-in cryptographic-strength hardware number generator</li>\n<li class=\"mk ml iz kj b kk mt ko mu ks mv kw mw la mx le mp mq mr ms gb\">Entropy from the Blockstream companion app</li>\n</ul><p id=\"f7a9\" class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">The built-in hardware cryptographic random number generator (CRNG) derives entropy from various sources, one of which is the included radio (used for Bluetooth). If you <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/disable-bluetooth#entry:1146@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">disable radio</a> with the optional \u201cNo-Radio\u201d firmware, the CRNG loses that source and, therefore, has reduced entropy. To mitigate this, we use an ESP32 API call named \u201cbootloader_random_enable()\u201d to sample raw radio noise only during boot, which is then added to the entropy pool along with the sources mentioned above.</p><h2 id=\"h_01JY1PW6W6BQPHTS7A9NG72XH2\" class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">Recovery Phrase Generation</h2><p>When starting your Jade, it uses an accumulator, <a href=\"https://github.com/bitcoin/bitcoin/blob/master/src/random.cpp\" target=\"_blank\" rel=\"noopener noreferrer\">similar to the one Bitcoin Core uses</a>. This accumulator stores a 32-byte state, generated by a SHA512 hashing of its previous state along with the entropy sources provided above.</p><p>The result of the SHA512 is split in two:</p><ul>\n<li>Half becomes the new 32-byte state</li>\n<li>Half is provided as the <a href=\"https://github.com/Blockstream/Jade/blob/master/main/random.c#L66\" target=\"_blank\" rel=\"noopener noreferrer\">entropy requested </a>and fed to the standard BIP39 entropy to <span style=\"font-weight:400;\">recovery phrase</span> function.</li>\n</ul><p>The hashing function is called each time entropy is requested as well as any time you touch a button or the wheel.</p>"}, "jade__how-do-i-set-up-a-wallet-erase-pin": {"title": "How do I set up a wallet-erase PIN?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p>A <strong>Wallet-Erase PIN</strong>, or a <em>duress</em> PIN,\u00a0is an alternate PIN that you can enable which will automatically delete your recovery phrase from your Jade if entered. This feature is especially useful in the event of a physical threat, as you can provide this PIN to an attacker and your wallet will <strong>no longer be accessible via PIN</strong>. It will also appear as if your Jade simply experienced a failure by displaying the message \"Internal Error\".</p><blockquote class=\"warning\"><p><strong>Warning:</strong> If you set a wallet-erase PIN and subsequently enter it upon login, there is no way to regain access to your funds except by restoring using your recovery phrase. Make sure you have a backup before proceeding.</p></blockquote><h2 id=\"h_01KC7WPQBWG18VWZWZNFQHM2G5\">Setup Wallet-Erase PIN</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-36.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\"><strong>Log in</strong> to your Blockstream Jade and select <strong>Settings</strong>,\u00a0then <strong>Wallet-Erase PIN</strong>.</p>\n</div><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\"><strong>Read</strong> the warning message to understand that this PIN will erase your recovery phrase, <strong>meaning your funds will no longer be accessible using your Jade.</strong> You will need a recovery phrase backup to restore your wallet if this PIN is entered. Select <strong>I understand</strong> when you are ready.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\"><strong>Enter</strong> and <strong>confirm</strong> your desired Wallet-Erase PIN. You will then be shown your Wallet-Erase PIN where you will also have the option to <strong>Change</strong> or <strong>Disable</strong> it, if desired.</p>\n</div><p> </p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-37.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">If your <strong>Wallet-Erase PIN is ever entered during login</strong>, an \"Internal Message\" error will be shown and Jade will return to the initialization process. You will then need to set up a new wallet or <strong>restore from your recovery phrase backup</strong> to use your Jade again.</p>\n</div><p></p>"}, "jade__what-is-anti-exfil-and-how-does-it-work": {"title": "What is Anti-Exfil and how does it work?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p id=\"f17e\" class=\"pw-post-body-paragraph kh ki iz kj b kk mf km kn ko mg kq kr ks mh ku kv kw mi ky kz la mj lc ld le is gb\">A compromised hardware wallet can slowly leak the user\u2019s private key(s) through the signatures it creates, even if those keys were generated with strong randomness. <strong><a href=\"https://blockstream.com/jade\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a> implements Anti-Exfil</strong> to mitigate against this kind of attack.</p>\n<p class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">To fully understand how this attack works and how to mitigate it, first let's briefly discuss how signatures work in Bitcoin.</p>\n<p id=\"bbe3\" class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">Bitcoin's Elliptic Curve Digital Signature Algorithm (ECDSA) combines a random private key with a <em class=\"lf\">nonce</em> (a one-time value intended to add randomness to the signature) to produce a transaction signature that other Bitcoin full nodes can validate. Anyone can guess your private key based on your signatures without this random nonce, which would quickly lead to a loss of funds.</p>\n<p class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\"><strong>Compromised hardware wallets could create a nonce that appears random but is not</strong>. The nonces could be known to an attacker ahead of time. Even worse, the hardware wallet could leak parts of the user\u2019s master private key into individual nonces, which would allow the attacker to guess every private key attributed to a person's wallet given a sufficient number of signatures.</p>\n<p id=\"c881\" class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">Anti-Exfil uses \u201csign-to-contract\u201d to ask Jade to use its signature nonce <strong>while cryptographically committing to some random data</strong> proposed by the (assumed uncompromised) host computer. The random data\u2019s hash is then combined with the signature nonce to produce the signature.</p>\n<p class=\"pw-post-body-paragraph kh ki iz kj b kk kl km kn ko kp kq kr ks kt ku kv kw kx ky kz la lb lc ld le is gb\">By adding this host-provided randomness into the nonce via sign-to-contract, Anti-Exfil ensures that the nonce is re-randomized, preventing malicious leakage.</p>"}, "jade__what-is-a-seedqr": {"title": "What is a SeedQR?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p>SeedQR is a <a href=\"https://github.com/SeedSigner/seedsigner/blob/dev/docs/seed_qr/README.md\" target=\"_blank\" rel=\"noopener noreferrer\">standard developed by SeedSigner</a> for encoding a <a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a> as a human-transcribable QR code. Simply put, it is another way to store a recovery phrase\u2014<strong>except as a QR code instead of a list of 12 or 24 words</strong>.</p><p><span style=\"font-weight:400;\">This standard allows users to relatively quickly and easily draw their recovery phrase as a QR code on a paper or steel template and use it to log in to Jade for a stateless session with <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-cases-for-temporary-signer#entry:1209@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Temporary Signer</a>.</span></p><blockquote class=\"note\">\n<strong>Note:</strong> The QR code is hand-drawn to avoid displaying this sensitive information using a phone or computer that might be compromised. <strong>Never scan your SeedQR using an online device!&nbsp;</strong>\n</blockquote><h2 id=\"h_01K5YFS59BGCZYSH76CM742CZW\"><span style=\"font-weight:400;\">SeedQR with Jade Plus</span></h2><p><span style=\"font-weight:400;\">Jade Plus supports SeedQR in the following situations:</span></p><ul>\n<li><span style=\"font-weight:400;\">Scanning <strong>Standard</strong> and <strong>Compact</strong> SeedQRs for a stateless session with <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-cases-for-temporary-signer#entry:1209@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Temporary Signer</a> or <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock#entry:549@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">QR Mode</a></span></li>\n<li><span style=\"font-weight:400;\">Scanning <strong>Standard</strong> and <strong>Compact</strong> SeedQRs to restore a wallet</span></li>\n<li><span style=\"font-weight:400;\"><a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase#entry:413@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Displaying or \"exporting\"</a> <strong>Compact</strong> SeedQRs to allow users to safely create a SeedQR from Jade Plus</span></li>\n</ul><h2 id=\"h_01K5YFS59C19G5YAQBWK737HYV\">Standard vs. Compact SeedQR</h2><p>The SeedQR standard describes two different ways to encode a recovery phrase as a QR code:</p><ul>\n<li>\n<strong>Standard</strong>: Uses the index of each recovery phrase word (based on the BIP39 wordlist) and concatenates them into one long stream of digits. You can scan this specification with any QR code reader and easily convert it back to your list of words.</li>\n<li>\n<strong>Compact</strong>: Expresses the index of each word in binary instead, making the QR code 35-40% smaller. This specification is much harder to read and interpret without the proper software. Blockstream Jade enables export of this type of SeedQR due to these traits.</li>\n</ul><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/what-is-a-seedqr/10695284174745.png\" alt=\"2.png\" width=\"600\" /></p><p class=\"wysiwyg-text-align-center\"><strong>Standard vs. Compact SeedQR</strong></p>"}, "jade__what-is-exporting-a-child-key-from-jade": {"title": "What is exporting a child key from Jade?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p>When you set up swaps on Jade, the Blockstream app requests a child key from your Jade. This child key is a limited credential that lets the app recover your funds if a swap fails to complete. In normal swap operation, your funds remain fully controlled by Jade from start to finish; the child key is only used if a swap does not settle as expected.</p><h2 id=\"h_01KPV0S384FAF4NX3HBV9A633D\">What the Child Key Is Not</h2><p>The child key is not your recovery phrase. It does not give the Blockstream app, or anyone who obtains it, the ability to:</p><ul>\n<li>Derive or recover your recovery phrase</li>\n<li>Move funds held on your main wallet accounts</li>\n<li>Sign Jade transactions outside of a failed-swap refund</li>\n<li>Access funds once a swap has settled (settled funds remain fully controlled by Jade)</li>\n</ul><p>Your recovery phrase stays on Jade. <strong>Jade's unique security model ensures that there is nothing of value to steal from a locked Jade by itself.</strong></p><h2 id=\"h_01KPV0S384BZK7JQKX6H15TCRD\">Only Export When the Official Blockstream App Requests It</h2><blockquote class=\"warning\"><p><strong>Warning:</strong> Only export a child key when prompted by the official Blockstream app. If any other app, website, or QR code asks Jade to export a child key, decline and disconnect. If a malicious actor obtains your child key, they can only claim funds from swaps that fail to settle; completed swaps remain fully controlled by Jade.</p></blockquote><p>Download the Blockstream app only from <a href=\"https://blockstream.com/app\" target=\"_blank\" rel=\"noopener noreferrer\">blockstream.com/app</a>, the Apple App Store, or Google Play. Verify the publisher is \"Blockstream Corp Inc.\" before connecting Jade.</p><h2 id=\"h_01KPV0S384M4513ZYWA4AR82RH\">Related Guides</h2><ul>\n<li>To set up swaps on Jade, see <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/enable-swaps-with-jade#entr
