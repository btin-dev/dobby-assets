y:102@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Enable swaps with Jade</a>.&nbsp;</li>\n<li>To perform a swap, see <a href=\"https://help.blockstream.com/blockstream-app/use-liquid-bitcoin/perform-an-on-chain-swap#entry:93@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Perform an on-chain swap</a>.</li>\n</ul>"}, "jade__what-is-the-wallet-id-shown-on-the-jade-home-screen": {"title": "What is the wallet ID shown on the Jade home screen?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p>After accessing a wallet on <a href=\"https://blockstream.com/jade\" rel=\"noopener noreferrer\" target=\"_blank\">Jade</a>, you will see your wallet ID, or your wallet's fingerprint, in the bottom right corner (in this example, B89AB7BC). This alphanumeric string corresponds to a specific wallet, and is useful for recognizing which keys you currently have loaded onto your Jade.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/430-10308.png?v=13\"/></figure><p>Passphrase or SeedQR users who may access many different wallets should take note of their wallets' 8-character fingerprint and check that the fingerprint matches after logging in with a specific passphrase (for example), to ensure they are interacting with the intended wallet. A recovery phrase with two unique passphrases added to it will lead to different wallet fingerprints, making it useful for checking if you have a typo in your passphrase entry as well.</p><p>\u00a0</p><p></p>"}, "jade__should-i-export-the-master-blinding-key": {"title": "Should I export the master blinding key?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p>Jade will ask if you want to export the <strong>master blinding key</strong> when setting up a Liquid wallet.</p><blockquote class=\"note\"><p><strong>Note:</strong> You will need to export the master blinding key if you want to use Liquid singlesig accounts, only if you initialized your Jade using the Advanced path of the wizard.</p></blockquote><p>The master blinding key is:</p><ul>\n<li>the key that encrypts and decrypts the amounts and assets of your Liquid transactions, making them confidential on the public <a href=\"https://glossary.blockstream.com/liquid-network/\" target=\"_blank\" rel=\"noopener noreferrer\">Liquid network</a>.</li>\n<li>\n<strong>not </strong>an xpub or a pubkey, so it doesn't allow you to re-create your addresses.</li>\n<li>\n<strong>not</strong> a private key to spend Liquid assets; it only allows you to reveal your amounts and assets.</li>\n</ul><p>Choosing to export the master blinding key from your Jade to a companion app will improve your experience while using Liquid wallets, notably with <strong>faster functionality</strong>&nbsp;for most actions, including:</p><ul>\n<li><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">loading transactions and balances</span></li>\n<li>generating new addresses</li>\n<li>creating transactions</li>\n</ul><p>However, if you export your master blinding key and use your Jade with a compromised companion app, an attacker can see all the assets and amounts associated with this wallet (<strong>although</strong> <strong>your funds will still remain safe</strong>). To reduce this risk, always use Jade with our supported list of <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">companion apps</a>.</p><p>&nbsp;</p>"}, "jade__blockstream-jade-quickstart-guide-for-ios": {"title": "Blockstream Jade Quickstart Guide for iOS", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p><a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app#entry:560@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>Blockstream Jade</strong></a><strong> is a hardware wallet</strong>&nbsp;that stores the&nbsp;<a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a> for your Bitcoin and/or Liquid wallets offline for additional security. To set up your Jade with the Blockstream app on mobile, view our video guide or follow the instructions below.</p><p>&nbsp;</p><div class=\"video-iframe\"><iframe class=\"responsive-iframe\" title=\"YouTube video player\" src=\"https://www.youtube.com/embed/7aacxnc6DHg\" width=\"560\" height=\"315\" frameborder=\"0\"></iframe></div><p>&nbsp;</p><h2 id=\"h_01K60YP9XPDYQ9YWZBD5MJ5FSD\">Pre-requisites</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Before use, plug your Jade into a power source using the provided USB cable and charge the device for two hours. Make sure your iOS device is charged as well.</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\"><a href=\"https://blockstream.com/app/\" target=\"_blank\" rel=\"noopener noreferrer\">Download the Blockstream app</a></p>\n</div><h2 id=\"h_01EYXHZ49AV7HP622MCS65VP1Y\">iOS setup</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on your Jade by holding the button on the bottom of the device, then select <strong>Initialize</strong> to begin the setup process. Choose <strong>New</strong> to create a new wallet.</p>\n</div><blockquote><p><strong>Tip:</strong> For improved security, it is recommended to set up a new wallet instead of restoring your recovery phrase from the Blockstream app.</p></blockquote><p>&nbsp;<img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-ios/19856749681689.png\" alt=\"home.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Record the recovery phrase offline on paper (or by using a <a href=\"https://store.blockstream.com/product/blockstream-capsule/\">dedicated recovery phrase backup device</a> for extra security).</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Proceed through the verification process to confirm that you have recorded each recovery phrase word correctly. Then, store the recovery phrase in a safe location.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-ios/4401875590425.png\" alt=\"jadecheck.png\" width=\"306\" height=\"146\" /></p><blockquote class=\"warning\"><p><strong>Warning:</strong> Your recovery phrase is the <em>only</em> way to restore your wallet if you lose access to it (for example, you forget your PIN or lose your device). Blockstream never knows your recovery phrase and cannot help you restore your wallet if you lose it.</p></blockquote><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Blockstream Jade will ask you how to connect to Blockstream App. Select <strong>Bluetooth</strong>\u00ae to pair with your iOS device.</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Open the Blockstream app and select <strong>Blockstream Jade</strong> under devices.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-ios/4401881434521.png\" alt=\"green-main.png\" width=\"250\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">Select your Blockstream Jade on the Blockstream app companion app. Then, a Bluetooth pairing request will appear on both devices. Verify that the codes are the same and confirm the pairing on your smartphone and your Blockstream Jade.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If you are having trouble connecting via Bluetooth, <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-pairing-jade-via-bluetooth#entry:564@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">please visit our guide here</a>.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-ios/4402141835929.png\" alt=\"pairing.png\" width=\"450\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">7.</p>\n<p class=\"num-list-text\">Select the <strong>network</strong> and <strong>security policy</strong> on which you'll use Jade, then enter your PIN on Jade when prompted. Please note that each network and security policy will lead to a different wallet.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If you aren't sure whether to select <strong>Singlesig</strong> or <strong>Multisig Shield</strong> as your security policy, please <a href=\"https://help.blockstream.com/hc/en-us/articles/4403642609433\" target=\"_blank\" rel=\"noopener noreferrer\">review our guide here</a> which explains the differences in more detail.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-ios/5964226095257.png\" alt=\"2.png\" width=\"450\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">8.</p>\n<p class=\"num-list-text\">Set your six-digit PIN. This is used to unlock Jade each time you login to your wallet.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-ios/4402501670809.png\" alt=\"jadepin.png\" width=\"306\" height=\"146\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">9.</p>\n<p class=\"num-list-text\">Done! You should now see your wallet open on the Blockstream app. Jade will also show that it is <strong>Ready!</strong> You can now use your wallet to <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/send-bitcoin-using-jade#entry:859@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">send</a> and <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/receive-bitcoin-using-jade#entry:786@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">receive</a> Bitcoin transactions.</p>\n</div><p>After you have finished using your wallet, disconnect your Jade from your device. Next time you want to use the wallet on Jade, simply reconnect your device and follow the prompts.</p>"}, "jade__blockstream-jade-quickstart-guide-for-android": {"title": "Blockstream Jade Quickstart Guide for Android", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p><a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app#entry:560@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>Blockstream Jade</strong></a><strong> is a hardware wallet</strong>&nbsp;that stores the&nbsp;<a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a> for your Bitcoin and/or Liquid wallets offline for additional security. To set up your Jade with the Blockstream app on mobile, view our video guide or follow the instructions below.</p><p>&nbsp;</p><div class=\"video-iframe\"><iframe class=\"responsive-iframe\" title=\"YouTube video player\" src=\"https://www.youtube.com/embed/7aacxnc6DHg\" width=\"560\" height=\"315\" frameborder=\"0\"></iframe></div><p>&nbsp;</p><h2 id=\"h_01K59RS9GV73ATZHTFD8EQRAA8\">Pre-requisites</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Before usage, plug your Jade into a power source using the provided cable and charge the device for two hours.</p>\n</div><blockquote><p><strong>Tip:</strong> Make sure both your Jade and your Android device are fully charged to ensure neither goes into standby during setup. For a smoother firmware upgrade, please connect your Jade to the desktop version of the Blockstream app via USB.</p></blockquote><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\"><a href=\"https://blockstream.com/app/\" target=\"_blank\" rel=\"noopener noreferrer\">Download the Blockstream app</a>.</p>\n</div><h2 id=\"h_01EYXHYYT1J9GDQFCFS8E511WG\">Android Setup</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on your Jade and select <strong>Initialize</strong> to begin the setup process. Choose <strong>New</strong> to create a new wallet.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-android/21328387144473.png\" alt=\"initialize.png\" width=\"306\" height=\"146\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-android/21328387146393.png\" alt=\"wallet.png\" width=\"306\" height=\"146\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Record the 24-word recovery phrase offline on paper (or by using a <a href=\"https://store.blockstream.com/product/blockstream-capsule/\" target=\"_blank\" rel=\"noopener noreferrer\">dedicated recovery phrase backup device</a> for extra security).</p>\n</div><blockquote class=\"warning\"><p><strong>Warning:</strong> Your recovery phrase is the <strong>only</strong> way to restore your wallet if you lose access to it (for example, you forget your PIN or lose your device). Blockstream never knows your recovery phrase and cannot help you restore your wallet if you lose it.</p></blockquote><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Proceed through the verification process to confirm that you have recorded each recovery phrase word correctly. Then, store the recovery phrase in a safe location.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-android/21328415661465.png\" alt=\"jadecheck.png\" width=\"306\" height=\"146\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">On the Blockstream app, tap <strong>Blockstream</strong> under Devices and plug in your Jade with a cable or connect via Bluetooth.&nbsp;</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-android/5101006819481.png\" alt=\"1.png\" width=\"450\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Select the <strong>network</strong> and <strong>security policy</strong> on which you'll use Jade, then enter your PIN on Jade when prompted. Please note that each network and security policy will lead to a different wallet.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If you aren't sure whether to select <strong>Singlesig</strong> or <strong>Multisig Shield</strong> as your security policy, please <a href=\"https://help.blockstream.com/hc/en-us/articles/4403642609433\" target=\"_blank\" rel=\"noopener noreferrer\">review our guide here</a> which explains the differences in more detail.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-android/5931305730841.png\" width=\"450\" alt=\"\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">Set your six-digit PIN. This is used to unlock the Jade each time you login to your wallet.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-android/4402502024985.png\" alt=\"pin.png\" width=\"306\" height=\"146\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">7.</p>\n<p class=\"num-list-text\">Done! You should now see your wallet open on the Blockstream app. Jade will also show that it is <strong>Ready!</strong> You can now use your wallet to <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/send-bitcoin-using-jade#entry:859@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">send</a> and <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/receive-bitcoin-using-jade#entry:786@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">receive</a> Bitcoin and Liquid transactions.</p>\n</div><p>After you have finished using your wallet, disconnect your Jade from your device. Next time you want to use the wallet on Jade, simply reconnect your device and follow the prompts.</p>"}, "jade__blockstream-jade-quickstart-guide-for-desktop": {"title": "Blockstream Jade Quickstart Guide for Desktop", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p><a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app#entry:560@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>Blockstream Jade</strong></a><strong> is a hardware wallet</strong>&nbsp;that stores the&nbsp;<a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a> for your Bitcoin and/or Liquid wallets offline for additional security. To set up your Jade with the Blockstream app on desktop, view our video guide or follow the instructions below.</p><p>You may also set up your Jade using a mobile device by following the guides here:</p><ul>\n<li class=\"wysiwyg-list-bold\"><a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-ios#entry:1178@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>Blockstream Jade Quickstart Guide for iOS</strong></a></li>\n<li class=\"wysiwyg-list-bold\"><a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-android#entry:1186@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>Blockstream Jade Quickstart Guide for Android</strong></a></li>\n</ul><p>&nbsp;</p><div class=\"video-iframe\"><iframe class=\"responsive-iframe\" title=\"YouTube video player\" src=\"https://www.youtube.com/embed/0fPVzsyL360\" width=\"560\" height=\"315\" frameborder=\"0\"></iframe></div><p>&nbsp;</p><h2 id=\"h_01K60Z05V0DYS467HPQB6BN69H\">Pre-requisites</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\"><a href=\"https://blockstream.com/app/\" target=\"_blank\" rel=\"noopener noreferrer\">Download the Blockstream app</a>.</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\"><a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-connecting-jade-via-usb#entry:442@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Install this driver</a> to make sure Jade is recognized by your computer.</p>\n</div><h2 id=\"h_01K60Z05V0MGQY9NK2SM4TXBAC\">Desktop Setup</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Open the Blockstream app, then click the Blockstream logo under <strong>Devices</strong>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-desktop/51016177918361.png\" alt=\"1-1.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Plug in Jade to your desktop using the supplied USB cable.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If Jade is not recognized by your computer, make sure to download the driver found in the <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-connecting-jade-via-usb#entry:442@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">guide here</a>.</p></blockquote><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Once your Jade appears in the app, update Jade by clicking <strong>Check for updates</strong> and select the latest firmware version. Use the scroll wheel or toggle on Jade to confirm and <strong>continue with the update</strong>. Make sure your Jade still shows the \"Initialize\" button, otherwise you will have to wait until after setting Jade up to upgrade it. Use the back button to get to this screen if necessary.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-desktop/51016184997529.png\" alt=\"2-1.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">After you have updated Jade's firmware, select <strong>Setup Jade</strong> on&nbsp;the <strong>network</strong> and <strong>security policy</strong> you would like to use.</p>\n</div><blockquote><p><strong>Tip:</strong> The security policy is listed under <strong>Type</strong> on the login screen shown below. If you are not sure whether to select <strong>Singlesig</strong> or <strong>Multisig Shield</strong>, please <a href=\"https://help.blockstream.com/hc/en-us/articles/4403642609433\" target=\"_blank\" rel=\"noopener noreferrer\">review our guide here</a>.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-desktop/51016177919257.png\" alt=\"ss.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Next, select to create a <strong>New</strong> wallet and choose <strong>12 words</strong> to generate your recovery phrase. Clicking <strong>Advanced</strong> will provide you with the option of a 12 and 24 word recovery phrase.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-desktop/51016177919769.png\" alt=\"jade6.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">Record the recovery phrase offline on paper (or by using a <a href=\"https://store.blockstream.com/product/blockstream-capsule/\" target=\"_blank\" rel=\"noopener noreferrer\">dedicated recovery phrase backup device</a> for extra security). Then, use the wheel or toggle on the top of your Jade to verify your recovery phrase. This step ensures you have it written down correctly.</p>\n</div><blockquote class=\"warning\"><p><strong>Warning:</strong> Your recovery phrase is the <em>only</em> way to restore your wallet if you lose access to it (for example, you forget your PIN or lose your device). Blockstream never knows your recovery phrase and cannot help you restore your wallet if you lose it.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-desktop/51016184998297.png\" alt=\"jade7.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">7.</p>\n<p class=\"num-list-text\">Set and confirm your six-digit PIN. This is used to unlock Jade each time you login to your wallet.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-desktop/51016177920665.png\" alt=\"jadepin.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">8.</p>\n<p class=\"num-list-text\">Now, simply select <strong>Go to Wallet</strong> on the App desktop app and you will see your wallet open on the Blockstream app. Jade will also show that it is <strong>Ready!</strong> You can now use your Jade to send and receive Bitcoin transactions.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/faqs/blockstream-jade-quickstart-guide-for-desktop/51016177920921.png\" alt=\"4.png\" /></p><p>After you have finished using your wallet, disconnect your Jade from your device. Next time you want to use the wallet on Jade, simply reconnect your device and follow the prompts.</p>"}, "jade__how-do-lightning-accounts-work-with-my-jade": {"title": "How do Lightning accounts work with my Jade?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p><span style=\"white-space:pre-wrap;\">The <a href=\"https://glossary.blockstream.com/lightning-network/\" target=\"_blank\" rel=\"noopener noreferrer\">Lightning Network</a> can be useful for fast settlements on incoming and outgoing payments. Hardware wallets on the other hand, introduce some steps and double checks before moving your bitcoin and the technology is not mature yet for these devices to check transactions on the Lightning Network. </span><span style=\"white-space:pre-wrap;\">Nonetheless, our Jade users can still access the Lightning Network and enjoy instant payments.</span></p>\n<p><span style=\"white-space:pre-wrap;\">Lightning accounts for Jade users are operated and secured by the Blockstream app, but backed up by your Jade.</span></p>\n<p><span style=\"white-space:pre-wrap;\">At account creation Jade will securely create and transfer a new dedicated key to your Blockstream app that will be used solely for your lightning account. Jade will not be needed to authorize lightning transactions, because the Blockstream App will use this new key for your lightning transactions.</span></p>\n<p><span style=\"white-space:pre-wrap;\">Don't worry about any new backups, the existing recovery phrase backup of your Jade will be sufficient to restore both your funds onchain and on lightning.</span></p>"}, "jade__which-xpub-export-settings-should-i-use": {"title": "Which Xpub Export settings should I use?", "cat": "Blockstream Jade", "section": "FAQs", "html": "<p><a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app#entry:560@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream Jade</a>'s <strong>Xpub Export</strong> function is typically used along with <a href=\"https://help.blockstream.com/hc/en-us/articles/10426396727577\" target=\"_blank\" rel=\"noopener noreferrer\">QR Scan</a> to enable a fully air-gapped workflow, however it can also just be used to set up a watch-only wallet. The settings you choose in the Xpub Export menu will determine which type of wallet will be imported to your <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">compatible QR platform</a>.</p><blockquote><p><strong>Tip:</strong> Most users should simply leave the default settings, which will import a Singlesig, Native Segwit wallet.</p></blockquote><h2 id=\"h_01KHY8J3N8TC0A9NVHZ072DYCY\">Xpub Options</h2><p>Jade will provide users with four different xpubs that can be displayed, two for Singlesig wallets and two for Multisig wallets. Each option will provide information to your companion app so that it knows which specific type you intend to use.</p><p><img src=\"https://help.blockstream.com/hc/article_attachments/11892056539033\" alt=\"settings.png\" width=\"306\" /></p><h3 id=\"h_01KHY8J3N84DA1J3059HY8ABZQ\">Script Type</h3><p>The script type you choose will determine if your wallet will generate <strong>Native Segwit</strong> (bc1) or <strong>Wrapped Segwit</strong> (3) addresses. It is <strong>recommended</strong> to leave the default choice as Native Segwit, which results in cheaper transaction fees. If you are trying to restore a wallet which you know uses Wrapped Segwit, you may click the center button to change your selection.</p><h3 id=\"h_01KHY8J3N8C35P6GX7JNNXS0ZT\">Wallet Type</h3><p>Users also have the choice of whether Jade will be used as a signing device in a <strong>Singlesig</strong> or a <strong>Multisig</strong> wallet. Multisig wallets have additional complications in terms of spending and backing up, so it is also <strong>recommended</strong> to leave the default Singlesig option. Only proceed with Multisig if you are comfortable and aware of the implications of doing so.</p><h2 id=\"h_01KHY8J3N859W4HJBEVAZSE316\">Importing to a Compatible Wallet</h2><p>After making an xpub selection, open your <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">QR compatible wallet</a> and follow their instructions for importing via QR. This will require scanning the xpub QR from Jade with your companion device.</p><blockquote class=\"warning\"><p><strong>Warning: </strong>On your companion app, make sure to create a wallet of the <strong>matching</strong> type as your chosen xpub settings - or the \"incorrect\" wallet may be created. For example if you chose <strong>Native Segwit/Singlesig</strong>, select each of those options on your companion app as well. These choices will look different on each platform, so view our setup guides to learn more.</p></blockquote><p><img src=\"https://help.blockstream.com/hc/article_attachments/11892288194073\" alt=\"choose.png\" /></p><h2 id=\"h_01KHY8J3N8ZABPQ13ZAPRCAB4H\">Derivation Paths</h2><p>When using Jade via USB, you are able to export an xpub using any custom path you choose within your specified application. The QR Xpub Export settings on Jade will use the following paths.</p><div class=\"mobile_table_scroll\"><figure class=\"wysiwyg-table wysiwyg-table-align-left\"><figure class=\"table\"><table class=\"docutils align-default\" id=\"overflow-table\"><thead><tr class=\"row-odd\" style=\"height:44px;\"><th style=\"height:44px;padding:1px;width:183.227px;\">Selection</th><th class=\"head\" style=\"height:44px;padding:1px;width:326.773px;\">Path</th></tr></thead><tbody><tr class=\"row-even\" style=\"height:44px;\"><td style=\"height:10px;padding:1px;width:175.227px;\"><p class=\"wysiwyg-text-align-center\"><strong>Singlesig / Native Segwit</strong></p></td><td style=\"height:10px;padding:1px;width:318.773px;\"><p class=\"wysiwyg-text-align-center\">m/84'/0'/0'</p></td></tr><tr style=\"height:74px;\"><td style=\"height:30px;padding:1px;width:175.227px;\"><p class=\"wysiwyg-text-align-center\"><strong>Multisig / Native Segwit</strong></p></td><td style=\"height:30px;padding:1px;width:318.773px;\"><p class=\"wysiwyg-text-align-center\">m/48'/0'/0'/2'</p></td></tr><tr class=\"row-odd\" style=\"height:66px;\"><td style=\"height:17px;padding:1px;width:175.227px;\"><p class=\"wysiwyg-text-align-center\"><strong>Singlesig / Wrapped Segwit</strong></p></td><td style=\"height:17px;padding:1px;width:318.773px;\"><p class=\"wysiwyg-text-align-center\">m/49'/0'/0'</p></td></tr><tr style=\"height:22px;\"><td style=\"height:44px;padding:1px;width:175.227px;\"><p class=\"wysiwyg-text-align-center\"><strong>Multisig / Wrapped Segwit</strong></p></td><td style=\"height:44px;padding:1px;width:318.773px;\"><p class=\"wysiwyg-text-align-center\">m/48'/0'/0'/1'</p></td></tr></tbody></table></figure></figure></div>"}};let CAT="Blockstream App";
function crumb(parts){return parts.filter(Boolean).map((p,i,a)=> i<a.length-1?'<a>'+p+'</a><span class="sep">&rsaquo;</span>':'<span style="color:#5a636b">'+p+'</span>').join('');}
function buildCatbar(){const cb=document.getElementById('catbar');cb.innerHTML='';Object.keys(HC).forEach(c=>{const b=document.createElement('button');b.textContent=c;b.className=(c===CAT?'on':'');b.onclick=()=>{CAT=c;buildCatbar();buildSide();showFirst();};cb.appendChild(b);});}
function buildSide(){const side=document.getElementById('side');side.innerHTML='';HC[CAT].sections.forEach(sec=>{const h=document.createElement('div');h.className='secname';h.textContent=sec.name;side.appendChild(h);sec.articles.forEach(key=>{const a=document.createElement('a');a.textContent=ART[key].title;a.dataset.key=key;a.onclick=()=>show(key);side.appendChild(a);});});}
function findSection(key){return HC[CAT].sections.find(s=>s.articles.includes(key));}
function show(key){const a=ART[key];if(!a)return;const sec=findSection(key);document.getElementById('crumb').innerHTML=crumb(['Blockstream Help Center',HC[CAT].crumb,sec?sec.name:'',a.title]);document.getElementById('content').innerHTML='<h1>'+a.title+'</h1>'+a.html;document.querySelectorAll('.side a').forEach(el=>el.classList.toggle('active',el.dataset.key===key));window.scrollTo(0,0);}
function showFirst(){const sec=HC[CAT].sections.find(s=>s.articles.length);if(sec)show(sec.articles[0]);}
buildCatbar();buildSide();showFirst();
</script></body></html>
