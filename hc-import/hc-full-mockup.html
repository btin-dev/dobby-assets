ting wallet via an on-chain transaction.</blockquote><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4111.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4112.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Select the <strong>Transact</strong> tab via the navigation bar at the bottom of the screen. Then, tap <strong>Receive</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Tap the icon with the <strong>three dots</strong> in the top-right corner of the screen. This will bring up a small menu at the bottom of the screen where you can select <strong>Sweep From Paper Wallet</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">The app will ask you to enter the private key you wish to use to sweep funds into your Blockstream app wallet. Alternatively, you can scan a QR code of the private key with your camera. After entering the private key, tap <strong>Next</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">From this point forward, the process will look like you're making a standard Bitcoin transaction. Enter the amount you'd like to sweep from the private key and optionally increase the fee for the transaction by tapping <strong>Change Speed</strong>. Click <strong>Next</strong> once you have set these parameters.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Confirm the transaction details, then <strong>Slide to Send</strong> to broadcast it to the Bitcoin network. You will then receive a message that the transaction was successfully sent.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p>"}, "app__set-up-testnet-wallet": {"title": "Set up testnet wallet", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>Working with Bitcoin's testnet is useful for developers who are building new apps and users who want to practice making transactions with no real funds at risk. Testnet bitcoin have no real value and the associated network is only for testing purposes.</p><blockquote class=\"note\">\n<strong>Note: </strong>To get testnet bitcoin for your testnet wallet, you can visit one of the many <a href=\"https://support.chainstack.com/hc/en-us/articles/900001638963-Bitcoin-testnet-faucets\" rel=\"noopener noreferrer\" target=\"_blank\">testnet bitcoin faucets</a> available online.</blockquote><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4113.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4114.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">To create a new testnet wallet, start by tapping the <strong>Wallet icon</strong> in the top-right corner of the app.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">On the next screen, tap the icon with the <strong>three dots</strong> in the top-right corner. This will bring up the App Settings screen where you can enable testnet. After turning on the <strong>Enable testnet</strong> toggle,\u00a0tap <strong>Save</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">After clicking save, the app will return you to the home screen. Tap the <strong>Wallet icon</strong> in the top-right corner again. This time, you will want to tap <strong>Set up a New Wallet</strong> at the bottom of the screen.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">\u00a0</p>\n<p class=\"num-list-text\">Tap <strong>Get Started</strong>, then tap\u00a0<strong>Set up Mobile Wallet</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Choose <strong>Testnet</strong> as the network on the next small pop-up menu. After that, the app will create your testnet wallet and open it for you back on the home screen.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p>"}, "app__connect-to-tor": {"title": "Connect to Tor", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>Connecting your wallet to Tor improves privacy by anonymizing the IP address associated with your local device. Tor routes data through multiple randomized hops before reaching its destination, so the data recipient doesn't know which IP address sent the data. Additionally, the routing nodes don't know the final destination. This process is known as \"onion routing.\"</p><blockquote class=\"note\">\n<strong>Note: </strong>Tor is useful for masking your real IP address, but it's important to remember that it's only one piece of the overall Bitcoin privacy puzzle. Adversaries may still be able to use other information, such as <a href=\"https://glossary.blockstream.com/blockchain/\" rel=\"noopener noreferrer\" target=\"_blank\">blockchain</a> analysis, to track your wallet activity.</blockquote><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4115.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Tap the <strong>Wallet icon</strong> in the top-right corner of the app.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">On the next screen, which lists your digital wallets, tap the icon with <strong>three dots</strong> found in the top-right corner to bring up the app settings.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Finally, activate Tor by toggling the <strong>Connect with Tor</strong> option, and then tap <strong>Save</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><blockquote class=\"note\">\n<strong>Note: </strong>While Tor enhances privacy, the anonymizing properties of the network will also lead to a slower and less stable connection when compared to traditional internet use.</blockquote>"}, "app__set-up-a-bip39-passphrase": {"title": "Set up a BIP39 passphrase", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>BIP39 passphrases offer an optional but powerful enhancement to the security of your Blockstream app wallet's backup seed. By adding a passphrase to your recovery phrase, you create an entirely separate, hidden wallet that is distinct from the list of wallets displayed in the app. This means that a single set of recovery words can unlock multiple unique wallets depending on the passphrase used, which can be especially useful in high-risk situations, such as a <a href=\"https://xkcd.com/538/\" rel=\"noopener noreferrer\" target=\"_blank\">$5 wrench attack</a>, where decoy wallets may serve as a defense mechanism, or simply to compartmentalize your holdings for better privacy and control.</p><blockquote class=\"note\">\n<strong>Note: </strong>BIP39 passphrases come with added complexity. Once a passphrase is enabled, forgetting or misplacing it means irreversible loss of access to the associated funds\u2014even if the recovery phrase is intact. It\u2019s essential to fully understand how passphrases function and the consequences of using one before sending any assets to a passphrase-protected wallet. If misused or misunderstood, the added security could quickly turn into lost funds.</blockquote><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4116.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4096.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4097.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4098.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4099.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">To create a new wallet with a BIP39 passphrase based on an existing wallet, start by selecting the existing wallet that you want to base your passphrase-secured wallet on. The app will then ask you to enter your PIN code to unlock the wallet, but tap the <strong>three dots</strong> in the top-right corner of the screen instead.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">You will now see the <strong>More Options</strong> menu at the bottom of the screen. Tap <strong>Login with BIP39 Passphrase</strong>. After selecting that option, you will see a screen where you can create a BIP39 passphrase to use as the basis for a new wallet. Once you've entered your BIP39 passphrase into the text box, tap <strong>Submit</strong>.</p>\n</div><blockquote class=\"note\">\n<strong>Note: </strong>You can also select the <strong>Always Ask</strong> checkbox to automatically bring up the BIP39 passphrase login process whenever selecting this base wallet in the future. While this enhances convenience, it also could indicate to an attacker that alternative BIP39 passphrase-enabled wallets exist on your device.</blockquote><p class=\"wysiwyg-text-align-center\"></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4117.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">When you return to the screen previous screen to enter your PIN code, you will notice there is some additional text that indicates you are logging in to a BIP39 passphrase-enabled wallet. After entering your PIN, the new wallet will open.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">When you want to open this new BIP39 passphrase-enabled wallet in the future, select the same wallet that you based it on and follow the same process outlined in steps 1-3 with the same passphrase. The newly-created BIP39 passphrase-enabled wallet will also be temporarily available under the <strong>Ephemeral Wallets</strong> section of the wallet selection screen. However, this is temporary: the wallet will disappear once you log out of it.</p>\n</div><blockquote class=\"note\">\n<strong>Note: </strong>Remember, you need both the original recovery seed from the base wallet and the BIP39 passphrase to access this new wallet in the future. If you don't have both, you will lose access to funds sent to that wallet.</blockquote><p>\u00a0</p><p class=\"wysiwyg-text-align-center\"><strong></strong></p>"}, "app__verify-the-blockstream-app-binaries": {"title": "Verify the Blockstream app binaries", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>Our Blockstream app binary releases are available on GitHub:</p>\n<ul>\n<li><a class=\"reference external\" href=\"https://github.com/Blockstream/green_android/releases/latest\" target=\"_blank\" rel=\"noopener noreferrer\">Android</a></li>\n<li><a class=\"reference external\" href=\"https://github.com/Blockstream/green_ios/releases/latest\" target=\"_blank\" rel=\"noopener noreferrer\">iOS</a></li>\n<li><a class=\"reference external\" href=\"https://github.com/Blockstream/green_qt/releases/latest\" target=\"_blank\" rel=\"noopener noreferrer\">Desktop</a></li>\n</ul>\n<p>Each binary release comes with a <em>SHA256SUM.asc</em> file. The file contains a digital signature of the binary files hashes from Blockstream. Using PGP software you should verify that the downloaded packages have been correctly signed by us.</p>\n<p>Our PGP fingerprint is:</p>\n<pre><code class=\"language-plaintext\">04BE BF2E 35A2 AF2F FDF1 FA5D E7F0 54AA 2E76 E792</code></pre>\n<p>Import the public key:</p>\n<pre><code class=\"language-plaintext\">gpg --keyserver keyserver.ubuntu.com --recv-keys \"04BE BF2E 35A2 AF2F FDF1 FA5D E7F0 54AA 2E76 E792\"\n</code></pre>\n<p>Verify the signed hashes of the downloaded binaries:</p>\n<pre><code class=\"language-plaintext\">gpg --verify SHA256SUMS.asc</code></pre>"}, "app__what-is-watch-only-mode": {"title": "What is watch-only mode?", "cat": "Blockstream App", "section": "Perform Advanced Wallet Operations", "html": "<p>Watch-only mode is an optional feature that allows you to log in to the Blockstream app with limited permissions. You can use watch-only mode for different purposes:</p><ul>\n<li>To receive funds securely, with peace of mind knowing that adversaries cannot spend your funds if your device is stolen or compromised.</li>\n<li>To allow a third party to manage your wallet and receive transactions without the ability to spend your funds (e.g. for a shared business wallet).</li>\n</ul><p>In watch-only mode, you <strong>can</strong>:</p><ul>\n<li>view all accounts and transactions associated with your wallet.</li>\n<li>generate addresses and receive new transactions.</li>\n<li>sweep private keys.</li>\n</ul><p>In watch-only mode, you <strong>cannot</strong>:</p><ul>\n<li>send transactions from your wallet without an offline signer.</li>\n<li>view your recovery phrase.</li>\n</ul><h2 id=\"h_01JWHP2T1Y0MDVMS2P0KEH5FQK\">How Do I Set Up Watch-Only Mode?</h2><p><a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/set-up-watch-only-for-2fa-accounts#entry:701@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Review our guide</a> to set up your watch-only wallet. Also, you will only be able to update the watch-only credentials when logged in with full access.</p>"}, "app__update-2fa-method": {"title": "Update 2FA method", "cat": "Blockstream App", "section": "Manage 2FA Accounts", "html": "<p>Within your wallet settings, you can manage the two-factor authentication (2FA) method required to send funds from a 2FA-protected account. You can enable, disable, or add additional 2FA methods. We recommend setting up multiple 2FA options in case you lose access to one.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4119.png?v=13\"/></figure><blockquote class=\"note\"><p><strong>Note:</strong> As of May 2025, new 2FA-protected accounts can no longer be enabled. This functionality is only available to users who had already activated this account type previously.</p></blockquote><h1 id=\"update-2fa-method\">Update 2FA Method</h1><ol>\n<li>\n<p>Log in to your wallet in the Blockstream app and tap <strong>Settings</strong>.</p>\n<p></p>\n</li>\n<li>\n<p>Select <strong>Two-Factor Authentication</strong> from the list.</p>\n<p></p>\n</li>\n<li>\n<p>Tap the toggle next to the 2FA method you want to enable or disable.\u00a0If the toggle is off, tapping it will enable the method; if it is on, tapping it will disable it.\u00a0The app will prompt you to enter a code to confirm the change.</p>\n<p></p>\n</li>\n</ol>"}, "app__2fa-multisig-protection-explained": {"title": "2FA Multisig protection explained", "cat": "Blockstream App", "section": "Manage 2FA Accounts", "html": "<p>If you chose a <strong>2FA Protected</strong> account (formerly Multisig Shield) as your security policy, the Blockstream app adds an extra layer of security to your assets. Multiple keys are required to send a transaction, making it harder for thieves and hackers to steal your assets. The first key is on your device protected by a PIN code and is backed up with a 12- or 24-word recovery phrase. The second key is held on the Blockstream app servers protected by two-factor authentication (2FA).</p><h2 id=\"h_01HRYKB9YRHWC9FVP1EFCTYTG0\">2FA Protected Account Types</h2><p>You can create two types of 2FA Protected accounts in your Blockstream app wallet. You can also have multiple accounts of different types in the same wallet.</p><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained/900001956866.png\" alt=\"blockstream_accounts_spending_conditions2048x1536.png\" width=\"636\" height=\"356\" /></p><h3 id=\"h_01HRYKB9YR909AD9MMK6GCYCEG\">Standard Accounts (2-of-2)</h3><p>This is the default 2FA Protected account. Both keys are required to send a transaction.</p><p>In order to keep you in control, <a href=\"#h_a0e00982-eb22-42f9-af2f-997bf0f67a09\">the 2FA key expires</a> after 1 year by default, so that you can spend your funds only with your own key, instead of the typically required two signatures:</p><div class=\"mobile_table_scroll\"><figure class=\"wysiwyg-table wysiwyg-table-align-left\"><table><tbody>\n<tr>\n<td><strong>Key</strong></td>\n<td><strong>Location</strong></td>\n<td><strong>Protected by</strong></td>\n<td><strong>Backup</strong></td>\n</tr>\n<tr>\n<td><strong>1</strong></td>\n<td>Mobile or desktop device</td>\n<td>PIN code (different per device)</td>\n<td>Primary 24-word recovery phrase</td>\n</tr>\n<tr>\n<td><strong>2</strong></td>\n<td>Blockstream app servers</td>\n<td>2FA (same across devices)</td>\n<td><a href=\"#h_a0e00982-eb22-42f9-af2f-997bf0f67a09\">Timelock</a></td>\n</tr>\n</tbody></table></figure></div><h3 id=\"h_01HRYKB9YRSJB977WM2Q6R447M\">2-of-3 Accounts</h3><p>This is a special type of account in Blockstream app that is currently available for Bitcoin wallets only, not Liquid wallets.</p><p>Transactions are still sent in the same way as standard accounts, 2-of-3 accounts only provide an alternative option for recovery.</p><p>Whenever you create a new 2-of-3 account, the app will provide a third key in the form of secondary recovery phrase (in addition to your recovery phrase for key 1). Each 2-of-3 account will have a separate secondary recovery phrase:</p><div class=\"mobile_table_scroll\"><figure class=\"wysiwyg-table wysiwyg-table-align-left\"><table><tbody>\n<tr>\n<td><strong>Key</strong></td>\n<td><strong>Location</strong></td>\n<td><strong>Protected by</strong></td>\n<td><strong>Backup</strong></td>\n</tr>\n<tr>\n<td><strong>1</strong></td>\n<td>Mobile or desktop device</td>\n<td>PIN code (different per device)</td>\n<td>Primary 24-word recovery phrase</td>\n</tr>\n<tr>\n<td><strong>2</strong></td>\n<td>Blockstream app servers</td>\n<td>2FA (same across devices)</td>\n<td>-</td>\n</tr>\n<tr>\n<td><strong>3</strong></td>\n<td>Offline</td>\n<td>Your recovery phrase backup</td>\n<td>Secondary 24-word recovery phrase</td>\n</tr>\n</tbody></table></figure></div><blockquote><p><strong>Tip:</strong> For extra security, you can set up a new wallet with <a href=\"https://blockstream.com/jade/\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a>, with one key stored on the hardware wallet instead of your mobile device or desktop.</p></blockquote><h2 id=\"h_01HRYKB9YRHWX02REXYY34VPV9\">Sending a Transaction with 2FA Protection</h2><p>When sending funds from your wallet, will require a signature from two keys:</p><ul>\n<li>\n<strong>Key 1: </strong>On your device, protected by PIN.</li>\n<li>\n<strong>Key 2: </strong>On the Blockstream servers, protected by 2FA.</li>\n</ul><p>If you do not have 2FA set up in your wallet, key 2 will automatically sign any transactions signed by key 1.</p><blockquote class=\"note\"><p><strong>Note:</strong> Each deposit you receive starts its own timelock countdown. Once a deposit's timelock expires, you can only spend those funds with your device key, without DFA. To keep all of your funds secured by 2FA, follow the app's redeposit prompts to move any funds nearing their timelock expiry to fresh addresses.</p></blockquote><h2 id=\"h_01EVXMVE71JR69VR72W6EB00VC\">Recovering an Account with 2FA Protection</h2><p>If you lose access to your 2FA method or the Blockstream app service becomes unavailable, the account recovery process differs depending on the type of account you are using:</p><div class=\"mobile_table_scroll\"><figure class=\"wysiwyg-table wysiwyg-table-align-left\"><table><tbody>\n<tr>\n<td><strong>Account</strong></td>\n<td><strong>Bitcoin</strong></td>\n<td><strong>Liquid</strong></td>\n</tr>\n<tr>\n<td><strong>2-of-2</strong></td>\n<td>Uses CheckSequenceVerify (CSV)*</td>\n<td>Uses CheckSequenceVerify (CSV)</td>\n</tr>\n<tr>\n<td><strong>2-of-3</strong></td>\n<td>Uses a third backup key</td>\n<td>N/A</td>\n</tr>\n<tr><td colspan=\"3\">*<a href=\"https://blockstream.com/2021/01/25/en-blockstream-green-bitcoin-wallets-now-using-checksequenceverify-timelocks/\" target=\"_blank\" rel=\"noopener noreferrer\">previously used nLockTime</a>\n</td></tr>\n</tbody></table></figure></div><h3 id=\"h_a0e00982-eb22-42f9-af2f-997bf0f67a09\">Bitcoin 2FA Account Recovery (CheckSequenceVerify)</h3><blockquote><p><strong>Note:</strong> On Monday, January 25th, 2021, the <a href=\"https://blockstream.com/2021/01/25/en-blockstream-green-bitcoin-wallets-now-using-checksequenceverify-timelocks/\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream app (formerly Blockstream Green) switched its timelock script from nLocktime to CheckSequenceVerify (CSV) </a>for the <a href=\"https://glossary.blockstream.com/timelocks/\" target=\"_blank\" rel=\"noopener noreferrer\">timelocks</a> used in Multisig Shield wallets for Bitcoin 2-of-2 accounts. This article describes the new CSV timelock behavior. If you used Blockstream App before January 25th, some funds in your wallet might still be secured by nLockTime. <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/how-do-nlocktime-timelocks-work#entry:990@1:url\">Read this article</a> for more information on how nLockTime timelocks work.</p></blockquote><p>With CSV, each deposit sent to your wallet is assigned a assigned a <strong>timelock period</strong>; by default, this time period is set to 51,840 Bitcoin blocks, or around <strong>360 days</strong>. Each deposit resets the timelock period.</p><p>This means that during the first 360 days after you receive a deposit, you will need two keys to spend those funds. After 360 days have passed (or more specifically, after 51,840 blocks have been mined) during which you have not moved those specific funds, you can spend them without 2FA authentication using solely the key on your device (or using our <a href=\"https://github.com/greenaddress/garecovery#summary\">open source recovery tool</a> in case the 2FA service is permanently terminated).</p><p>To ensure that your wallet is always secured by 2FA, the app will prompt you to reactivate the 2FA by <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/perform-a-redeposit#entry:463@1:url\">redepositing</a> any funds that haven\u2019t moved for the duration of the timelock period.</p><h3 id=\"h_01HRYKB9YRAWKM8K6N4DN5J416\">Liquid 2FA Account Recovery (CheckSequenceVerify)</h3><p>Liquid Standard account recovery uses the same method as Bitcoin standard accounts. The only difference is that the CSV <em><strong>timelock period</strong></em> is set to 65535 Liquid blocks (the maximum value); roughly <strong>45 days</strong>.</p><p>After the timelock period expires, if you have not made any transactions from your account, you can spend your funds using only the key on your device (or the open source recovery tool).</p><h3 id=\"h_01HRYKB9YSP3TEVPAP3E58X6GQ\">Bitcoin 2-of-3 with 2FA Account Recovery (Backup Key)</h3><p>With 2-of-3 accounts, at any time you can immediately access your bitcoins without 2FA by combining your third backup key with the key on your device (there is no timelock period). You can use the <a href=\"https://github.com/greenaddress/garecovery\" target=\"_blank\" rel=\"noopener noreferrer\">garecovery tool</a> to spend funds in 2-of-3 accounts.</p><p>Unlike standard accounts, 2-of-3 accounts do not require regular redeposits.</p>"}, "app__perform-a-redeposit": {"title": "Perform a redeposit", "cat": "Blockstream App", "section": "Manage 2FA Accounts", "html": "<p>A <em>redeposit</em> is a transaction that moves your wallet\u2019s bitcoin to a new <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a> within your wallet.</p><p>If you are using a Bitcoin 2-of-2 or Liquid standard wallet, you will be prompted to redeposit any funds in your wallet that have not moved for 12 months (or a custom timelock period). The redeposit is required to refresh the timelock used in <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">the Blockstream app's special multisig security model</a>.</p><p><a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/how-do-nlocktime-timelocks-work#entry:990@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">If you have funds in your wallet that use legacy nLockTime timelocks</a>, you will receive the notification prompting you to complete a redeposit via email (you need to set up an email address to receive nLockTime notifications).</p><blockquote class=\"warning\"><p><strong>Warning:\u00a0</strong>If the timelock expires, you can spend the funds in your wallet without two-factor authenticator (2FA) confirmation until you complete a redeposit.</p></blockquote><h2 id=\"h_01JVZ60GPE6PMSFGNE8Q896F3F\">Perform a redeposit</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4120.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Navigate to the <strong>Transact</strong> tab, then tap <strong>Receive</strong> and copy a new address from your wallet.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Next, tap <strong>Send</strong> and past the address to send funds back to yourself. Make sure to select <strong>Send all</strong> to ensure that all expired coins are redeposited and the timelock is reset.</p>\n</div><p></p>"}, "app__cancel-2fa-reset": {"title": "Cancel 2FA reset", "cat": "Blockstream App", "section": "Manage 2FA Accounts", "html": "<p>If you have requested a 2FA reset, but you later find one of your missing 2FA methods, you can cancel the reset from your mobile or desktop app.</p>\n<h2 id=\"h_01JW6H8FYVVM8TSRRTP3Y1S1YS\">Desktop</h2>\n<div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Open the Blockstream app.</p>\n</div>\n<div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Make sure the correct wallet is selected and log in.</p>\n</div>\n<div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Near the top left of the page, click the <strong>three dots</strong> icon, select <strong>Settings</strong>, and then <strong>Two-Factor Authentication</strong>.</p>\n</div>\n<div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Under <strong>Request Two-Factor Reset</strong>, click <strong>Cancel Two-Factor Reset.</strong></p>\n</div>\n<div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Confirm using one of your existing 2FA methods.</p>\n</div>\n<div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">You will then be able to use your wallet as normal.</p>\n</div>"}, "app__set-up-watch-only-for-2fa-accounts": {"title": "Set up watch-only for 2FA accounts", "cat": "Blockstream App", "section": "Manage 2FA Accounts", "html": "<p>Watch-only mode is an optional feature that allows you to log in to a Blockstream wallet with limited permissions.</p><blockquote>\n<strong>Tip:</strong> Watch-only wallets can be particularly useful when used with your <a href=\"https://blockstream.com/jade\" rel=\"noopener noreferrer\" target=\"_blank\">Jade</a>, as you can still receive funds without needing your Jade device with you.</blockquote><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4121.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4122.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Log in to the Blockstream app and tap <strong>Settings</strong>.</p>\n</div><blockquote class=\"note\">\n<strong>Note:</strong> Watch-only mode only allows you to view the wallet it was set up for, so you will need to set up watch-only mode for each of your wallets separately.</blockquote><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select <strong>Wallet Details</strong> under the Wallet section.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Choose the wallet to set up watch-only access for under Multisig.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Create a username and password for your account then select <strong>Save</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Open the wallet list and tap the menu in the top right corner.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Tap <strong>Set up watch-only</strong> to proceed.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">Choose <strong>Multisig Shield</strong> as your watch-only type.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">7.</p>\n<p class=\"num-list-text\">Enter the username and password that you created previously, check the <strong>Remember me</strong> checkbox, then tap <strong>Log In</strong> to finish setting up your watch-only wallet.</p>\n</div><p></p><p>\u00a0</p>"}, "app__request-to-have-personal-identifiable-information-deleted": {"title": "Request to have Personal Identifiable Information deleted", "cat": "Blockstream App", "section": "Manage 2FA Accounts", "html": "<p>By default, the Blockstream app does not collect any Personal Identifiable Information (PII).</p><p>Optionally, and only if you create a multisig 2FA protected account, the Blockstream app will give you the option to enable two factor authentication. If you choose to receive your 2FA via Email, or Telephone number this will be the only Personal Identifiable Information (PII) collected by Blockstream to enable the 2FA security service.</p><p>At any moment you can ask us to get your PII deleted:</p><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Make sure your 2FA protected account is <strong>empty</strong></p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/manage-2fa-accounts/request-to-have-personal-identifiable-information-deleted/26121587011225.png#asset:5077:url\" alt=\"Screenshot 2023-07-12 at 12.07.57 PM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Open <strong>Settings</strong> -&gt; <strong>Recovery</strong> -&gt; <strong>Delete Wallet</strong></p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/manage-2fa-accounts/request-to-have-personal-identifiable-information-deleted/26121631020697.png#asset:5078:url\" alt=\"Screenshot 2023-12-07 at 11.53.47 AM.png\" /> <img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/manage-2fa-accounts/request-to-have-personal-identifiable-information-deleted/26121602306201.png#asset:5079:url\" alt=\"Screenshot 2023-12-07 at 11.53.18 AM.png\" /> <img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-app/manage-2fa-accounts/request-to-have-personal-identifiable-information-deleted/26121622102297.png#asset:5080:url\" alt=\"Screenshot 2023-12-07 at 11.53.26 AM.png\" /></p>"}, "app__the-upgrade-from-nlocktime-to-checksequenceverify": {"title": "The upgrade from nLockTime to CheckSequenceVerify", "cat": "Blockstream App", "section": "Manage 2FA Accounts", "html": "<p>On Monday, January 25th, 2021, the <a href=\"https://blockstream.com/2021/01/25/en-blockstream-green-bitcoin-wallets-now-using-checksequenceverify-timelocks/\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream app (formerly Blockstream Green) switched from nLockTime to CheckSequenceVerify (CSV)</a> for the <a href=\"https://glossary.blockstream.com/timelocks/\" target=\"_blank\" rel=\"noopener noreferrer\">timelocks</a> used in the <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">multisig security for Bitcoin 2-of-2 accounts</a>.</p><h2 id=\"h_01K6N6BPSWAQ1Q366EY241QH2R\">Timelocks Ensure Recoverability of 2-of-2 accounts</h2><p>As standard, the Blockstream app uses a \u201cMultisig Shield\u201d that enables you to secure your Bitcoin wallets with two-factor authentication (2FA).</p><p>There are two multisig configurations when creating a new wallet in the Blockstream app: 2-of-2 by default and optionally 2-of-3. In either configuration, Blockstream's servers hold one of the keys. If you lose access to all of your 2FA methods, or in the unlikely event that Blockstream\u2019s servers become permanently unavailable, a 2-of-3 wallet is easily recoverable because you have access to your own third backup key. A 2-of-2 wallet would lock your funds permanently\u2014hence we use timelocks for these wallets to allow users to recover their funds.</p><h2 id=\"h_01K6N6BPSWJRFY6NBDHNBJQP0E\">nLockTime Challenges</h2><p>There are a variety of timelock scripts available on the Bitcoin protocol. Originally, we used nLockTime in GreenAddress, which enables our servers to create pre-signed transactions that can only be spent after a certain number of blocks. We chose nLockTime because CSV was not available at the time\u2014it was added to the Bitcoin protocol in a soft fork in May 2016.</p><p>In our case, we defaulted the timelock period to 12,960 blocks\u2014around 90 days\u2014with the timelock period customizable. The user could then use this pre-signed transaction combined with the wallet\u2019s <span style=\"font-weight:400;\">recovery phrase</span> to recover their wallet without needing any input from Blockstream.</p><p>However, to ensure users could recover all of their funds without the server key, we needed to provide each user with a pre-signed transaction file for their entire balance <em>every time they sent or received a transaction</em>. In addition to the inconvenience, this also meant we required an email address from each user. While users can use pseudonymous email addresses, tying email accounts to Bitcoin accounts wasn\u2019t ideal from a privacy perspective.</p><h2 id=\"h_01K6N6BPSW6K9PX3ZMTY8NMRVG\">CheckSequenceVerify for Trust-Minimization and Privacy Improvements</h2><p>CheckSequenceVerify (CSV) is an alternative timelock script that works a little differently. It secures the transactions at the input level instead of the output level (i.e. without a pre-signed transaction). In the Blockstream app, CSV ensures that each deposit you receive requires both keys to spend within 51,840 blocks (by default, around 360 days) and only one key (the key on your device) after this time. Each deposit starts its own independent countdown from the block in which it was confirmed.</p><p>You can customize the CSV expiry window to:</p><ul>\n<li>25,920 blocks ~ 6 months</li>\n<li>51,840 blocks ~ 12 months</li>\n<li>65,535 blocks ~ 15 months</li>\n</ul><p>This way, CSV trust-minimizes the recovery process by making it atomic and improves your privacy by no longer requiring an email address associated with the account.</p><h2 id=\"h_01K6N6BPSXYRPCE40HBZ56SKYW\">CheckSequenceVerify vs nLockTime</h2><h3 id=\"h_01K6N6BPSXH7BXD1BTARW6ENQ2\">Pros</h3><ul>\n<li>\n<strong>Trust-minimization:</strong> You will be able to recover your bitcoin without needing any timelock backup files from our servers. In fact, the receiving addresses now embed the timelock condition, assuring the recoverability of your funds from the moment you receive them. Advanced users can even check that a Blockstream app receiving <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> is CSV-protected before receiving funds to it.</li>\n<li>\n<strong>Privacy:</strong> You no longer need to link any new accounts to an email address.</li>\n</ul><h3 id=\"h_01K6N6BPSX6FAYGVKZYKNJYR14\">Cons</h3><ul>\n<li>\n<strong>Mixed nLockTime and CSV wallets:</strong> If you already use a 2-of-2 wallet (used by most users), you will have a mixture of nLocktime- and CSV-secured funds for a while. Any new funds you receive will be on CSV, and existing funds will be migrated from nLockTime to CSV as you spend them.</li>\n<li>\n<strong>Funds spendable with recovery phrase after timelock expiry:</strong> If you have 2FA set up and someone steals your <span style=\"font-weight:400;\">recovery phrase</span>, that person could now spend your funds after the expiry of the timelocks without the timelock backups (with nLockTime, they required both). To keep your funds secure from this threat, make sure you have 2FA set up and promptly follow any redeposit notifications from your wallet.</li>\n<li>\n<strong>Slightly more fees:</strong> The CheckSequenceVerify timelocks take up a little more space on the <a href=\"https://glossary.blockstream.com/blockchain/\" target=\"_blank\" rel=\"noopener noreferrer\">blockchain</a> than nLockTime timelocks. As a result, transactions from Blockstream app wallets will be 2% more expensive on average (Taproot should enable us to make some big reductions on this in the future).</li>\n</ul><h2 id=\"h_01F021F74ET3XEQHCBFK08N4Y7\">Log In With the Latest Version to Activate</h2><p>Only users logging in with the following versions or greater of Blockstream app will be able to take advantage of CSV:</p><ul>\n<li>\n<strong>iOS and Android:</strong> 3.4.3 and higher&nbsp;</li>\n<li>\n<strong>Desktop:</strong> 0.0.6 and higher&nbsp;</li>\n</ul>"}, "app__how-do-nlocktime-timelocks-work": {"title": "How do nLockTime timelocks work?", "cat": "Blockstream App", "section": "Manage 2FA Accounts", "html": "<p>nLocktime is a type of timelock script that was used in previous versions of the Blockstream app to ensure that you could recover the funds in your Bitcoin 2-of-2 wallet in the event that you lose access to all of your two-factor authentication (2FA) methods or Blockstream\u2019s servers became unavailable.</p><p>On Monday, January 25th, 2021,the&nbsp;<a href=\"https://blockstream.com/2021/01/25/en-blockstream-green-bitcoin-wallets-now-using-checksequenceverify-timelocks/\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream app (formerly Blockstream Green) switched from nLocktime to CheckSequenceVerify (CSV)</a> for the <a href=\"https://glossary.blockstream.com/timelocks/\" target=\"_blank\" rel=\"noopener noreferrer\">timelocks</a> used in the&nbsp;<a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">multisig security for Bitcoin 2-of-2 accounts</a>. CSV is a different type of timelock script that makes the recovery process more straightforward by removing the need for an email address. <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/the-upgrade-from-nlocktime-to-checksequenceverify#entry:901@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Read more</a> about the mechanics of the change.</p><blockquote class=\"note\">\n<strong>Note:</strong> If you are using a wallet created before Jan 25th, 2021, it is possible that there are still funds in your wallet that are secured by nLockTime. These funds will be automatically migrated to CSV timelocks as you continue to use the wallet.&nbsp;</blockquote><h2 id=\"h_01K6N6YZFK2S41XFWMKTVPA5B5\">How nLockTime Timelocks Work</h2><p>Your Bitcoin 2-of-2 wallet requires signatures from two private keys for any outgoing transaction: one of those private keys is held by you on your device and protected by your PIN code (with your <a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a>), while the other key is held on the Blockstream servers and protected by your selected two-factor authentication (2FA) method.&nbsp;</p><p>nLockTime works as a \"plan B\" to help obtain the second signature in the event you lose access to your 2FA method or are unable to access Blockstream's servers.&nbsp;</p><p>The recovery process via nLockTime uses pre-signed transactions generated by the Blockstream servers. <span style=\"font-weight:400;\">If you have </span><span style=\"font-weight:400;\">set an email address for recovery in your wallet\u2019s settings</span><span style=\"font-weight:400;\">, these pre-signed transactions will be emailed to you whenever you make a transaction.</span></p><blockquote class=\"note\">\n<strong>Note: </strong><span style=\"font-weight:400;\">You must set an email address in advance to be able to </span><span style=\"font-weight:400;\">recover a Bitcoin 2-of-2 account</span><span style=\"font-weight:400;\">.</span>\n</blockquote><p><span style=\"font-weight:400;\">If you have not made any transactions within the </span><span style=\"font-weight:400;\"><em>nLockTime period</em> (12,960 Bitcoin blocks, or 90 days by default)</span><span style=\"font-weight:400;\">, the nLockTime transactions can be used to move your funds without requiring a signature from the second key on the Blockstream servers.</span></p><p><span style=\"font-weight:400;\">To ensure that your wallet is always secured by 2FA, the app will </span><span style=\"font-weight:400;\">request a redeposit</span><span style=\"font-weight:400;\"> for any funds that haven\u2019t moved for the duration of the timelock period.&nbsp;</span></p><blockquote class=\"note\">\n<strong>Note:</strong> nLockTime is only used for Bitcoin 2-of-2 wallets. Liquid wallets only use CSV, and Bitcoin 2-of-3 wallets do not require timelock as you can always combine your third backup key with the key on your device to recover your funds.</blockquote><h2 id=\"h_01F025PK385YMWK8Z2R69XGKXF\">Find Out If Your Wallet Still Uses nLockTime</h2><p>Whether your funds are secured by CSV or nLockTime depends on whether you have been using your wallet before January 25th or not.</p><h3 id=\"h_01K6N6YZFKMXJJZ2SWV9EAV9PK\">If You Used Your Wallet Before January 25th, 2021</h3><p>You may have a mix of nLockTime- and CSV-secured funds in your wallet for some time.</p><p>Any funds sent to your wallet before January 25th are secured by nLockTime. Any new transaction you receive after January 25th automatically uses CSV, <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/the-upgrade-from-nlocktime-to-checksequenceverify#entry:901@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">so long as your Blockstream app is updated</a>. Your existing funds will be migrated from nLockTime to CSV as you spend them (through <a href=\"https://en.bitcoin.it/wiki/Change#:~:text=When%20the%20output%20of%20a,difference%20back%20to%20this%20address.\" target=\"_blank\" rel=\"noopener noreferrer\">change transactions</a>).</p><blockquote class=\"warning\">\n<strong>Warning:</strong> You must have email notifications enabled for your account in order to make use of the timelocks associated with nLockTime-secured funds. If you have not associated an email address with your account and lose access to your 2FA methods or Blockstream's servers, you could lose these funds. CSV timelocks cannot be used to recover nTimeLock-secured funds.</blockquote><h3 id=\"h_01K6N6YZFKF37WWRXXEP0RYA9V\">If You Created a Wallet After January 25th, 2021</h3><p>If <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/the-upgrade-from-nlocktime-to-checksequenceverify#entry:901@1:url\">your Blockstream app was up to date,</a> and you created your wallet after January 25th, 2021, your wallet doesn't use nLockTime timelocks. All funds will be secured by CSV.</p>"}, "app__lost-device-with-wallet-access": {"title": "Lost device with wallet access", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p>If you have lost the device that had access to your Blockstream app wallet, <strong>don\u2019t worry</strong>. You can still recover your funds as long as you have your<strong> recovery phrase.</strong></p><p>Common scenarios include:</p><ul>\n<li>The device with wallet access has been lost or stolen</li>\n<li>The device has been damaged or is no longer working</li>\n<li>The device was reset to factory settings</li>\n<li>The Blockstream app was uninstalled</li>\n</ul><p>In any of these cases, you will need to install the Blockstream app again on a new or recovered device and restore your wallet using your <span style=\"font-weight:400;\">recovery phrase</span>.</p><ol>\n<li>Download and install the latest version of the Blockstream&nbsp;app from the <a href=\"https://blockstream.com/app/\" target=\"_blank\" rel=\"noopener noreferrer\">official source</a>.</li>\n<li>Open the app. During the wallet setup process, select <strong>\u201cRestore from backup\u201d</strong>.</li>\n<li>Enter your 12 or 24 word recovery phrase when prompted.</li>\n<li>Set a new PIN as needed.</li>\n</ol><blockquote><p><strong>Important:</strong> Blockstream does not have access to your recovery phrase and cannot help you recover your funds if it is lost. Your recovery phrase is the only way to restore your wallet and access your Bitcoin.</p></blockquote><p>For extra security in the future, we recommend storing your recovery phrase offline in a safe location.</p>"}, "app__lost-recovery-phrase": {"title": "Lost recovery phrase", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p>If you have lost your word recovery phrase, it is important to understand what that means for your wallet access and funds.</p><p>The recovery phrase is the <strong>only way</strong> to restore access to your Blockstream wallet if your device is lost, damaged, or reset.</p><blockquote><p><strong>Warning:</strong> Blockstream does not store your recovery phrase and cannot retrieve it for you under any circumstances.</p></blockquote><p>Without your recovery phrase, you will not be able to:</p><ul>\n<li>Restore your wallet on a new device</li>\n<li>Access your bitcoin if the app is uninstalled or the device is wiped</li>\n<li>Recover funds if your device is lost or stolen</li>\n</ul><p>If your current device is still functional and your wallet is accessible:</p><ol>\n<li>Open the wallet app.</li>\n<li>Go to the <strong>Security</strong> tab.</li>\n<li>Locate the option to view or back up your recovery phrase under the <strong>Recovery Method</strong> section.</li>\n<li>Write down the 12 or 24 words and store them in a secure, offline location.</li>\n</ol><p>If you no longer have access to the device, and you do not have the recovery phrase saved elsewhere, <strong>you cannot recover your funds</strong>.</p><p>We strongly recommend writing down your recovery phrase when first setting up the wallet and storing it safely.</p>"}, "app__forgot-wallet-pin": {"title": "Forgot wallet PIN", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p>If you've forgotten the PIN used to unlock your Blockstream wallet, <strong>don't worry</strong>. You can still regain access as long as you have your <strong>recovery phrase.</strong></p><p>The PIN is a security feature used to protect access to the wallet on your device, but it does not affect your actual bitcoin holdings or your recovery phrase.</p><h2 id=\"h_01JVZ3QF5FMFDRDWWABGHKBBCE\">How to reset your PIN</h2><ol>\n<li>Delete or uninstall the Blockstream app from your device.</li>\n<li>Reinstall the app from the <a href=\"https://blockstream.com/app/\" target=\"_blank\" rel=\"noopener noreferrer\">official source</a> (Google Play, App Store, or APK).</li>\n<li>Open the app and choose <strong>Restore Wallet </strong>during the wallet setup process.</li>\n<li>Enter your recovery phrase to recover your wallet.</li>\n<li>During the restoration process, you\u2019ll be able to set a new PIN.</li>\n</ol><blockquote><p><strong>Important:</strong> If you <a href=\"https://help.blockstream.com/blockstream-app/troubleshooting/lost-recovery-phrase#entry:255@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">do not have your recovery phrase</a>, you will not be able to reset the PIN or regain access to your wallet. Blockstream cannot recover your funds without the recovery phrase.</p></blockquote><p>For your bitcoin's security, store your recovery phrase in a secure, offline location and avoid saving it on digital devices.</p>"}, "app__fix-issues-with-recovery-phrase-entry": {"title": "Fix issues with recovery phrase entry", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p><span style=\"font-weight:400;\">If you are trying to enter your recovery phrase to </span><a href=\"https://help.blockstream.com/blockstream-app/set-up-transact-recover-your-wallet/restore-wallet#entry:389@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">restore a wallet</a> <span style=\"font-weight:400;\">and you receive the <strong>Invalid Recovery Phrase</strong>&nbsp;error, it may help to review the reasons for this and possible solutions below.</span></p><h2 id=\"h_01JVZ3VBHQKTR75HHHV1TV6HSF\"><span style=\"font-weight:400;\">One or More Words Are Incorrect</span></h2><p><span style=\"font-weight:400;\">During the restore process, the Blockstream app will alert you to any word that you may have entered incorrectly:</span></p><ul>\n<li style=\"font-weight:400;\">\n<strong>Mobile: </strong><span style=\"font-weight:400;\">The word will be highlighted in red.</span>\n</li>\n<li style=\"font-weight:400;\">\n<strong>Desktop: </strong><span style=\"font-weight:400;\">The app will prevent you from proceeding to the next entry box.</span>\n</li>\n</ul><p><span style=\"font-weight:400;\">There are a few possible causes for this:</span></p><ul>\n<li style=\"font-weight:400;\">\n<strong>Not lower case: </strong><span style=\"font-weight:400;\">Re-enter the word in all lower case letters.</span>\n</li>\n<li style=\"font-weight:400;\">\n<strong>Misspelling: </strong><span style=\"font-weight:400;\">Correct the word's spelling based on your backup.</span>\n</li>\n<li style=\"font-weight:400;\">\n<strong>Hidden punctuation: </strong><span style=\"font-weight:400;\">Remove any spaces, tab breaks, periods, commas, etc.</span>\n</li>\n<li style=\"font-weight:400;\">\n<strong>Copy-pasted: </strong><span style=\"font-weight:400;\">Try manually typing the word instead (copy-paste can sometimes result in the wrong encoding).</span>\n</li>\n<li style=\"font-weight:400;\">\n<strong>Backup not written down clearly: </strong>For example, you have written down the word \"<em>brush</em>\" but your correct word is actually \"<em>crush</em>\". Y<span style=\"font-weight:400;\">ou may want to try similar-looking words from</span> <a href=\"https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt\" target=\"_blank\" rel=\"noopener noreferrer\">the complete recovery phrase word list</a><span style=\"font-weight:400;\">.&nbsp;</span>\n</li>\n</ul><h2 id=\"h_01JVZ3VBHQZ4PV9TAXK13R8JNC\"><span style=\"font-weight:400;\">One or More Words Are Missing</span></h2><p><span style=\"font-weight:400;\">Your recovery phrase may consist of 12, 24, or 27 words. If you have a different number of words, it means you are missing some and will need to locate them.</span></p><h2 id=\"h_01JVZ3VBHR4HEH7GBS5JDFSG96\"><span style=\"font-weight:400;\">Password Protected Is Incorrectly Enabled</span></h2><p><span style=\"font-weight:400;\">The <strong>Password protected</strong></span> option is only used for 27-word recovery phrases. If you do not have a 27-word recovery phrase and enable this option, you will receive the <strong>Invalid Recovery Phrase</strong> error.</p><h2 id=\"h_01JVZ3VBHR980N5AHWH8GK6EBN\"><span style=\"font-weight:400;\">Words Are Correct But in the Wrong Order</span></h2><p><span style=\"font-weight:400;\">If all words entered are recognized as valid by the app, but are recorded in the wrong order:</span></p><ul>\n<li style=\"font-weight:400;\">\n<strong>Mobile: </strong><span style=\"font-weight:400;\">The app will show the </span><strong>Invalid Recovery Phrase </strong>error<span style=\"font-weight:400;\">.</span>\n</li>\n<li style=\"font-weight:400;\">\n<strong>Desktop: </strong><span style=\"font-weight:400;\">The app will not progress after you click </span><strong>Restore</strong><span style=\"font-weight:400;\">.</span>\n</li>\n</ul><p><span style=\"font-weight:400;\">To restore access to your funds, you may be able to reorder the words using a wallet recovery service, but this is beyond the scope of support that we can provide.</span></p><h2 id=\"h_01JVZ3VBHRXHW8VMT6CHGXCVDK\"><span style=\"font-weight:400;\">Recovery Phrase Does Not Match a Wallet on Our Server</span></h2><p><span style=\"font-weight:400;\">If all words have been accepted and you are still unable to proceed with the recovery due to the \"</span><a href=\"https://help.blockstream.com/blockstream-app/troubleshooting/fix-issues-with-recovery-phrase-entry#entry:592@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><span style=\"font-weight:400;\">Wallet not found</span></a><span style=\"font-weight:400;\">\" message, t</span><span style=\"font-weight:400;\">he two most likely causes are:</span></p><ul>\n<li style=\"font-weight:400;\">\n<strong>The </strong><span style=\"font-weight:400;\"><strong>recovery phrase</strong></span><strong> is for a different network: </strong><span style=\"font-weight:400;\">Make sure you are trying to restore the recovery phrase to the right network. Testnet &nbsp;wallets are separated, whereas Bitcoin and Liquid are unified under the same wallet for ease of use.</span>\n</li>\n<li style=\"font-weight:400;\">\n<strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">The recovery phrase was created by different wallet software: </strong>Recovery phrases<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"> generated by other wallet software (e.g. Electrum) are not compatible with the Blockstream app. You should retry with the original wallet software used to generate the </span><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-weight:400;\">recovery phrase</span><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">.</span>\n</li>\n</ul><blockquote><p><strong>Tip:</strong> If you have tried the above suggestions, still cannot restore, and are convinced your recovery phrase is correct, you are free to restore your recovery phrase to another platform (such as <a href=\"https://electrum.org/#home\" target=\"_blank\" rel=\"noopener noreferrer\">Electrum</a>). Make sure to select <strong>BIP39</strong> as the \"Seed type\" when restoring on Electrum.</p></blockquote>"}, "app__fix-invalid-address-error": {"title": "Fix invalid address error", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p>The <strong>\"invalid <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a>\"</strong> error appears when the address you are trying to send to <strong>does not belong to the same network as your wallet</strong>. For example, this can happen if you're using a Bitcoin wallet and try to send to a Testnet address, or if you try to send to an address from a completely different <a href=\"https://glossary.blockstream.com/blockchain/\" target=\"_blank\" rel=\"noopener noreferrer\">blockchain</a>.</p><p>To resolve this error, double-check that the address you're entering matches the network your wallet is using.</p><ul>\n<li>\n<strong>Bitcoin</strong> wallet addresses usually start with <strong>1</strong>, <strong>3</strong>, or <strong>bc1</strong>.</li>\n<li>\n<strong>Liquid</strong> wallet addresses typically begin with <strong>Q</strong> or <strong>VJ</strong> (or use confidential formats starting with <strong>CTE</strong> or <strong>ex</strong>).</li>\n<li>Testnet wallet addresses usually start with <strong>m</strong>, <strong>2</strong>, or <strong>tb1</strong>.</li>\n</ul><p>If you're unsure which network your wallet is using, check the network setting in the Blockstream app or review how the wallet was originally set up.</p>"}, "app__fix-insufficient-funds-error": {"title": "Fix insufficient funds error", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p>If you see the <strong>Insufficient funds</strong> error message when you try to send a transaction, it means you are trying to send more funds than you have in your account (when also accounting for <a href=\"https://help.blockstream.com/blockstream-app/faqs/why-do-i-have-to-pay-transaction-fees-and-why-are-they-sometimes-high#entry:204@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">transaction fees</a>). It may appear that you have enough funds to spend, but this is before calculating the fee paid to Bitcoin miners to have your transaction included on the <a href=\"https://glossary.blockstream.com/blockchain/\" target=\"_blank\" rel=\"noopener noreferrer\">blockchain</a>.</p><p>Try lowering the amount you are spending (or send more funds to your wallet) to make sure there is enough left over to pay for fees.</p><p>If you would like to send the maximum amount possible, select <strong>Send all</strong>, which will automatically adjust your sending amount to account for the transaction fees that will be paid.</p><blockquote class=\"note\"><p><strong>Note:</strong> If you are <a href=\"https://help.blockstream.com/blockstream-app/use-liquid-bitcoin/receive-and-send-liquid-assets#entry:275@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">sending assets using Liquid</a>, then you will<a href=\"https://help.blockstream.com/liquid-network/faqs/how-do-transaction-fees-on-liquid-work#entry:1070@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">&nbsp;pay transaction fees with LBTC</a>, so make sure you have enough in your wallet to avoid the <strong>Insufficient funds</strong> error.</p></blockquote>"}, "app__fix-issues-with-unexpected-wallet-balance": {"title": "Fix issues with unexpected wallet balance", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p>There are several likely reasons why your wallet may appear to be showing the wrong balance.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4125.png?v=13\"/></figure><ul>\n<li>Your funds are in a different wallet than the one you are checking.</li>\n<li>You used a BIP39 passphrase and are re-entering it incorrectly, or you did not use a passphrase but you are entering one.</li>\n<li>The recovery phrase used when restoring is for a different wallet than the one you are trying to access.</li>\n</ul><h2 id=\"h_01HA2G06AGEF1ND9W0ADQSQPMJ\">Check a Different Wallet</h2><p>The Blockstream app can hold <strong>multiple wallets</strong> on one device. If you initially open a wallet and don't see your funds, you may be viewing the wrong wallet.</p><p>Try tapping the <strong>Wallet icon</strong> in the top-right corner to switch wallets.</p><p class=\"wysiwyg-text-align-center\"></p><h3>Check Archived Accounts</h3><p>If you're not seeing another wallet there, ensure your wallet isn't archived.</p><p>Tap <strong>Settings</strong> in the bottom navigation bar, tap <strong>Archived Accounts</strong>, and then tap the <strong>three dots</strong> on a specific wallet to unarchive it.</p><p class=\"wysiwyg-text-align-center\"></p><h2 id=\"h_01HA2G06AGZJ9THXWTFFPM62N9\">Enter the Correct BIP39 Passphrase</h2><p>If you are using a BIP39 <a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/set-up-a-bip39-passphrase#entry:1107@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">passphrase</a> for your Blockstream app wallet, you must enter the exact passphrase each time to access that wallet. You may have forgotten that you originally set a passphrase, so you won't see your funds if you try to access the wallet without entering it.</p><p>Additionally, there is no concept of an \"incorrect passphrase\". Rather than displaying an error, entering a passphrase with even a slight typo will open an entirely separate wallet.</p><p>To find your correct wallet balance:</p><ul>\n<li>\n<strong>Enter the wallet's exact passphrase: </strong>Every letter, number, or special character in your passphrase counts.</li>\n<li>\n<strong>Try without a passphrase: </strong>Some users mistakenly think they sent funds to a passphrase protected wallet but did not. If you think you accidentally created the wallet without a passphrase, make sure you leave the passphrase field empty when restoring.</li>\n</ul><h2 id=\"h_01HA2G06AGVAQZEQETHBD5AE9F\">Enter the Correct Recovery Phrase</h2><p dir=\"ltr\">You must enter the\u00a0exact\u00a0<a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">recovery phrase</a>\u00a0to restore the wallet that holds your funds. If you enter the wrong 12, 24, or 27 word recovery phrase, you will see a different wallet with the wrong balance (or zero balance).\u00a0</p><p dir=\"ltr\">It\u2019s common for Bitcoin users to have multiple recovery phrases from past wallets. Double-check that you\u2019re using the correct phrase, and try any other backups if you aren\u2019t sure which one is correct.</p><p dir=\"ltr\">If you still do not see a balance after ensuring you\u2019ve entered the correct recovery phrase, try restoring the wallet on another device to rule out any problems with the device itself.</p><p dir=\"ltr\">It\u2019s possible that you generated your recovery phase with different wallet software (e.g. Electrum), so try restoring on platforms you may have used in the past to see if you are able to view your funds.</p><p dir=\"ltr\">If you believe you may have\u00a0<a href=\"https://help.blockstream.com/blockstream-app/troubleshooting/lost-recovery-phrase#entry:255@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">lost your recovery phrase</a>, you unfortunately cannot recover your funds.</p><h2 id=\"h_01HA2G06AG4EAE2QZJTWR782GM\">Check Your Security Policy</h2><blockquote><p><strong>Note:</strong> As of May 2025, you cannot enable new 2FA-protected accounts. This functionality is only available to users who had already activated this account type previously.</p></blockquote><p dir=\"ltr\">The Blockstream app uses one of two methods to generate your wallet: <strong>Standard Singlesig</strong> or <strong>2FA Protected</strong>. Depending on your security model during setup, the app will generate a wallet's private keys differently.</p><p dir=\"ltr\">When restoring a wallet from a recovery phrase, the app automatically scans for the security type associated with that phrase. If the wallet was created as Singlesig, the app will detect and restore it as Singlesig. If it was created as 2FA Protected (multisig), the app will detect and restore it as 2FA Protected. The user does not need to manually select the security policy during the restore process.</p><blockquote><p><strong>Tip:</strong> All Blockstream app wallets created <strong>before September 2021</strong> (including GreenAddress wallets) use 2FA. All <strong>Blockstream Jade</strong> wallets created using Blockstream App <strong>before April 2022</strong> use 2FA as well.</p></blockquote><h2 dir=\"ltr\" id=\"h_01K5VY8DEFCS1PRPZW9C90JM9H\">Select the Correct Network</h2><p dir=\"ltr\">The Blockstream app supports\u00a0<strong>Bitcoin mainnet</strong>, <a href=\"https://glossary.blockstream.com/liquid-network/\" rel=\"noopener noreferrer\" target=\"_blank\"><strong>Liquid Network</strong></a>, <strong>and testnet</strong>. Testnet uses a separate wallet, while Bitcoin and Liquid are unified under the same wallet for ease of use. If you switch to or restore your wallet on the wrong network, your wallet will appear with the wrong balance (or zero balance).\u00a0</p><p dir=\"ltr\">For example, if you sent funds to your Bitcoin mainnet wallet but still have a test wallet selected, you\u2019ll see a different balance.\u00a0</p><p dir=\"ltr\">To fix this issue, you must\u00a0<strong>select the correct network</strong>. Before restoring or switching wallets, make sure the app\u2019s network setting matches where you sent the funds.</p><blockquote><p dir=\"ltr\"><strong>Keep in mind:\u00a0</strong>You must manually\u00a0<a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/set-up-testnet-wallet#entry:986@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">enable testnet</a>\u00a0in the app prior to creating a testnet wallet. If that setting appears disabled in your app, it\u2019s likely that you didn\u2019t mistakenly send funds to a testnet wallet.</p></blockquote><h2 id=\"h_01HA2G06AG857SZAMW296FA9N0\">Need More Help?</h2><p dir=\"ltr\"><strong>Remember:</strong> your funds are safe.\u00a0None of these issues mean your funds are permanently lost. Your recovery phrase and/or passphrase still secure your bitcoin or Liquid assets. These troubleshooting steps simply ensure you\u2019re opening the correct wallet. Once you restore your wallet correctly, your expected balance should appear.</p><p dir=\"ltr\">If you have checked each of the possible scenarios above and still believe you are seeing the wrong balance, please try the options below.</p><blockquote class=\"note\"><p><strong>Note:\u00a0</strong>For our team to assist further, we will need a screenshot of a funded <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a> shown in your address list. You can attach screenshots to any support ticket.</p></blockquote><ul>\n<li>Take note of a funded address you believe belongs to your wallet. View your address list and try to find that specific address in your wallet. You can find this by selecting Receive -&gt; More Options (the icon with the three dots in the top-right corner) -&gt; List of Addresses. If you cannot find the address in your wallet, then there is an issue with one of the variables shown above and you will need to correct it.</li>\n<li>Do you suspect the Blockstream app is still showing the wrong balance? Singlesig wallet users can restore their recovery phrase to any BIP39 compatible platform (such as <a href=\"https://sparrowwallet.com/\" rel=\"noopener noreferrer\" target=\"_blank\">Sparrow</a>, make sure to check the <strong>BIP39</strong> option) to see if their funds appear in a different app. If the funds don't appear in another app, this confirms there is likely a problem with the way you are trying to access your wallet and not an issue with the Blockstream app.</li>\n</ul>"}, "app__lost-access-to-2fa-method": {"title": "Lost access to 2FA method", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p><span style=\"font-weight:400;\">If you have 2FA enabled, confirmation through one of your selected two-factor authentication (2FA) methods is required to spend funds from your Bitcoin or Liquid wallet. As part of the </span><span style=\"font-weight:400;\">Blockstream app\u2019s multisig security</span><span style=\"font-weight:400;\">, you cannot spend funds from your wallet without your 2FA code.</span></p><p><span style=\"font-weight:400;\">If you have lost access to all of your 2FA methods</span><span style=\"font-weight:400;\">, you can regain access to your wallet by either:</span></p><ol>\n<li><span style=\"font-weight:400;\">Performing a 2FA reset <strong>OR</strong></span></li>\n<li><span style=\"font-weight:400;\">If funds were received after January 2021 and older than your timelock period (default ~1 year), you can spend funds directly in the app without a 2FA method.</span></li>\n</ol><p>As long as you retain access to at least one enabled 2FA method, you will be able to disable and change any lost 2FA method. For this reason, consider enabling multiple 2FA methods.</p><p><span style=\"font-weight:400;\">After initiating a reset, you will </span><span style=\"font-weight:400;\">need to wait at least one year</span><span style=\"font-weight:400;\"> before you are able to spend your wallet\u2019s funds. Therefore, resetting your 2FA should be an option of last resort, used only when you are certain that you have permanently lost access to all of your 2FA methods.</span></p><blockquote class=\"warning\"><p><strong>Warning:</strong> After your 2FA lock period fully expires, your wallet reverts to singlesig protection. However, if you then send a portion of your previously 2FA-protected balance to another wallet, there may be remaining change that is automatically sent back to your wallet. This would be treated as a <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/perform-a-redeposit#entry:463@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">redeposit</a>, <strong>which reactivates the 2FA protection</strong>.</p></blockquote><h2 id=\"h_01J0XF8C4JYATN9AFWHH1E6RSX\"><span style=\"font-weight:400;\">Reset Your 2FA</span></h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4123.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Open the Blockstream app and log in to the relevant 2FA-enabled wallet. Tap <strong>Settings</strong> in the navigation bar at the bottom of the screen, and scroll to <strong>Two-Factor authentication</strong>.</p>\n</div><p class=\"wysiwyg-text-align-center\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Below <strong>2FA Methods</strong> you will see a section titled <strong>Request Two-Factor reset</strong>. Select <strong>I lost my 2FA</strong>. <span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">In the window that pops up, enter an email address </span><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">to use as your new 2FA method after the reset period is complete. Then, click </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Save</strong><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">.</span></p>\n</div><blockquote class=\"warning\"><p><strong>Warning: </strong>Make sure you do not lose access to this email address. If you lose access to this email address, you will need to restart the 2FA reset and wait another 12 months.</p></blockquote><p class=\"wysiwyg-text-align-center\"></p><h2 id=\"h_01J0XF8C4JW1DJ28A74KQ9RNTT\"><span style=\"font-weight:400;\">Why Such a Long Waiting Period?\u00a0</span></h2><p><span style=\"font-weight:400;\">The long waiting period is a </span><span style=\"font-weight:400;\">crucial security measure to prevent\u00a0</span><span style=\"font-weight:400;\">someone from accessing your wallet and using the 2FA reset feature to steal your funds. If you see a notification of a 2FA reset attempt that you did not initiate yourself, the waiting period provides you plenty of time to log in to your wallet and\u00a0</span>cancel the reset<span style=\"font-weight:400;\">.</span></p><h2 id=\"h_01J0XF8C4JPRXNTMHW5T26RQDX\"><span style=\"font-weight:400;\">How Much Time Is Left on My Waiting Period?</span></h2><p><span style=\"font-weight:400;\">After initiating a 2FA reset, you can </span><span style=\"font-weight:400;\">check how many days remain on the waiting period in your wallet\u2019s settings</span><span style=\"font-weight:400;\">.</span></p><h2 id=\"h_01J0XF8C4KQ040FY8WX6TARN77\"><span style=\"font-weight:400;\">Can I Cancel the 2FA Reset?\u00a0</span></h2><p><span style=\"font-weight:400;\">Yes. If you have found one of your lost 2FA methods after requesting a reset, </span><span style=\"font-weight:400;\">you can cancel the reset at any time</span><span style=\"font-weight:400;\">.</span></p>"}, "app__submit-log-data-for-troubleshooting": {"title": "Submit log data for troubleshooting", "cat": "Blockstream App", "section": "Troubleshooting", "html": "<p>Activity logs are automatically kept and stored locally when using Blockstream App. This data can be extremely helpful to our support staff when assisting you with any issues. To share this data with Blockstream support staff, simply navigate to the Settings tab via the navigation bar at the bottom of the screen when you have the relevant wallet open. Then, tap the Support option, which is at the top of the Settings page.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/424-4124.png?v=13\"/></figure><p>On the next screen, you just need to enter your email address, a description of your issue, and make sure the Share Logs box is checked. Then, click Submit.</p><p class=\"wysiwyg-text-align-center\"></p>"}, "app__why-do-i-have-to-pay-transaction-fees-and-why-are-they-sometimes-high": {"title": "Why do I have to pay transaction fees and why are they sometimes high?", "cat": "Blockstream App", "section": "FAQs", "html": "<p>The Blockstream app operates on three Bitcoin-native networks: Bitcoin mainnet, <a href=\"https://liquid.net/\" target=\"_blank\" rel=\"noopener noreferrer\">Liquid</a>, and <a href=\"https://lightning.network/\" target=\"_blank\" rel=\"noopener noreferrer\">Lightning</a>. These networks have limited resources in terms of the volume or size of payments they can handle at any one time, so fees as a way to handle the prioritization of transactions.</p><p>The fee amount and how it is calculated will depend on the network that you're using to send the transaction.</p><blockquote class=\"note\"><p><strong>Note:</strong> Transaction fees in the Blockstream app are paid to those who process transactions on the Bitcoin, Liquid, and Lightning networks.</p></blockquote><h2 id=\"h_01JVACHQKHX2NF42ENT9JA4BNT\">Bitcoin Transaction Fees</h2><p>Bitcoin tends to have the highest fees of the three because it is the most decentralized and needs to keep the cost of operating a full node low. A new block of transactions is mined roughly every ten minutes on the Bitcoin network. Each block is limited by the data size of transactions rather than the bitcoin amount.</p><p>Due to the limited capacity of the Bitcoin network, fees can spike during times of high demand. In rare cases, <a href=\"https://bitinfocharts.com/comparison/bitcoin-transactionfees.html#3y\" target=\"_blank\" rel=\"noopener noreferrer\">fees have risen as high as $20 or more per transaction</a>. Reasons for sudden spikes in demand can range, from fear of missing out (FOMO) during a bitcoin price run, to the deployment of new meta protocol tokens based on systems such as <a href=\"https://www.investopedia.com/what-are-bitcoin-ordinals-7486436\" target=\"_blank\" rel=\"noopener noreferrer\">Ordinals</a> or <a href=\"https://kavinoky.com/2024/07/runes-on-bitcoin-blockchain-revolutionizing-tokenization-and-future-implications/\" target=\"_blank\" rel=\"noopener noreferrer\">Runes</a>.</p><blockquote class=\"note\"><p><strong>Note:</strong> Due to the limited block space on the Bitcoin network and the unpredictability of the demand for block space, transaction fees in the Blockstream app are best viewed as estimates. In situations where the fee is not sufficient for timely processing, you can <a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/speed-up-transaction-confirmation#entry:458@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">increase the fee</a> to speed up the transaction.</p></blockquote><h2 id=\"h_01JVTA76K3W148MAEETJRS50YB\">Liquid Transaction Fees</h2><p>Since Liquid is a federated sidechain for Bitcoin, its transaction fees tend to be lower than the Bitcoin mainnet. That being said, Liquid still has its own block size limit, and a functionary group generates a new block once per minute. If Liquid were to see increased demand for block space, fees could rise accordingly.</p><p>Much like Bitcoin itself, Liquid transaction fees are based on the data size of the transaction. Up to this point, there haven't been instances of demand spikes that have led to high fees on the network.</p><h2 id=\"h_01JVTA45Y7JR2HKR2KTMDES1SJ\">Lightning Transaction Fees</h2><p>The <a href=\"https://glossary.blockstream.com/lightning-network/\" target=\"_blank\" rel=\"noopener noreferrer\">Lightning Network</a> generally has the lowest transaction fees (not including fees for opening/closing channels). Technically, Lightning transactions can have zero fees associated with them because the network does not operate as a <a href=\"https://glossary.blockstream.com/blockchain/\" target=\"_blank\" rel=\"noopener noreferrer\">blockchain</a>. Instead, it is a secondary layer for payments built on top of Bitcoin and Liquid where transactions can be signed and cached before eventually achieving final settlement at the blockchain layer.</p><p>Notably, Lightning Network fees <em>are</em> based on the payment amount rather than Bitcoin and Liquid's data-size-based approach. If the fee for a Lightning payment is unusually high, it could be due to a lack of sufficient bitcoin liquidity in the Lightning nodes that are routing the payment.</p><h2 id=\"h_01KK0A420KG9SZTV6T1C0XPA65\">Swap Fees</h2><p><a href=\"https://help.blockstream.com/blockstream-app/use-liquid-bitcoin/perform-an-on-chain-swap#entry:93@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Performing a swap</a> in the Blockstream app incurs both a network fee and an additional swap fee.</p><ul>\n<li>\n<strong>Network fees</strong> are collected by Bitcoin miners <em>or</em> Liquid functionaries, depending on the direction of the swap. If you are swapping from mainnet to Liquid, Bitcoin miners collect the fee for confirming the transaction. For swaps <em>from</em> Liquid <em>to</em> mainnet, Liquid functionaries collect the fees to confirm the transaction.</li>\n<li>\n<strong>Swap fees</strong> are collected by a swap provider for facilitating the swap service.</li>\n</ul>"}, "app__why-is-my-transaction-taking-so-long-to-confirm": {"title": "Why is my transaction taking so long to confirm?", "cat": "Blockstream App", "section": "FAQs", "html": "<p>As a decentralized digital cash system, Bitcoin has some quirks that are not found in traditional, centralized online payment solutions. One of those quirks is that transactions made directly on the base Bitcoin <a href=\"https://glossary.blockstream.com/blockchain/\" target=\"_blank\" rel=\"noopener noreferrer\">blockchain</a> can be somewhat unpredictable in terms of how much they will cost and how long they will take to process.</p><p>For a Bitcoin transaction to finalize, a miner must confirm
