it in a block. New blocks are generated roughly every ten minutes, but there can be a large amount of variance in that ten minute average block time due to Bitcoin's <a href=\"https://glossary.blockstream.com/difficulty-adjustment/\" target=\"_blank\" rel=\"noopener noreferrer\">difficulty adjustment</a>. In fact, an hour or more can pass with no new blocks of transactions having been mined on a relatively frequent basis.</p><blockquote class=\"note\"><p><strong>Note: </strong>Bitcoin transactions are technically never finalized. Instead, they become increasingly impractical to reverse with every mined block after the block that included the transaction in question. While it is likely fine to consider a low-value Bitcoin transaction finalized after its inclusion in a block, it is usually recommended to wait for six block confirmations for high-value transactions.</p></blockquote><p>On top of the variance that comes with Bitcoin block times, users also need to make sure there is a large enough fee attached to their transaction. Since there is limited space in each block, miners will only include the transactions that have the highest fees attached to them. Users are effectively bidding for miners to include a transaction in a block. While the Blockstream app can estimate the proper fee to get a transaction into a block within a certain time window, it is not an exact science.</p><blockquote class=\"note\"><p><strong>Note: </strong>If you have a transaction that seems to be stuck, try <a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/speed-up-transaction-confirmation#entry:458@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">increasing the fee</a> attached to the transaction. If there is a large backlog of transactions for miners to process, increasing the fee can effectively move your transaction to the front of the line.</p></blockquote><p>It's worth noting that Bitcoin is still an evolving network. Over time, more transactions may move to secondary layers such as Liquid or Lightning. Compared to the base Bitcoin blockchain, these layers make tradeoffs to offer improved payment experiences where transaction processing time and cost can be more reliable.</p>"}, "app__why-does-my-receive-address-keep-changing": {"title": "Why does my receive address keep changing?", "cat": "Blockstream App", "section": "FAQs", "html": "<p>If you've noticed that your Bitcoin receive <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> changes every time you go to receive a payment in the Blockstream app, don\u2019t worry; this is completely normal and actually a beneficial privacy feature.</p><p>Each time you tap to receive bitcoin in the Blockstream app, the app generates a new, unused address from your wallet. Even though the address changes, each address is still connected to your same wallet, and you can access any funds sent to those addresses at any time.</p><p>This design helps protect your privacy. Because all Bitcoin transactions are recorded on a public ledger (the <a href=\"https://glossary.blockstream.com/blockchain/\" target=\"_blank\" rel=\"noopener noreferrer\">blockchain</a>), using the same address over and over makes it easy for someone to track your payments or estimate how much bitcoin you have. By using a new address for each payment, you make it much harder for others to link your transactions together.</p><blockquote class=\"note\"><p><strong>Note:</strong> Even if someone sends bitcoin to an older address you used before, you\u2019ll still receive the funds without any issues. All of your addresses are still part of your wallet, they just aren\u2019t reused by default.</p></blockquote><p>This is considered best practice in the Bitcoin world, and the Blockstream app handles it automatically for you, so you get better privacy without having to think about it.</p>"}, "app__what-is-a-recovery-phrase": {"title": "What is a recovery phrase?", "cat": "Blockstream App", "section": "FAQs", "html": "<p>Your recovery phrase is a list of 12 or 24 words, derived from <a href=\"https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt\" target=\"_blank\" rel=\"noopener noreferrer\">BIP39</a>, that stores all the information needed to restore your wallet.</p><p><strong>The recovery phrase is the most important piece of information associated with your wallet. Make sure you always have it backed up and protected or you may lose access to your funds. Blockstream does not have a copy of your recovery phrase, so it is the user's responsibility to maintain their backup.</strong></p><blockquote class=\"note\"><p><strong>Note:</strong> In other wallets, the recovery phrase is sometimes known as a <em>seed phrase</em>, <em>mnemonic backup</em>, or <em>recovery seed</em>.</p></blockquote><p>A recovery phrase looks something like this:</p><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">arrow garment kite truth yellow pelican roast latin discover jewel describe merry polar equip pistol next forest dignity kick word steel seminar actual genuine\n</code></pre><p>You can use your recovery phrase to <a href=\"https://help.blockstream.com/blockstream-app/set-up-transact-recover-your-wallet/restore-wallet#entry:389@1:url\">restore your wallet on any device</a> running the Blockstream app or using your Jade. You can use it to add access to the same wallet on multiple devices (e.g. desktop and mobile) or to restore your wallet on a new device (e.g. <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/restore-recovery-phrase-to-jade#entry:1040@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">you lost or broke the original device</a>).</p><h2 id=\"h_01K5H0CN11YCF4SA71PR1N021C\">How Do Recovery Phrases Work?</h2><p>When you create a wallet on the Blockstream app or on Jade, it automatically generates a recovery phrase which <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/set-up-jade#entry:522@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">you must write down</a> to complete the setup process.</p><p>The recovery phrase represents your Blockstream app or Jade private key (<a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">or one of your two keys if using a Multisig Shield wallet</a>) in a human-readable format. The private key is what allows you to spend bitcoin and Liquid assets. In reality, private keys are long strings of letters and numbers, but representing the key as a series of words minimizes the risk of errors when you write down your recovery phrase.</p><p>Being able to access your wallet is <strong>dependent on your recovery phrase</strong>, as well as the <strong>network</strong> and <strong>security policy</strong> you chose during setup.</p><p>For example:&nbsp;If you create a new wallet and choose Bitcoin as the network and Multisig Shield as the security policy, but then restore the same 12/24 words as a <em><strong>Singlesig</strong></em> Bitcoin wallet, it will generate a wallet, however your Multisig Shield funds will not appear.</p><p>This means that you can use the same recovery phrase for multiple networks, but the wallets will be completely separate and you should not expect to see the same balance in each of them.</p><h2 id=\"h_01K5H75BDC5BACQ4G7WYZDPKT9\">Recovery Phrase Best Practices</h2><ul>\n<li>\n<strong>Keep it somewhere safe:</strong> Don't lose it. If you change your hardware device, your device gets lost or stolen, you forget your PIN, or your PIN gets reset, you will need your recovery phrase to regain access to your wallet.</li>\n<li>\n<strong>Keep it somewhere secret: </strong>Anyone with access to your recovery phrase can steal your funds, so make sure no one else can find it. You can use <a href=\"https://help.blockstream.com/blockstream-app/manage-2fa-accounts/2fa-multisig-protection-explained#entry:364@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Multisig Shield</a> to mitigate this risk.</li>\n<li>\n<strong>Never send it over email or text to anyone:</strong> Blockstream support will never ask for your recovery phrase, and you should <a href=\"mailto:support@blockstream.com\" target=\"_blank\" rel=\"noopener noreferrer\">immediately report</a> anyone that does request it.</li>\n<li>\n<strong>Never save it on an internet-connected device:</strong> Saving the recovery phrase on a mobile notepad, as a screenshot, or anywhere with remote attack vectors puts it at risk. Offline, physical backups will serve you best. Paper works in a pinch, but <a href=\"https://store.blockstream.com/products/blockstream-metal-offline-backup\" target=\"_blank\" rel=\"noopener noreferrer\">metal</a> is more disaster-proof!</li>\n</ul>"}, "app__how-is-my-software-wallet-security-different-from-jades": {"title": "How is my software wallet security different from Jade\u2019s?", "cat": "Blockstream App", "section": "FAQs", "html": "<p>In contrast to a hardware wallet like the <a href=\"https://store.blockstream.com/products/jade-plus\" target=\"_blank\" rel=\"noopener noreferrer\"><span class=\"wysiwyg-underline\">Jade</span></a>, the <a href=\"https://blockstream.com/app\" target=\"_blank\" rel=\"noopener noreferrer\"><span class=\"wysiwyg-underline\">Blockstream app</span></a> is a <strong>software wallet</strong>, which means that the private keys it generates are stored directly on the device you have installed the app on, whether that\u2019s your mobile device or computer.</p><p>While software wallets provide excellent usability and security for most users, your private keys ultimately reside on an internet-connected device, which makes them subject to the same risks that affect any other connected system, including:</p><ul>\n<li>Malware or viruses</li>\n<li>Phishing attacks</li>\n<li>Deceptive download links</li>\n<li>Operating system vulnerabilities or unpatched software&nbsp;</li>\n<li>Physical theft or unauthorized access to your computer or mobile device</li>\n</ul><p>Because of these factors, software wallets are known as \u201chot wallets\u201d, meaning they\u2019re always at least partially exposed to the internet. For small amounts of bitcoin or day-to-day spending, that\u2019s usually an acceptable tradeoff. But for long-term storage or significant holdings, a hardware wallet offers the strongest protection.</p><h2 id=\"h_01K9FREMHHM3E22AQPKWM7BT80\">How Jade Provides Maximum Bitcoin Security</h2><p>Jade is a <strong>hardware wallet</strong>, so rather than generating and storing your private keys on an internet-connected device, Jade keeps them isolated and protected using open-source <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><span class=\"wysiwyg-underline\">blind oracle</span></a> technology. Unlike software wallets, hardware wallets like Jade are not connected to the internet, hence why they are referred to as \u201c<a href=\"https://glossary.blockstream.com/cold-storage-security/\" target=\"_blank\" rel=\"noopener noreferrer\">cold storage</a>\u201d devices.</p><p>Jade\u2019s <a href=\"https://help.blockstream.com/blockstream-jade/faqs/jade-security-model-faqs#entry:402@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><span class=\"wysiwyg-underline\">security model</span></a> ensures that your private keys remain safe, even if your computer or mobile device is compromised by malware, and even if the device is physically stolen. Since the <a href=\"https://glossary.blockstream.com/blind-oracle/\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a> enables encrypted private key protection without a physical secure element chip, there is nothing of value to steal from the locked device itself.&nbsp;</p><p>When you make a transaction using a paired companion wallet like the Blockstream app, Jade simply signs the transaction internally and sends back the signed data, without ever exposing the keys themselves.</p><p>Hardware wallets like Jade are purpose-built for one thing: to safeguard your private keys in a way that\u2019s virtually impossible for attackers to reach.</p><p>When paired with the Blockstream app, Jade provides the best of both worlds:</p><ul>\n<li>intuitive user experience and seamless transaction management</li>\n<li>Robust security and peace of mind for long-term storage</li>\n</ul><p>We recommend using both the <a href=\"https://blockstream.com/app\" target=\"_blank\" rel=\"noopener noreferrer\"><span class=\"wysiwyg-underline\">Blockstream app</span></a> and the <a href=\"https://store.blockstream.com/products/jade-plus\" target=\"_blank\" rel=\"noopener noreferrer\"><span class=\"wysiwyg-underline\">Jade</span></a> for a comprehensive, flexible, and secure Bitcoin experience. You can use the app to bring small amounts of bitcoin with you for everyday spending, while keeping your long-term savings stored away in cold storage.</p>"}, "app__how-does-the-blockstream-app-generate-my-recovery-phrase": {"title": "How does the Blockstream app generate my recovery phrase?", "cat": "Blockstream App", "section": "FAQs", "html": "<p>The Blockstream app uses the <a href=\"https://github.com/bitcoin/bips/blob/master/bip-0039.mediawiki\" target=\"_blank\" rel=\"noopener noreferrer\">BIP39</a> standard\u2014the most widely-adopted format in the Bitcoin industry\u2014to generate your recovery phrase.</p><p>Recovery phrases generated using the BIP39 standard consist of either 12 or 24 words from a <a href=\"https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt\" target=\"_blank\" rel=\"noopener noreferrer\">library</a> of 2048 pre-specified terms. Blockstream app recovery phrases are 12 words by default.</p><p>As a hierarchical deterministic wallet, the Blockstream app uses the BIP32 standard to derive the child keys for its wallet.</p><p>Although the Blockstream app uses industry standards for recovery phrase generation, wallets created in the app using two-factor authentication (2FA) cannot be restored on other wallet software. This is due to the unique multisig security model used for <strong>2FA Protected Accounts</strong>. In comparison, you <span class=\"wysiwyg-underline\">can</span> restore wallets that use <strong>Singlesig</strong> on most other wallet software (e.g. Electrum).</p><p>In order to restore BIP39 wallets created on other wallet software, you can select <strong>Restore from backup</strong> when creating a new wallet on the Blockstream app.</p><blockquote class=\"note\"><p><strong>Note:</strong> If you enter your recovery phrase from a 2FA account into a different wallet app that supports BIP39, the app may accept the recovery phrase, but it will generate an empty single-signature wallet. Any transactions sent from or received to this wallet will be completely separate from your Blockstream app wallet.</p></blockquote>"}, "app__what-is-pseudonymous-data-collection-and-how-is-it-used": {"title": "What is pseudonymous data collection and how is it used?", "cat": "Blockstream App", "section": "FAQs", "html": "<p><span style=\"font-weight:400;\">If you agree, Blockstream will collect analytics data about your interactions with the Blockstream app. This data is sent from the app to Blockstream servers to inform which features to focus on and to improve the usability and reliability of the app. It is never shared with any other business or third party.</span></p>\n<p><span style=\"font-weight:400;\">Your app interactions across multiple visits and sessions are linked to a pseudonymous identifier. This is an opaque, unguessable identifier assigned by the system. No sensitive user data or individual wallet information is collected or attributed to the identifier.</span></p>\n<p><span style=\"font-weight:400;\">This is an opt-in program. If you select </span><strong>Don\u2019t collect data</strong><span style=\"font-weight:400;\"> or turn off the </span><strong>Data collection</strong><span style=\"font-weight:400;\"> setting in App Settings, the app won't </span><span style=\"font-weight:400;\">collect or share </span><span style=\"font-weight:400;\">any analytics data with Blockstream. As always, your data is handled in accordance with our </span><a href=\"https://blockstream.com/green/privacy/\" target=\"_blank\" rel=\"noopener noreferrer\">privacy policy</a><span style=\"font-weight:400;\">, which we updated to provide transparency into this program.</span></p>\n<h2 id=\"h_01JVSX1R0EX5MJ4E4WV4FKNZNK\">What\u2019s Collected</h2>\n<ul>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Pseudonymous identifier</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Language setting &amp; country of use</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Interactions such as page visits &amp; button presses</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Page loading times</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">General app configuration such as whether Testnet or SPV are used</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Operating system &amp; Blockstream app version</span></li>\n</ul>\n<h2 id=\"h_01JVSX1R0EVQZ4SNDY7718H9WN\">What\u2019s NOT Collected</h2>\n<ul>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Recovery phrases or public/private key material</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Send/Receive addresses</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Types &amp; amounts of assets transacted</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Account balances</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">User contact information such as email address or phone number</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">IP addresses*</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Granular location (more specific than country)</span></li>\n</ul>\n<p><em><span style=\"font-weight:400;\">*IP addresses are unavoidably transmitted as part of how the internet works, but your IP not is persisted on our servers. Moreover, if you use Tor, any analytics data you decide to share is passed through an .onion endpoint, so it doesn\u2019t pass through a Tor exit node.</span></em></p>\n<h2 id=\"h_01JVSX1R0ENWTNQ6AV6H27Z1JX\">Our Privacy Measures</h2>\n<p><span style=\"font-weight:400;\">We've designed our analytics solution with your privacy as a primary priority. We don't want to know who you are, what you own, or store any information that might be used against you by a theoretical attacker. For each element of data that is collected, we have assessed the risk associated with its collection, modeling the threat of scenarios, such as an involuntary or forceful data breach. Our objective is to ensure that even in the worst case scenario, this data can't be meaningfully used to find out anything about you.</span></p>\n<ul>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">We encrypt all data collected at the storage level using AES256. None of the data generated by your app interactions is ever shared with a third party.</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">After two years, your data is automatically erased.</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">Location is derived to the level of your country. It is used for the purpose of improving localization and communicating with our user base across the globe. We infer location information from your IP address only after masking and discarding the last octet of the address. After processing, the masked IP addresses are discarded and not persisted on our servers. If you use Tor instead, we can't infer any location information because your traffic goes directly through an .onion endpoint.</span></li>\n<li style=\"font-weight:400;\"><span style=\"font-weight:400;\">We don\u2019t collect precise time-based information about when you use our app. We obscure the exact timing of events to avoid recording any app usage that could be associated with an event on the <a href=\"https://glossary.blockstream.com/blockchain/\" target=\"_blank\" rel=\"noopener noreferrer\">blockchain</a>.&nbsp;</span></li>\n</ul>\n<p><span style=\"font-weight:400;\">Within the Blockstream app settings, you will find a persistent </span><strong>Help Us Improve</strong><span style=\"font-weight:400;\"> setting. You can enable or disable it at any time. If turned off, the app will not transmit any usage information to Blockstream servers.</span></p>"}, "app__what-are-blockstreams-official-social-channels": {"title": "What are Blockstream's official social channels?", "cat": "Blockstream App", "section": "FAQs", "html": "<p><span>Blockstream manages numerous social media accounts to engage with users and guide them in using our technologies and products. Please refer to this list to confirm verified Blockstream communication channels and refrain from joining fraudulent groups, which may lead to loss of funds or inaccurate information.</span></p><blockquote class=\"note\"><p><strong>Note:</strong> Blockstream employees will never DM you first on Telegram, Discord, or other messaging apps. If you have a general question and are unfamiliar with Telegram or Discord, we recommend searching or asking on the official Blockstream <a href=\"https://www.reddit.com/r/blockstream/\" target=\"_blank\" rel=\"noopener noreferrer\">subreddit.</a> If the question is more specific and includes personal information, fill out a Help Center <a href=\"https://help.blockstream.com/hc/en-us/requests/new\" target=\"_blank\" rel=\"noopener noreferrer\">ticket</a>.&nbsp;&nbsp;</p></blockquote><p><span class=\"wysiwyg-font-size-x-large\"><strong>Resources</strong></span><br><a href=\"https://blog.blockstream.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Blog</a><br><a href=\"https://help.blockstream.com/hc/en-us\" target=\"_blank\" rel=\"noopener noreferrer\">Help Center</a>&nbsp;<br><a href=\"https://store.blockstream.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Store</a><br><a href=\"https://blockstream.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Website</a><br><br><span class=\"wysiwyg-font-size-x-large\"><strong>GitHub Repositories</strong></span><br><a href=\"https://github.com/ElementsProject/lightning\" target=\"_blank\" rel=\"noopener noreferrer\">Core Lightning</a><br><a href=\"https://github.com/elementsProject/elements\" target=\"_blank\" rel=\"noopener noreferrer\">Elements (Liquid)</a><br><a href=\"https://github.com/Blockstream/esplora\" target=\"_blank\" rel=\"noopener noreferrer\">Esplora</a><br><a href=\"https://github.com/Blockstream\" target=\"_blank\" rel=\"noopener noreferrer\">Green</a><br><a href=\"https://github.com/Blockstream/Jade\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a>&nbsp;<br><a href=\"https://github.com/BlockstreamResearch\" target=\"_blank\" rel=\"noopener noreferrer\">Research</a><br><a href=\"https://github.com/Blockstream/satellite\" target=\"_blank\" rel=\"noopener noreferrer\">Satellite</a><br><br><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;font-size:x-large;\">X (FKA Twitter)</strong><br><a href=\"https://twitter.com/Blockstream\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream</a><br><a href=\"https://x.com/BlockstreamHelp\">Blockstream Help</a><br><a href=\"https://twitter.com/blksresearch\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream Research</a><br><a href=\"https://twitter.com/Core_LN\" target=\"_blank\" rel=\"noopener noreferrer\">Core Lightning</a><br><a href=\"https://twitter.com/BlksElements\" target=\"_blank\" rel=\"noopener noreferrer\">Elements</a><br><a href=\"https://twitter.com/BlksGreenWallet\" target=\"_blank\" rel=\"noopener noreferrer\">Green</a><br><a href=\"https://twitter.com/BlockstreamJade\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a><br><a href=\"https://twitter.com/Liquid_BTC\" target=\"_blank\" rel=\"noopener noreferrer\">Liquid</a><br><a href=\"https://twitter.com/BlksSatellite\" target=\"_blank\" rel=\"noopener noreferrer\">Satellite</a><br><br><span class=\"wysiwyg-font-size-x-large\"><strong>Telegram</strong></span><br><a href=\"https://t.me/blockstream\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream Announcements</a><br><a href=\"https://t.me/lightningd\" target=\"_blank\" rel=\"noopener noreferrer\">Core Lightning</a><br><a href=\"https://t.me/blockstream_finance\" target=\"_blank\" rel=\"noopener noreferrer\">Finance</a><br><a href=\"https://t.me/blockstream_green\" target=\"_blank\" rel=\"noopener noreferrer\">App</a><br><a href=\"https://t.me/blockstream_jade\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a><br><a href=\"https://t.me/liquid_community\" target=\"_blank\" rel=\"noopener noreferrer\">Liquid</a><br><a href=\"https://t.me/liquid_devel\">Liquid Developers</a><br><a href=\"https://t.me/blockstream_satellite_feed\" target=\"_blank\" rel=\"noopener noreferrer\">Satellite</a><br><br><span class=\"wysiwyg-font-size-x-large\"><strong>Discord</strong></span><br><a href=\"https://discord.com/invite/w27fMFESMN\" target=\"_blank\" rel=\"noopener noreferrer\">Core Lightning</a><br><a href=\"https://discord.com/invite/wpNv3PG8G2\" target=\"_blank\" rel=\"noopener noreferrer\">PeerSwap</a><br><br><span class=\"wysiwyg-font-size-x-large\"><strong>Other Socials</strong></span><br><a href=\"https://www.buildonl2.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Build On L2</a><br><a href=\"https://www.instagram.com/blockstreamhq\" target=\"_blank\" rel=\"noopener noreferrer\">Instagram</a><br><a href=\"https://primal.net/p/npub1jg552aulj07skd6e7y2hu0vl5g8nl5jvfw8jhn6jpjk0vjd0waksvl6n8n\" target=\"_blank\" rel=\"noopener noreferrer\">Nostr</a>: <span>npub1jg552aulj07skd6e7y2hu0vl5g8nl5jvfw8jhn6jpjk0vjd0waksvl6n8n</span><br><a href=\"https://www.reddit.com/r/blockstream/\" target=\"_blank\" rel=\"noopener noreferrer\">Reddit</a><br><a href=\"https://stacker.news/blockstream_official\" target=\"_blank\" rel=\"noopener noreferrer\">Stacker News</a><br><a href=\"https://www.tiktok.com/@blockstream_hq\" target=\"_blank\" rel=\"noopener noreferrer\">TikTok</a><br><a href=\"https://www.youtube.com/blockstream\" target=\"_blank\" rel=\"noopener noreferrer\">YouTube</a></p>"}, "jade__jade-overview": {"title": "Jade overview", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>Blockstream Jade is a specialized hardware wallet device designed to protect the private keys to your bitcoin and <a href=\"https://glossary.blockstream.com/layer-2/\" rel=\"noopener noreferrer\" target=\"_blank\">layer-2</a> assets. Jade offers a simple setup and workflow that is perfect for new users, while also possessing more advanced functionality desired by veteran self-custodians.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/428-4770.png?v=13\"/></figure><p>Jade's <a href=\"https://help.blockstream.com/blockstream-jade/faqs/jade-security-model-faqs#entry:402@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">unique security model</a> ensures that there is <strong>nothing of value to steal</strong> from a locked Jade by itself, unlike other hardware wallets which store all the necessary secrets to steal funds on the device.</p><h2 id=\"h_01HQV8HT82C7YW11C5SJTKX0J5\">Hardware Features</h2><ol>\n<li>\n<strong>Power button:</strong> Hold to power on/off Jade when using battery power</li>\n<li>\n<strong>Select button:</strong> Press to confirm your selection on screen</li>\n<li>\n<strong>Navigation buttons:</strong> Press the left or right button to navigate menus. Pressing both buttons simultaneously can also be used an alternative to the <strong>Select button</strong> (<em>Jade Plus <strong>only</strong></em>)</li>\n<li>\n<strong>USB-C port:</strong> Connect to your companion device, charge the battery, or plug in optional accessories for air-gapped functionality via an SD card or USB drive (<em>Jade Plus <strong>only</strong></em>)</li>\n<li>\n<strong>Screen:</strong> Interact with Jade and confirm transaction details or display QR codes</li>\n<li>\n<strong>Camera:</strong> Scan QR codes to access a wallet or perform air-gapped transactions</li>\n</ol><p></p><h2 id=\"h_01HQV8HT831JKRH2EYTXXKMAPW\">Status Indicator</h2><p>There are four different states that Jade can operate in at any one time. While viewing the main menu, the lower left portion of your Jade's display will indicate its current status.</p><h3 id=\"h_01HQV8HT83PQ36NTYME1ZFEDVF\">Inactive Status</h3><ul>\n<li>\n<strong>Uninitialized:</strong>\u00a0Device does not have any encrypted wallet data stored. Most users should follow the setup instructions to create a wallet and pair their Jade.</li>\n<li>\n<strong>Initialized:\u00a0</strong>Wallet data is stored encrypted on device and requires a PIN entry to unlock. Users can unlock their Jade by connecting to a companion app via USB, BLE, or QR.</li>\n</ul><blockquote><p><strong>Tip:</strong> The lower-right portion of Jade's display will show your current <strong>firmware version</strong> when in an inactive status.</p></blockquote><h1 id=\"h_01HQV8HT83GSTSH58AGX7S4CZX\"></h1><h3 id=\"h_01HQV8HT835YV3A8R5GW93S743\">Ready Status</h3><ul>\n<li>\n<strong>Active:</strong>\u00a0Your wallet data is accessible on Jade and you can use your device to sign transactions and access other relevant features.</li>\n<li>\n<strong>Active (Temporary):</strong> Similar to a typical active session, however a clock icon will be displayed to indicate that a\u00a0temporary session option was chosen (such as SeedQR or Temporary Signer). The currently active wallet will be forgotten on reboot or logout.</li>\n</ul><blockquote><p><strong>Tip:</strong> The lower-right portion of Jade's display will show your <strong>wallet fingerprint</strong> when in a ready status.</p></blockquote><h1 id=\"h_01HQV8HT83F7XNNBHCXA5EJC45\"></h1><h2 id=\"h_01HQV8HT83C6JXNT1KT6GRDHDQ\">Connection Types</h2><p>Jade offers three different communications methods that you can use to connect to a companion app:</p><ul>\n<li>\n<strong>USB:</strong> Plug Jade into your laptop or Android device using the supplied USB-C cable.</li>\n<li>\n<strong>Bluetooth:\u00a0</strong>Conveniently pair Jade with your mobile phone, compatible with both iOS and Android.</li>\n<li>\n<strong>QR:</strong> Use Jade's camera and QR codes to perform fully air-gapped transactions and physically decide when your Jade sends or receives data. QR mode supports Bitcoin only; Liquid requires USB or Bluetooth.</li>\n</ul><blockquote class=\"note\"><p><strong>Note:</strong>\u00a0For users who prefer not to have Bluetooth communication available, Jade offers a <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/disable-bluetooth#entry:1146@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">no-radio firmware variant</a> that renders the Bluetooth hardware useless.</p></blockquote><h2 id=\"h_01HQV8HT83BQKPQQEY6H3JS2H9\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" rel=\"undefined\">Download a companion\u00a0app</a>\n</h2>"}, "jade__download-a-companion-app-for-jade": {"title": "Download a companion app for Jade", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>Before setting up your Jade, you will need to download a compatible companion app on either mobile or desktop. The <strong>Blockstream app is recommended</strong>, but you are welcome to use Jade solely with your favorite supported wallet platform.</p><p>You use your companion app to generate receive addresses and broadcast transactions to the internet, and you use Jade to authorize transactions and keep your private keys safe. Never enter your Jade's recovery phrase on a companion app directly.</p><h2 id=\"h_01HHH18CX7742DT5FJZ1A1MVFX\">Supported Companion Apps</h2><p>Below is a list of Jade-supported wallet apps. Download your preferred choice that also offers your desired communication method:</p><figure class=\"wysiwyg-table wysiwyg-table-align-left\" style=\"width:100%;\"><figure class=\"table\"><table style=\"border-collapse:collapse;border-style:solid;\"><tbody><tr style=\"height:22px;\"><td style=\"height:22px;text-align:center;width:16.6667%;\">&nbsp;</td><td style=\"height:22px;text-align:center;width:33.3334%;\" colspan=\"2\">Platform</td><td style=\"height:22px;text-align:center;width:58.3334%;\" colspan=\"4\">Communication</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><strong>Wallet App</strong></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><strong>Desktop</strong></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><strong>Mobile</strong></td><td style=\"height:22px;text-align:center;width:11.5238%;\"><strong>USB</strong></td><td style=\"height:22px;text-align:center;width:14.381%;\"><strong>BLE</strong></td><td style=\"height:22px;text-align:center;width:10.7619%;\"><strong>QR</strong></td><td style=\"text-align:center;width:21.6667%;\"><strong>JadeLink</strong></td></tr><tr style=\"height:44px;\"><td style=\"height:44px;width:16.6667%;\"><a href=\"https://blockstream.com/green/\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream</a></td><td style=\"height:44px;text-align:center;width:16.6667%;\"><  style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://bluewallet.io\" target=\"_blank\" rel=\"noopener noreferrer\">BlueWallet</a></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><span style=\"color:#00CC00;\">\u2713</span></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><span style=\"color:#00CC00;\">\u2713</span></td><td style=\"height:22px;text-align:center;width:11.5238%;\">X</td><td style=\"height:22px;text-align:center;width:14.381%;\">X</td><td style=\"height:22px;text-align:center;width:10.7619%;\"><span style=\"color:#00CC00;\">\u2713</span><span style=\"color:#000000;\">+</span></td><td style=\"text-align:center;width:21.6667%;\"><span style=\"color:#00CC00;\">\u2713</span><span style=\"color:#000000;\">+</span></td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://electrum.org\" target=\"_blank\" rel=\"noopener noreferrer\">Electrum</a></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><span style=\"color:#00CC00;\">\u2713</span></td><td style=\"height:22px;text-align:center;width:16.6667%;\">X</td><td style=\"height:22px;text-align:center;width:11.5238%;\"><span style=\"color:#00CC00;\">\u2713</span><span style=\"color:#000000;\">+</span></td><td style=\"height:22px;text-align:center;width:14.381%;\">X</td><td style=\"height:22px;text-align:center;width:10.7619%;\">X</td><td style=\"text-align:center;width:21.6667%;\">X</td></tr><tr><td style=\"width:16.6667%;\"><a href=\"https://wizardsardine.com/liana/\" target=\"_blank\" rel=\"noopener noreferrer\">Liana</a></td><td style=\"text-align:center;width:16.6667%;\"><span style=\"color:#00CC00;\">\u2713</span></td><td style=\"text-align:center;width:16.6667%;\">X</td><td style=\"text-align:center;width:11.5238%;\"><span style=\"color:#00CC00;\">\u2713</span><span style=\"color:#000000;\">+</span></td><td style=\"text-align:center;width:14.381%;\">X</td><td style=\"text-align:center;width:10.7619%;\">X</td><td style=\"text-align:center;width:21.6667%;\">X</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://bitcoinkeeper.app\">Keeper</a></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><span style=\"color:#000000;\">X</span></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><span style=\"color:#00CC00;\">\u2713</span></td><td style=\"height:22px;text-align:center;width:11.5238%;\">X</td><td style=\"height:22px;text-align:center;width:14.381%;\">X</td><td style=\"height:22px;text-align:center;width:10.7619%;\"><span style=\"color:#00CC00;\">\u2713</span><span style=\"color:#000000;\">+</span></td><td style=\"text-align:center;width:21.6667%;\">X</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://wasabiwallet.io/\" target=\"_blank\" rel=\"noopener noreferrer\">Wasabi</a></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><span style=\"color:#00CC00;\">\u2713</span></td><td style=\"height:22px;text-align:center;width:16.6667%;\">X</td><td style=\"height:22px;text-align:center;width:11.5238%;\"><span style=\"color:#00CC00;\">\u2713</span></td><td style=\"height:22px;text-align:center;width:14.381%;\">X</td><td style=\"height:22px;text-align:center;width:10.7619%;\">X</td><td style=\"text-align:center;width:21.6667%;\">X</td></tr><tr><td style=\"width:16.6667%;\"><a href=\"https://bitcoin-safe.org/\" target=\"_blank\" rel=\"noopener noreferrer\">Bitcoin Safe</a></td><td style=\"height:22px;text-align:center;width:16.6667%;\"><span style=\"color:#00CC00;\">\u2713</span></td><td style=\"height:22px;text-align:center;width:16.6667%;\">X</td><td style=\"height:22px;text-align:center;width:11.5238%;\"><span style=\"color:#00CC00;\">\u2713</span><span style=\"color:#000000;\">+</span></td><td style=\"height:22px;text-align:center;width:14.381%;\">X</td><td style=\"height:22px;text-align:center;width:10.7619%;\"><span style=\"color:#00CC00;\">\u2713</span><span style=\"color:#000000;\">+</span></td><td style=\"text-align:center;width:21.6667%;\"><span style=\"color:#00CC00;\">\u2713</span><span style=\"color:#000000;\">+</span></td></tr></tbody></table></figure></figure><p>+ Supports Jade Plus</p><blockquote class=\"note\"><p><strong>Note:</strong> Jade works with HWI and thus can also be used with <a href=\"https://glossary.blockstream.com/bitcoin-core/\" target=\"_blank\" rel=\"noopener noreferrer\">Bitcoin Core</a>. There are also <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/compatible-services-with-jade#entry:304@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">several services that support Jade</a> for collaborative custody, payment processing, and more.</p></blockquote><h2 id=\"h_01HHH18CX8N4G1DEPGFSJ1NA9Z\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/update-jade-firmware#entry:436@1:url\">Upgrade Jade firmware</a></h2>"}, "jade__update-jade-firmware": {"title": "Update Jade firmware", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>For the best setup experience, we <strong>recommend</strong> updating your firmware before beginning the initialization process. However, if you choose to set up first, you will still be prompted to update afterward when using the<strong> Blockstream app</strong>.</p><blockquote class=\"tip\"><p><strong>Tip:</strong> Users who want to keep their private keys fully air-gapped can update Jade before setup, then create or restore their wallet after installing the latest firmware. If you\u2019ve already initialized your Jade, you can perform a <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/perform-a-factory-reset#entry:779@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">factory reset</a> to erase keys from the device and <strong>restore your recovery phrase</strong> to regain access. If your device shipped with firmware older than 1.0.38, perform a factory reset either before or after upgrading the firmware for the first time.</p></blockquote><h2 id=\"upgrade-options\">4 Options To Update Jade</h2><p>Choose your preferred method below. If you encounter any issues, view our <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-upgrading-jade#entry:307@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">firmware troubleshooting guide</a>.</p><h3 id=\"option-1\">Option #1: <a href=\"https://blockstream.com/app/\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream App</a>\n</h3><ul>\n<li>\n<strong>Desktop:</strong> When you open the app and connect your Jade via <strong>USB</strong>, you'll be prompted to upgrade. Alternatively, go to <em>Hardware Devices</em> \u2192 select your Jade in the left menu \u2192 connect Jade \u2192 follow the firmware prompt.</li>\n<li>\n<strong>Mobile:</strong> You can upgrade Jade on iOS or Android using <strong>USB</strong> or <strong>Bluetooth</strong>, but the prompt will only appear after initial setup is complete.</li>\n</ul><h3 id=\"option-2\">Option #2: <a href=\"https://jadefw.blockstream.com/upgrade/fwupgrade.html\" target=\"_blank\" rel=\"noopener noreferrer\">Upgrade Web Portal</a>\n</h3><ul><li>Connect Jade via <strong>USB</strong> to your computer, then visit the Update Web Portal in a browser that supports WebSerial (e.g., Chrome). Click <strong>Update your Jade</strong> to begin the process.</li></ul><h3 id=\"option-3\">Option #3: <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/perform-an-air-gapped-firmware-upgrade#entry:302@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Air-gapped via JadeLink</a> (Jade Plus only)</h3><ul><li>Use the&nbsp;<a href=\"https://store.blockstream.com/products/jadelink-air-gapped-usb-drive\" target=\"_blank\" rel=\"noopener noreferrer\">JadeLink</a> air-gapped USB drive to upgrade your Jade Plus without physically connecting your device.</li></ul><h3 id=\"option-4\">Option #4: <a href=\"https://github.com/Blockstream/Jade/blob/master/FWUPDATE.md\" target=\"_blank\" rel=\"noopener noreferrer\">Command Line</a> (Advanced)</h3><ul><li>Clone the <a href=\"https://github.com/Blockstream/Jade\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream Jade repository</a>, navigate to the directory, and run <code>./update_jade_fw.py</code> while your device is connected via <strong>USB</strong>.</li></ul><blockquote class=\"note\"><p><strong>Note:</strong> With the command line method, technical users can save a local copy of the firmware, <a href=\"https://github.com/Blockstream/Jade/blob/master/FWUPDATE.md#method-2---download-and-update---two-separate-steps\" target=\"_blank\" rel=\"noopener noreferrer\">verify it against the source code</a>, and update using a reviewed and authenticated file.</p></blockquote><h2 id=\"next-setup\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/set-up-jade#entry:522@1:url\">Set up Jade</a>\n</h2>"}, "jade__set-up-jade": {"title": "Set up Jade", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>The process of setting up Jade refers to <strong>saving a recovery phrase to your device and protecting it behind a PIN</strong>. The recovery phrase is used to derive your private keys, which are necessary for spending bitcoin.\u00a0<br/><br/>Jade's <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">unique security model</a> keeps your recovery phrase encrypted on the device, protecting a locked Jade\u00a0from physical key extraction.</p><blockquote><p><strong>Tip:</strong> You can also use an uninitialized Jade as a <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-jade-as-a-stateless-signing-device#entry:400@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">stateless signing device</a>.</p></blockquote><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/468-3.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on Jade by plugging it in or holding the power button. If you're using Jade without a USB connection, ensure its battery is charged.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select <strong>Set Up Jade</strong> and choose your desired <strong>Setup Type</strong>:</p>\n</div><ul>\n<li>\n<strong>Begin Setup:</strong> Recommended for most users. Complete Jade initialization in a few simple steps.</li>\n<li>\n<span style=\"color:#000000;\"><strong>Advanced Setup:</strong> Choose your preferred recovery phrase length, e</span>xport as <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/air-gapped-jade-plus-setup#entry:157@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">SeedQR</a>, and add a <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/add-a-bip39-passphrase-for-jade#entry:852@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">BIP39 passphrase</a>.</li>\n</ul><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Choose your <strong>Setup Method</strong>:</p>\n</div><ul>\n<li>\n<strong>Create New Wallet:</strong> Generate a new recovery phrase for an unused wallet.</li>\n<li>\n<a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/restore-recovery-phrase-to-jade#entry:1040@1:url\" rel=\"noopener noreferrer\" target=\"_blank\"><strong>Restore Wallet</strong></a><strong>:</strong> Enter an existing recovery phrase for a previously used hardware device or software wallet.</li>\n</ul><blockquote><p><strong>Note:</strong> If your recovery phrase was originally created on a phone or computer app, restoring it on Jade gives you hardware signing but does not change the security of the phrase itself. For full cold storage security, select <strong>Create New Wallet</strong> instead and send your funds to the new wallet.</p></blockquote><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/468-4.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Write down and protect your recovery phrase offline. <strong>Do not take a picture or store online</strong>. Even better: secure it with our <a href=\"https://store.blockstream.com/products/blockstream-metal-offline-backup\" rel=\"noopener noreferrer\" target=\"_blank\">offline metal backup</a> or on <a href=\"https://store.blockstream.com/products/blockstream-capsule-seed-phrase-backup-tool\" rel=\"noopener noreferrer\" target=\"_blank\">Blockstream Capsule</a>.<br/><br/>Verify your backup by selecting the correct word from your phrase.</p>\n</div><blockquote class=\"warning\"><p><strong>Warning:</strong> Your recovery phrase grants access to your wallet. Never enter it on another device except for emergency situations.</p></blockquote><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">To finalize your Jade setup, you must connect to a companion app via <strong>USB</strong>, <strong>Bluetooth</strong>, or <strong>QR</strong>. Your recovery phrase <strong>will not be saved</strong> to Jade until you complete the PIN setup process.</p>\n</div><p></p><h2 id=\"h_01JADRXMJ1HM0H3G5CYKJ73Y68\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/connect-jade-to-a-companion-app#entry:662@1:url\">Connect Jade to a companion app\u00a0</a>\n</h2>"}, "jade__connect-jade-to-a-companion-app": {"title": "Connect Jade to a companion app", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>Jade can communicate with a companion app using USB, Bluetooth, or QR codes. The instructions below will demonstrate connecting Jade with the Blockstream app, however the process will be fairly similar for any <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">Jade-supported companion app</a>. Note the Jade Hardware Wallet will have need to already have been initialized before connecting to App.</p><blockquote><p><strong>Tip:</strong> Please refer to your companion app's specific instructions for using a hardware wallet if you are not using Jade with the Blockstream app.</p></blockquote><h2 id=\"h_01JAG9QA785V05R6H3R388AAM0\">Connection Process</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-3.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Open the Blockstream app and tap <strong>Connect Jade</strong>.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">The app will begin searching for your Jade and will show your device after selecting a communication method on Jade, or will be automatically detected if connected via USB.</p></div><p class=\"num-list-text\"></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-4.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">On Jade, select your preferred connection method when prompted after the initial <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/set-up-jade#entry:522@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">setup process</a>:</p></div><ul><li data-list-item-id=\"e74c7dd67771b63e3866714b02f4a58d3\"><strong>USB:</strong> Plug in Jade directly via USB (<strong>Android and desktop only</strong>).</li><li data-list-item-id=\"e676b4b0262e6b86e2484cc2c1663bcf8\"><strong>Bluetooth:\u00a0</strong>Conveniently pair Jade and the Blockstream app wirelessly without the need for an additional cable (<strong>Android and iOS only</strong>).</li><li data-list-item-id=\"eaf78fd6e4b193caf5fb2ac9262af8263\"><strong>QR:</strong> Make sure to tap <strong>Connect via QR</strong> on the app. Follow instructions as prompted.</li></ul><blockquote class=\"note\"><p><strong>Note:</strong> QR mode supports Bitcoin transactions only. To send or receive Liquid assets, use USB or Bluetooth.</p></blockquote><p></p><p class=\"num-list\">4. Select your Jade on the Blockstream app when it appears and continue by pairing your device.</p><blockquote class=\"note\"><p><strong>Note:</strong> If you are having issues pairing with Bluetooth, make sure to follow our <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-pairing-jade-via-bluetooth#entry:564@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">troubleshooting guide</a>.</p></blockquote><p class=\"num-list\"></p><p class=\"num-list\">5. Follow the instructions and create a 6-digit PIN on Jade. Your PIN will be used to unlock your device upon each session. <strong>If you forget it or enter it wrong three times, you will need to restore your wallet using your recovery phrase</strong>.</p><p class=\"num-list\"></p><p class=\"num-list\">6. After PIN creation, the setup process is complete.</p><blockquote><p>Remember that you generate addresses and broadcast your transactions using the companion app, and you restore your wallet to other devices or companion apps using the recovery phrase.</p></blockquote><p></p><p class=\"num-list\">7. After logging out, your Jade will now be shown under My Wallets. To log back in, select your device from the list.</p><p></p><p>\u00a0</p><h2 id=\"h_01JAG9QA7888ME4PD9ESANV5MN\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/receive-bitcoin-using-jade#entry:786@1:url\">Receive bitcoin using Jade</a></h2>"}, "jade__receive-bitcoin-using-jade": {"title": "Receive bitcoin using Jade", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>In order to receive bitcoin, you will need to generate an <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a> with your Jade's companion app and share it with the sender. Your Jade can verify that the address generated by your companion app belongs to the wallet stored on your device.</p><blockquote><p><strong>Tip:</strong> Please refer to your wallet app's specific instructions for using a hardware wallet if you are not using Jade with the Blockstream app.</p></blockquote><h2 id=\"h_01JATGSKD0SJYNF1YSR2HYC4B6\">Receive bitcoin</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Log in to your Jade wallet on the Blockstream app, then tap the <strong>Transact</strong> tab.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select <strong>Receive</strong> from the available actions.</p>\n</div><p class=\"num-list-text\"></p><div class=\"num-list-custom\">\u00a0</div><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">The Blockstream app will generate a Receive address for your chosen asset. Select <strong>Verify on Device</strong> to confirm the address on Jade. The Blockstream app will prompt you to connect your Jade if it is not connected already.</p>\n</div><p class=\"num-list-text\"></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/428-5414.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Verify that the address on Jade matches the address displayed on the Blockstream app, then click the checkmark to continue.</p>\n</div><p class=\"num-list-text\"></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Share the address with the sender and wait for them to broadcast the transaction. Your new balance will appear on the home screen once they have successfully done so.</p>\n</div><p class=\"num-list-text\"></p><p>\u00a0</p><h2 id=\"h_01JATGSKD03ES934N4K7GEY2VS\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/send-bitcoin-using-jade#entry:859@1:url\" rel=\"undefined\">Send bitcoin using Jade</a>\n</h2>"}, "jade__send-bitcoin-using-jade": {"title": "Send bitcoin using Jade", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>In order to send bitcoin from your Jade wallet, you will need to craft a transaction on your companion app then use Jade to authorize or \"sign\" the transaction. Jade will pass the signed transaction back to your companion app once you have confirmed the details on your device, where your app will then broadcast the transaction to the Internet.</p><blockquote><p><strong>Tip:</strong> Please refer to your wallet app's specific instructions for using a hardware wallet if you are not using Jade with the Blockstream app.</p></blockquote><h1 id=\"h_01JATP7NE9QE74VXNBVV06NNW4\">Send bitcoin</h1><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Log in to your Jade wallet on the Blockstream app, then tap the <strong>Transact</strong> tab.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Select <strong>Send</strong> from the available actions.</p></div><p class=\"num-list-text\"></p><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Fill in your transaction details by entering the recipient's <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a>, as well as the intended amount. Choose your fee depending on the transaction's urgency and note that this fee is paid to bitcoin miners, not Blockstream.</p></div><p class=\"num-list-text\"></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/428-5590.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Review the details and then slide to send. The Blockstream app will then pass the transaction information to Jade for authorization. You will be prompted to connect your Jade if it is not connected already.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Confirm on Jade that both the address and the amount match what you intended. Each field is selectable and allows you to view the full address on screen. Select the checkmark when you are ready to send and the signed transaction will be sent back to the Blockstream app and broadcast to the bitcoin <a href=\"https://glossary.blockstream.com/blockchain/\" rel=\"noopener noreferrer\" target=\"_blank\">blockchain</a>.</p></div><p></p><h2 id=\"h_01JATP7NE9XDW3TYN1T69TDTP6\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/set-up-watch-only-access-for-jade#entry:1164@1:url\" rel=\"undefined\">Set up watch-only access</a></h2>"}, "jade__verify-your-recovery-phrase": {"title": "Verify your recovery phrase", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>If you want to check that your written recovery phrase backup leads to the correct PIN-saved wallet, use the <strong>Temporary Signer</strong> feature to login. This allows you to login with a recovery phrase without overwriting the wallet currently saved on your Blockstream Jade.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-6.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Unlock the Jade with your PIN and take note of your <strong>8-character fingerprint</strong> in the bottom right corner of the screen (e.g. 8D688EA0).</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Log out of the current session or reboot your Jade, then choose <strong>Options</strong> from the home screen.</p>\n</div><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-7.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Choose <strong>Temporary Signer</strong> and make sure to <strong>read the warning</strong> to understand that you are proceeding with a temporary wallet.</p>\n</div><blockquote class=\"warning\"><p><strong>Warning: </strong>Jade will forget this wallet after turning the device off. Make sure to keep a backup of this recovery phrase to access any funds you send to the wallet.</p></blockquote><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Select the <strong>length of your recovery phrase</strong> to type it in manually. If your wallet also included a <a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/set-up-a-bip39-passphrase#entry:1107@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">passphrase</a>, make sure that you are <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-a-passphrase-work-on-jade#entry:689@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">prompted to enter one</a>. Then, manually enter your seed phrase in the correct order.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">After completing this, choose between <strong>USB</strong>, <strong>Bluetooth</strong>, or <strong>QR</strong>, then connect your Blockstream Jade to a <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">companion app</a>. You will be temporarily logged into your wallet and this <strong>recovery phrase will only be available until Jade turns off</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">Notice the 8-character fingerprint displayed in the bottom right corner of the screen. If it matches the same fingerprint shown when unlocking with PIN, then your recovery phrase and PIN-saved wallet are the same.</p>\n</div><p></p>"}, "jade__restore-recovery-phrase-to-jade": {"title": "Restore recovery phrase to Jade", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>If you purchased a new Jade and already have a 12 or 24 word recovery phrase from your previous Jade, or from another device such as Ledger, Trezor, or Coldcard\u2014you can restore your words to Jade and immediately begin using your previous wallet.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-9.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on Jade and select <strong>Set up Jade</strong>.</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Instead of creating a new wallet, Select <strong>Restore Wallet</strong>. Choose your recovery phrase length, either 12 or 24 words, or recover via QR Scan.</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">For 12/24 word recovery phrases, Use Jade's keyboard to <strong>enter your recovery phrase manually</strong>.</p>\n</div><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-10.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Connect your Jade to a compatible <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">companion app</a> using your desired connection method.</p>\n</div><p>\u00a0</p>"}, "jade__perform-a-genuine-check-with-jade": {"title": "Perform a Genuine Check with Jade", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<blockquote class=\"note\">\n<strong>Note:</strong> The following feature is not available with <strong>Jade Classic</strong>.<p>Each individual Jade manufactured by Blockstream contains a unique private key specific to that device, with its corresponding public key signed by Blockstream. The resulting signature is stored on Jade, and Blockstream will only sign the public key of devices that the company manufactures. This process allows you to complete a challenge with their Jade after receiving it to verify whether or not your unit is genuine or if it was created by a third party.</p><h2 id=\"h_01HA4PE0VFC1DHW954FTHESHV7\">Conducting a Genuine Check</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">During Jade setup with the <a href=\"https://blockstream.com/app/\" rel=\"noopener noreferrer\" target=\"_blank\">Blockstream app</a>, you will be prompted to initiate the Genuine Check process. Tap <strong>Genuine Check</strong> to proceed.</p>\n</div><blockquote class=\"tip\">\n<strong>Tip:</strong> If you are using a different application or your Jade is already initialized, you can perform a Genuine Check using our <a href=\"https://verify.blockstream.com/\" rel=\"noopener noreferrer\" target=\"_blank\">web app</a>.</blockquote><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/429-6234.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select <strong>Yes</strong> on Jade to sign the Genuine Check challenge.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">If the Jade you received completes the challenge successfully, you may tap <strong>Continue with Jade</strong> to finish the <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/set-up-jade#entry:522@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">setup process</a>. If you receive a note that your device is not genuine, please contact support immediately and do not use your Jade.</p>\n</div><blockquote class=\"note\">\n<strong>Note:</strong> If you are using DIY hardware, you should not expect your device to pass the Genuine Check. Select <strong>Continue as DIY</strong> to use your generic hardware with the Blockstream App.</blockquote><p></p></blockquote>"}, "jade__migrate-to-jade-from-another-hardware-wallet": {"title": "Migrate to Jade from another hardware wallet", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>Virtually all hardware wallets on the market use the same standard for creating a backup, allowing you to restore a 12 or 24 word recovery phrase (or <i>seed phrase</i>) generated by another device directly to Jade. Without needing to transfer funds, you can restore your wallet to Jade and immediately use it to securely store, receive, and send bitcoin that was previously protected by a different hardware wallet.</p><h2 id=\"h_01HHMNZ5WX7KK9JNT6NV9SR8N7\">Migrate via Restore Wallet</h2><p>From your seed phrase, you can derive the information needed to restore your private keys and addresses. Simply enter your seed phrase on your new Jade to access your funds.</p><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Once you receive your Jade, follow our <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/set-up-jade#entry:522@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">setup guide</a> and choose <strong>Restore Wallet</strong> when prompted to select your Setup Method. Specify whether your previous hardware wallet's seed phrase is 12 or 24 words, then use the keyboard on Jade's screen to enter it on your device.<br><br>Alternatively, you can choose <strong>Scan QR</strong> and use Jade's built-in camera to read a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/what-is-a-seedqr#entry:1099@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">SeedQR-encoded recovery phrase</a>.</p></div><p class=\"num-list-text\"><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/set-up-transact-recover-your-wallet/migrate-to-jade-from-another-hardware-wallet/41927614042905.png\" alt=\"restore.png\" />2. </span>Next, continue along the Jade setup guide until you have <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/connect-jade-to-a-companion-app#entry:662@1:url\">paired your device with a companion app</a>, at which point you should see the same balance that was displayed when using your previous hardware wallet.</p><blockquote><p><strong>Tip:</strong> Depending on how you used your old hardware device, you may have applied some additional security variables which affected how your wallet was generated. If you do not see the same balance as your old device, <a href=\"https://help.blockstream.com/blockstream-app/troubleshooting/fix-issues-with-unexpected-wallet-balance#entry:835@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">follow our recommendations</a>.</p></blockquote>"}, "jade__set-up-watch-only-access-for-jade": {"title": "Set up watch-only access for Jade", "cat": "Blockstream Jade", "section": "Set Up, Transact, & Recover Your Wallet", "html": "<p>A watch-only wallet allows you to generate receive addresses and view your balance without needing to connect your Blockstream Jade to <strong>the Blockstream app</strong>. When you're ready to send funds, you will need to <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/connect-jade-to-a-companion-app#entry:662@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">connect your Jade</a> and unlock it with your PIN to sign transactions.</p><blockquote><p><strong>Tip:</strong> If you're using a hardware wallet with a different app, please consult that wallet's specific instructions for watch-only usage.</p></blockquote><h1 id=\"h_01JEC1H3TQ8VV7KPKS3SKW0AKS\">Watch-Only Access</h1><div class=\"num-list-custom\"><p class=\"num-list\">1. Open the Blockstream app and log in to your Jade wallet.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2. Tap the gear icon in the top-right corner and select <strong>Settings</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">3. Select <strong>Watch-only</strong> and choose the account you'd like to access without connecting Jade. Depending on your account type, either copy the extended public key (xpub) or create credentials.</p></div><ul><li data-list-item-id=\"e840a32d692e9cad9fc3e33eeb47fd52b\"><strong>Singlesig:</strong> Copy the extended public key (xpub)</li><li data-list-item-id=\"e04238200d0c96ee6a680f49f20c739d1\"><strong>Multisig (2FA):</strong> Create a username and password</li></ul><div class=\"num-list-custom\"><p class=\"num-list\">4. From the app's home screen, tap <strong>Set up a New Wallet</strong>, then choose <strong>Add Wallet</strong> \u2192 <strong>Watch-only</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">5. Select your account type and paste in the extended public key or enter the credentials if using a Multisig Shield/2FA account.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">6. Once imported, your watch-only wallet will appear in the wallet list. Tap it to view balances and generate receive addresses without needing to connect your Jade.</p></div>"}, "jade__air-gapped-jade-plus-setup": {"title": "Air-gapped Jade Plus setup", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>The <a href=\"https://store.blockstream.com/products/jade-plus\" rel=\"noopener noreferrer\" target=\"_blank\">Jade Plus</a> camera allows for fully air-gapped communication with the <a href=\"https://blockstream.com/app\" rel=\"noopener noreferrer\" target=\"_blank\">Blockstream app</a>. Instead of passing messages between Jade Plus and your companion app via USB or Bluetooth, your devices can communicate by scanning QR codes from each other's screens.</p><p>Since an air-gapped Jade Plus doesn't have to physically connect with other devices, they offer improved security and compatibility, giving you complete physical control over when data is sent or received.</p><blockquote class=\"note\">\n<strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR. To send or receive Liquid assets, connect Jade to the Blockstream app using USB or Bluetooth.</blockquote><h2 id=\"h_01JEEKXKH5E3RGB562C7VVZ0V5\">Access Options</h2><p>Before air-gapping your Jade Plus, it's helpful to understand each access option:</p><ul>\n<li>\n<a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-air-gapped-with-qr-pin-unlock#entry:650@1:url\" rel=\"noopener noreferrer\" target=\"_blank\"><strong>QR PIN Unlock</strong></a><strong>:</strong> During initialization, Jade Plus saves your encrypted wallet data to the device and makes it accessible via PIN. To unlock your Jade Plus, perform a QR PIN Unlock to decrypt the keys. This security model makes Jade Plus unique: unlike other hardware wallets, there\u2019s nothing of value to steal from a locked device, yet it remains easy to access with a 6-digit PIN.</li>\n<li>\n<a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-plus-air-gapped-with-seedqr#entry:765@1:url\" rel=\"noopener noreferrer\" target=\"_blank\"><strong>SeedQR</strong></a><strong>:</strong> A hand-drawn QR code representation of your recovery phrase that the Jade Plus camera can scan each time you want to load keys to your device. While faster than entering a PIN, it requires physical access to the SeedQR to spend.</li>\n</ul><p>Both options offer comparable security regarding physical key extraction. Choose the one that best suits your workflow and preferences.</p><h2 id=\"h_01JEEKXKH5G9X6ZAV1WHQ1N95W\">Advanced Setup</h2><p>Follow these instructions to set up Jade Plus using either QR PIN Unlock or SeedQR:</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-21.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Power on your Jade Plus and select <strong>Set Up Jade</strong>, then choose <strong>Advanced Setup</strong>.</p>\n</div><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Choose your <strong>Setup Method</strong>:</p>\n</div><ul>\n<li>\n<strong>Create New Wallet:</strong> Generate a new recovery phrase and create a fresh wallet.</li>\n<li>\n<strong>Restore Wallet:</strong> Enter an existing recovery phrase, or <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/create-a-recovery-phrase-using-dice#entry:1038@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">create one using dice rolls</a>. Jade Plus can calculate the final word for you.</li>\n</ul><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Write down and securely store your recovery phrase. <strong>Do not</strong> <strong>take a picture or store it online</strong>. Even better: secure it with <a href=\"https://store.blockstream.com/products/blockstream-metal-offline-backup\" rel=\"noopener noreferrer\" target=\"_blank\">Blockstream Metal</a> or <a href=\"https://store.blockstream.com/products/blockstream-capsule-seed-phrase-backup-tool\" rel=\"noopener noreferrer\" target=\"_blank\">Blockstream Capsule</a>.<br/><br/>Verify your backup by selecting the correct word from your phrase.</p>\n</div><blockquote class=\"warning\"><p><strong>Warning:</strong> Your recovery phrase grants access to your wallet. Never enter it on another device except for emergency situations.</p></blockquote><p></p><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-22.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Jade Plus will ask if you\u2019d like to create a SeedQR\u2014a hand-drawn QR code that encodes your recovery phrase and can be scanned to load your wallet. If you choose this option, follow the on-screen guide and use the <a href=\"https://help.blockstream.com/hc/article_attachments/41928319071769\" rel=\"noopener noreferrer\" target=\"_blank\">provided template</a> to transcribe your SeedQR.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If you plan to only use Jade Plus with QR PIN Unlock, <strong>you may skip this step.</strong></p></blockquote><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Select <strong>QR</strong> as your connection method, then complete the QR PIN Unlock setup. If you created a SeedQR in the previous step, you\u2019ll have the option to skip the PIN and rely solely on your SeedQR.</p>\n</div><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">Your Jade Plus is now ready for air-gapped use. You can select your preferred access method from the <strong>QR Mode</strong> menu on reboot.</p>\n</div><p></p><p></p>"}, "jade__perform-an-air-gapped-firmware-upgrade": {"title": "Perform an air-gapped firmware upgrade", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<blockquote class=\"note\"><p><strong>Note:</strong> The following feature is only available with <a href=\"https://store.blockstream.com/products/jade-plus?variant=49701334155552\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Plus</a>.</p><p>Jade Plus lets you connect external accessories to unlock brand new functionality. When you connect <a href=\"https://store.blockstream.com/products/jadelink-air-gapped-usb-drive\" target=\"_blank\" rel=\"noopener noreferrer\">JadeLink</a> to Jade Plus, the device can read available files stored on the JadeLink and perform firmware updates.</p><p>Updating Jade Plus in this air-gapped fashion not only allows for faster firmware upgrades but also improves security by limiting remote attack vectors.</p><blockquote class=\"warning\"><p><strong>Warning:</strong> Only follow this procedure when using a .bin and .hash file downloaded directly from the official <a href=\"https://jadefw.blockstream.com/upgrade/download.html\" target=\"_blank\" rel=\"noopener noreferrer\">Jade firmware upgrade page</a>.</p></blockquote><h2 id=\"h_01JBF4W1B2YFYST5MWA9ZVP8WK\">Air-gapped Firmware Upgrade Process</h2><p>You can follow this process with most FAT32-formatted USB storage devices or SD card readers, however we recommend using JadeLink&nbsp;to avoid potential compatibility issues or security threats.</p><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Navigate to the <a href=\"https://jadefw.blockstream.com/upgrade/download.html\" target=\"_blank\" rel=\"noopener noreferrer\">firmware binary download page</a> and select your desired version, then click <strong>Download Binary</strong>. Open your Downloads folder, locate the .zip file, and unzip to retrieve the firmware .bin and .hash files.<br><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-jade/use-jade-air-gapped/perform-an-air-gapped-firmware-upgrade/41012075742233.png#asset:4736:url\" alt=\"Screenshot 2024-12-10 at 12.06.02\u202fPM.png\" /></p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Plug JadeLink into your computer or mobile device and copy the firmware .bin and .hash files directly to it. Eject JadeLink and connect it to your Jade Plus.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> In order to be recognized by Jade Plus, the file names need to be the same as when they were downloaded and cannot be duplicates with a trailing (1) or (2), for example.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-jade/use-jade-air-gapped/perform-an-air-gapped-firmware-upgrade/41012356431001.png#asset:4737:url\" alt=\"Screenshot 2024-12-10 at 12.13.59\u202fPM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Navigate to <strong>USB Storage</strong>&nbsp;on Jade Plus by selecting <strong>Options</strong> on the main menu. If your Jade Plus is initialized, you will first need to unlock it via PIN with QR, USB, or Bluetooth. The USB Storage option will be displayed when your Jade Plus is unlocked in an Active state.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-jade/use-jade-air-gapped/perform-an-air-gapped-firmware-upgrade/40281583444761.png#asset:4738:url\" alt=\"111.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Select <strong>Firmware Upgrade</strong> and choose your desired firmware binary, downloaded from the Jade firmware upgrade page.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-jade/use-jade-air-gapped/perform-an-air-gapped-firmware-upgrade/40281631018777.png#asset:4739:url\" alt=\"12.png\" /> <img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-jade/use-jade-air-gapped/perform-an-air-gapped-firmware-upgrade/40281631019801.png#asset:4740:url\" alt=\"333.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class
