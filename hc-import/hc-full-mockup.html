=\"num-list-text\">Review the firmware details, then click the checkmark to confirm and begin the upgrade. Your Jade Plus will reboot after the process is complete.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-jade/use-jade-air-gapped/perform-an-air-gapped-firmware-upgrade/40281583445401.png#asset:4741:url\" alt=\"21.png\" /></p></blockquote>"}, "jade__create-a-seedqr-from-my-recovery-phrase": {"title": "Create a SeedQR from my recovery phrase", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>SeedQRs allow for a quick and easy device unlock, specifically for users who want to access Jade for a QR Mode session for a fully air-gapped workflow.</p><p>Jade Plus allows you to transcribe your <a href=\"https://help.blockstream.com/blockstream-app/faqs/what-is-a-recovery-phrase#entry:590@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">recovery phrase</a> to create a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/what-is-a-seedqr#entry:1099@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">SeedQR</a>&nbsp;in the <strong>CompactSeedQR</strong> format. You then hand-draw a QR code using pen and paper, or maximize your security by punching it into the <a href=\"https://store.blockstream.com/products/blockstream-metal-seedqr\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream Metal SeedQR</a>.</p><blockquote class=\"warning\"><p><strong>Warning:</strong> A SeedQR is just your recovery phrase stored in a different format, so it is important to keep it protected! Anyone with access to it can spend the funds stored in your wallet. Keep it hidden and <strong>never scan it using an online device</strong>. You may want to <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/add-a-bip39-passphrase-for-jade#entry:852@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">add a passphrase</a> to ensure your SeedQR is not a central point of failure, however do not proceed without a full understanding of passphrases.</p></blockquote><h2 id=\"h_01HV6KD6BJ6WE0EQP3B7FBNTHG\">Required Materials</h2><div class=\"num-list-custom\"><ul>\n<li class=\"num-list-text\">A <a href=\"https://help.blockstream.com/hc/article_attachments/20515645709593\" target=\"_blank\" rel=\"noopener noreferrer\">paper</a> or metal SeedQR template for your desired recovery phrase length.</li>\n<li class=\"num-list-text\">A black permanent marker to draw your SeedQR.</li>\n<li class=\"num-list-text\">\n<strong>Optional:</strong> If using a steel QR template, make sure you also have an automatic or manual center punch.</li>\n</ul></div><h2 id=\"h_01HV6KD6BJQ12E1W1MZGXEXSWT\">Create SeedQR During Initialization</h2><p>Follow the instructions below to export your SeedQR during the setup process. <strong>If your Jade Plus is already initialized, </strong><a href=\"#h_01GDDV30C8XA9N7GJEWBVAFN9Y\"><strong>skip to these instructions</strong></a><strong>.</strong></p><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Begin <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/set-up-jade#entry:522@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">setting up your Jade</a> Plus and choose the <strong>Advanced</strong> option when it is presented, then select your recovery phrase length. Continue backing up and verifying your recovery phrase.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase/10426501890713.png\" alt=\"1.png\" width=\"306\" /><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase/10462393767577.png\" alt=\"10.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">After verifying your recovery phrase, Jade Plus will ask if you would like to <strong>export it as a SeedQR</strong>. Select <strong>Yes</strong>, then choose <strong>Next</strong>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase/10426773245977.png\" alt=\"2.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase/10729880034329.png\" alt=\"rplexport.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Jade Plus will display your recovery phrase as a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/what-is-a-seedqr#entry:1099@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">CompactSeedQR</a>. At this point, you will need&nbsp;your <a href=\"https://help.blockstream.com/hc/article_attachments/20515645709593\" target=\"_blank\" rel=\"noopener noreferrer\">QR template</a> and a permanent marker (or center punch if punching into steel). Select <strong>Begin</strong> when you are ready.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase/10426724830233.png\" alt=\"4.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">You will be shown several <strong>zoomed-in sections</strong> of your CompactSeedQR, which you can use to fill in your QR template. Mark the corresponding pixels on the grid using your marker (or on metal, etch with your center punch tool, then mark), and use the <strong>jog-wheel to navigate</strong> to the next (or previous) area of the grid after you have completed drawing the current section. If you selected a <strong>12 word</strong> recovery phrase, you will see <strong>nine 7x7 sections</strong> (A1-C3). A <strong>24 word</strong> recovery phrase will display <strong>twenty-five 5x5 sections</strong> (A1-E5).</p>\n</div><blockquote><p><strong>Tip:</strong> Simply <strong>draw a large circle where each pixel should be marked</strong> - no need to fill in the edges of the square perfectly.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase/11627159516313.png\" alt=\"qrdraw.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">When you have finished drawing all sections of your SeedQR, select <strong>Done</strong>. You will then be prompted to <strong>scan the QR code</strong> you have created to make sure it matches your recovery phrase. After verification, continue setting up your Jade Plus as usual. You may then use your SeedQR when unlocking Jade Plus with <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-cases-for-temporary-signer#entry:1209@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Temporary Signer</a>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase/10426773327385.png\" alt=\"7.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase/10426843653145.png\" alt=\"8.png\" width=\"306\" /></p><blockquote class=\"note\"><p><strong>Note:</strong> If you experience any errors when verifying your SeedQR, Jade Plus will allow you to <strong>retry</strong> and navigate back to your CompactSeedQR to <strong>make sure it was drawn correctly</strong>. You may also want to <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">review our scanning tips</a> if your Jade Plus is not reading your SeedQR.</p></blockquote><h2 id=\"h_01GDDV30C8XA9N7GJEWBVAFN9Y\">Create SeedQR After Initialization</h2><p>If your Jade Plus is already set up, you still have the option to create a SeedQR from your recovery phrase during <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-cases-for-temporary-signer#entry:1209@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Temporary Signer</a>.</p><p><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">If you've already initialized your Jade Plus, you can create a SeedQR by turning on your device and selecting </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Options </strong><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\u2192</span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"> Temporary Signer</strong><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">, then manually entering your 12 or 24 word recovery phrase. Jade Plus will then prompt you to create a CompactSeedQR. Follow the same steps as shown in the During Initialization flow above.</span></p>"}, "jade__seedqr-vs-qr-pin-unlock": {"title": "SeedQR vs. QR PIN unlock", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>Jade Plus QR Mode allows you to use Jade Plus without connecting via USB or Bluetooth, and instead communicate with a companion app via QR codes. Jade Plus offers two different unlock methods that are ideal for QR Mode, so users can choose the option that works best for them.</p><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock/15882801930265.png\" alt=\"connect.png\" width=\"306\" /><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock/51121071631129.png\" alt=\"access.png\" width=\"306\" /></p><h2 id=\"h_01K6B9BTFHK4920AV3TCH1NRAH\">SeedQR</h2><p>A <a href=\"https://help.blockstream.com/blockstream-jade/faqs/what-is-a-seedqr#entry:1099@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">SeedQR</a> is simply a form of your <strong>recovery phrase in a QR code format</strong>, instead of a list of 12 or 24 words. You can <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/create-a-seedqr-from-my-recovery-phrase#entry:413@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">create a SeedQR</a> by transcribing your recovery phrase QR onto a paper or metal template from your Jade Plus. In order to access QR Mode with this method, <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-plus-air-gapped-with-seedqr#entry:765@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>scan your SeedQR</strong></a> to unlock your Jade Plus. Keep in mind this wallet will be <strong>forgotten on reboot</strong> and you will need to scan your SeedQR every time you log in.</p><h2 id=\"h_01K6B9BTFHYDXPSTWG56SSNK5N\">QR PIN Unlock</h2><p>You can also access QR Mode using a PIN unlock, however we recommend using QR codes for this unlock process, instead of USB or Bluetooth, in order to stay fully air-gapped. This will require some additional interactions between Jade Plus and your phone (or desktop). Jade Plus requires communication with a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a> to unlock using a PIN, which mitigates the risk of physical key extraction. You will need establish a connection with this <a href=\"https://glossary.blockstream.com/blind-oracle/\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a> in order to proceed.</p><p>Select <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-air-gapped-with-qr-pin-unlock#entry:650@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">QR PIN Unlock</a> on Jade Plus, which will direct you to a companion webpage to perform a series of QR scans using both your Jade Plus and your companion device. Each device will need to scan two QR codes and display two QR codes, for a total of four scans. After performing the actions above, Jade Plus will be unlocked and ready for a fully air-gapped workflow.</p><h2 id=\"h_01K6B9BTFHM8HZ1FN55CSTJ3TT\">Comparison of Login Methods</h2><p>Each option provides different benefits and trade-offs, so you may want to switch between these methods depending on your circumstances.&nbsp;</p><h3 id=\"h_01K6BA3AF5QF3MR6EN7VRD6SR1\">QR PIN Unlock</h3><ul>\n<li>\n<strong>Benefits:</strong> You can leave your recovery phrase in a protected location, and it requires no additional materials for setup.</li>\n<li>\n<strong>Trade-offs:</strong> More login steps required, and you must navigate to an external webpage if it's not already implemented in your companion app.</li>\n</ul><h3 id=\"h_01K6BA8599322XT8QQNHFJ5S7K\">SeedQR</h3><ul>\n<li>\n<strong>Benefits:</strong> It offers fast wallet access, and the ability to use it in other <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-cases-for-temporary-signer#entry:1209@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Temporary Signer</a> situations.</li>\n<li>\n<strong>Trade-offs:</strong> Initial set up is slower and requires additional materials to create. Your recovery phrase must also be readily available to spend funds easily.*</li>\n</ul><p><em>*Anyone who has access to your SeedQR will be able to spend your funds if they understand how to use it, so it may be <strong>more risky to keep it easily accessible</strong>. However, </em><a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-a-passphrase-work-on-jade#entry:689@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><em>adding a strong passphrase</em></a><em> to your wallet can help to mitigate this concern.</em></p><blockquote><p><strong>Tip:</strong> Neither setup above allows your wallet to be compromised if an attacker only found your Jade Plus, so you do not need to worry about security implications when considering the two options. Either a SeedQR or your PIN would each be required in order to steal your funds from Jade Plus.</p></blockquote>"}, "jade__access-jade-air-gapped-with-qr-pin-unlock": {"title": "Access Jade air-gapped with QR PIN Unlock", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>QR PIN Unlock is a fully air-gapped method to unlock your Jade Plus using only its built-in camera, or by attaching a <a href=\"https://store.blockstream.com/products/jade-plus-and-jadelink-bundle\" rel=\"noopener noreferrer\" target=\"_blank\">JadeLink</a> (<strong>Jade Plus only</strong>). This process allows you to keep all key material fully encrypted on Jade and accessible via PIN.</p><h2 id=\"h_01JEPBRCBCQABHY3DVMRSYTF11\">QR PIN Unlock</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-24.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on Jade and select <strong>QR Mode</strong>, then choose <strong>QR PIN Unlock</strong>. If you haven't initialized your Jade Plus yet, follow the <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/air-gapped-jade-plus-setup#entry:157@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">setup guide</a>.</p>\n</div><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Visit the QR PIN Unlock <a href=\"https://blkstrm.com/pn\" rel=\"noopener noreferrer\" target=\"_blank\">companion page</a> on your desktop or mobile device by scanning the QR code or entering the URL, then select <strong>Continue</strong>.</p>\n</div><blockquote class=\"tip\">\n<strong>Tip:</strong> For faster access on subsequent logins, add the QR PIN Unlock page to your phone's Home Screen or Favorites folder so it is accessible with a single tap.</blockquote><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-25.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Enter your PIN on Jade Plus when prompted, then tap <strong>Done</strong> on the companion page.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Make sure to allow access to your desktop or mobile phone's camera if prompted, at which point your device's camera will turn on. Point the camera at Jade Plus and scan the animated QR code until the progress bar is full. When the companion page displays its own QR code, select the <strong>checkmark</strong> on Jade Plus.</p>\n</div><blockquote class=\"note\">\n<strong>Note:</strong> If you are having trouble scanning the QR code, you may want to choose <strong>Change camera selection</strong> to try a different lens or select <strong>Options</strong> on Jade Plus and set the QR Density to <strong>Low</strong>.</blockquote><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Point the Jade Plus camera at the animated QR code displayed on the companion page until the progress bar is full.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">After scanning all QR code frames, your Jade Plus will unlock and be ready to perform air-gapped operations.</p>\n</div><p></p>"}, "jade__access-jade-plus-air-gapped-with-seedqr": {"title": "Access Jade Plus air-gapped with SeedQR", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>A SeedQR is a hand-drawn version of your recovery phrase in QR code format that can be scanned with the Jade Plus camera to temporarily load keys to the device. This allows Jade Plus to operate as a fully air-gapped stateless signer and may provide improvements in security and compatibility.</p><h2 id=\"h_01JEEKXKH5G9X6ZAV1WHQ1N95W\">SeedQR Access Process</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Ensure you have a SeedQR by following the <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/air-gapped-jade-plus-setup#entry:157@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">air-gapped Jade setup instructions</a>. If you've already set up your Jade Plus, you can create a SeedQR by turning on your device and selecting <strong>Options </strong>\u2192\u00a0<strong>Temporary</strong> <strong>Signer</strong>, then manually entering your 12 or 24 word recovery phrase. You will then be prompted to create a CompactSeedQR.</p>\n</div><blockquote>\n<strong>Note: </strong>CompactSeedQR is a variation of the standard SeedQR format that uses a more space-efficient encoding method, making it easier to hand-draw (or stamp into metal) and scan reliably.</blockquote><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/430-8584.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Turn on Jade Plus and navigate to the <strong>Scan SeedQR</strong> entry point. <span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">If your device is initialized, you will find this option under </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">QR Mode</strong><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">. </span><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Uninitialized Jades will see this option on the <strong>home screen</strong>.</span></p>\n</div><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">After Jade Plus scans the SeedQR, your keys will be loaded to the device automatically and you may begin performing air-gapped operations.</p>\n</div><blockquote class=\"tip\">\n<strong>Tip:</strong> If you have any issues scanning a SeedQR, it may help to try <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">these troubleshooting steps</a>.</blockquote><p></p><p></p><div class=\"num-list-custom\">\u00a0</div>"}, "jade__add-jade-plus-to-an-air-gap-supported-app": {"title": "Add Jade Plus to an air-gap supported app", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>In order to perform wallet functionality fully air-gapped, you will need to export the xpub from the wallet stored on Jade Plus. The xpub allows your companion app to generate receive addresses, view balances, and create transactions for Jade Plus to sign.</p><blockquote class=\"note\">\n<strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR. To send or receive Liquid assets, connect Jade to the Blockstream app using USB or Bluetooth.</blockquote><blockquote class=\"note\"><p><strong>Note:</strong> This guide demonstrates air-gapped use with Sparrow. Please refer to your wallet app's specific instructions if not using this companion app.</p></blockquote><h2 id=\"h_01JEV0N1KY8N6AEZSGEV2D2AKE\">Performing wallet functions fully-air gapped</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Start your Jade Plus session using a <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/air-gapped-jade-plus-setup#entry:157@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">QR communication option</a>, then select <strong>Options</strong> \u2192 <strong>Wallet</strong> \u2192 <strong>Export Xpub</strong>.</p>\n</div><p></p><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/430-8760.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Jade Plus will display an animated QR code that contains the xpub for the derivation path shown. The default derivation path is for Singlesig Native Segwit accounts, however users may select <strong>Options</strong> to change this to one of the paths below:</p>\n</div><ul>\n<li class=\"num-list-text\">\n<strong>Native Segwit | Singlesig:</strong> m/84'/0'/0'</li>\n<li class=\"num-list-text\">\n<strong>Wrapped Segwit | Singlesig:</strong> m/49'/0'/0'</li>\n<li class=\"num-list-text\">\n<strong>Native Segwit | Multisig:</strong> m/48'/0'/0'/2'</li>\n<li class=\"num-list-text\">\n<strong>Wrapped Segwit | Multsig:</strong> m/48'/0'/0'/1'</li>\n</ul><blockquote class=\"note\"><p><strong>Note:</strong> Make sure to select the matching script and wallet type on your compatible wallet app, otherwise it may generate an incorrect account and <a href=\"https://help.blockstream.com/blockstream-app/troubleshooting/fix-issues-with-unexpected-wallet-balance#entry:835@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">your balance will not appear</a> (if you have already received funds).</p></blockquote><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">\u00a0</p>\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Open your <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">air-gap supported app</a> and follow the instructions to add Jade Plus as a key. Scan the animated xpub QR displayed on Jade Plus with your device's camera to set up your wallet.</p>\n</div><p></p><div class=\"num-list-custom\">\u00a0</div><h2 id=\"h_01JEV0N1KYXEY8ZRBKV2QG1SNZ\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/verify-receive-addresses-with-an-air-gapped-jade-plus#entry:938@1:url\">Verify receive addresses with Jade Plus air-gapped</a>\n</h2>"}, "jade__verify-receive-addresses-with-an-air-gapped-jade-plus": {"title": "Verify receive addresses with an air-gapped Jade Plus", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>Jade Plus can scan QR codes of Bitcoin addresses with its camera to verify whether or not the <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a> belongs to the wallet stored on Jade Plus. This is best practice before sharing a receiving address with a sender.\u00a0</p><blockquote class=\"note\">\n<strong>Note:</strong> QR address verification supports Bitcoin only. Liquid address verification requires a USB or Bluetooth connection.</blockquote><p>Jade Plus can verify addresses for singlesig and multisig wallets (<a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade#entry:1128@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">if one is registered</a>), as well as an address on any path when using USB or Bluetooth. However, when using the camera, Jade Plus will check addresses for any account index or change address on the paths below:</p><ul>\n<li>\n<strong>Singlesig:</strong> m/84'/0'/0' and m/49'/0'/0'</li>\n<li>\n<strong>Multisig: </strong>m/48'/0'/0'/2' and m/48'/0'/0'/1'</li>\n</ul><blockquote class=\"note\">\n<strong>Note:</strong>\u00a0An address that cannot be verified does not necessarily point towards malicious behavior. A failed validation may happen if checking an address on an unsupported path, or if your address belongs to an unusually high index. If your wallet platform displays your address index, make sure Jade has a chance to check it before exiting.</blockquote><h2 id=\"h_01JEV8TATE4Z5B4M532W07JM8K\">Verifying a Receive Address</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Start your Jade Plus session using a <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/air-gapped-jade-plus-setup#entry:157@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">QR communication option</a>, then select <strong>Scan QR</strong>. Point the Jade Plus camera at the QR code of a Bitcoin address that you would like to verify.</p>\n</div><p></p><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/430-8936.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Make sure the address on Jade Plus matches the one in your companion app and is the address you want to verify. Jade Plus will then begin checking each address of your wallet to see if it finds a match. If you know the address belongs to an index greater than 499, you may select the <strong>Skip\u00a0</strong>button. This will automatically jump to the next interval of 500 addresses. If you need to check a change address or adjust the account index, you can find additional settings under <strong>Edit Root</strong>.</p>\n</div><p></p><p></p><p>\u00a0</p><h2 id=\"h_01JEV8TATE0PVF6917T1CE1C6A\">Next: <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-qr#entry:1033@1:url\">Send air-gapped bitcoin transactions with Jade Plus</a>\n</h2><div class=\"num-list-custom\">\u00a0</div>"}, "jade__send-air-gapped-bitcoin-transactions-via-qr": {"title": "Send air-gapped Bitcoin transactions via QR", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>In order to send bitcoin with your air-gapped Jade Plus, you will need to create a transaction using a companion app and pass the information to Jade Plus using QR codes for authorization (or \"signing\"). After signing the transaction, Jade Plus will display this information back as animated QR codes for your companion app to scan so that it can be broadcast to the Bitcoin network.</p><blockquote class=\"note\">\n<strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR. To send or receive Liquid assets, connect Jade to the Blockstream app using USB or Bluetooth.</blockquote><blockquote class=\"note\">\n<strong>Note:</strong> This guide demonstrates air-gapped use with Sparrow. Please refer to your wallet app's specific instructions if not using this companion app.</blockquote><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-27.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-28.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Open your <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">QR-compatible companion app</a> and create a new transaction by entering the recipient's <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a> and the intended amount to send.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Choose to show your unsigned transaction in a QR code format, then start an <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/air-gapped-jade-plus-setup#entry:157@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">air-gapped Jade Plus session</a> and select <strong>Scan QR</strong>. Point the camera at the animated QR code until the progress bar is filled.</p>\n</div><blockquote>\n<strong>Tip:</strong> Lower the QR density on your companion app if you are <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">having trouble reading the QRs</a>.</blockquote><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Confirm on Jade Plus that both the address and the amount match what you intended. Select the checkmark when you are ready and the signed transaction will be displayed as an animated QR code on Jade Plus. Choose to scan the QR on your companion app, scan the animated QR display until the progress bar is full, then broadcast the transaction to finish sending.</p>\n</div><blockquote>\n<strong>Tip:</strong> Click <strong>Options</strong> on Jade Plus and lower the density or frame rate settings if your app is having trouble scanning the QRs.</blockquote><p></p><p></p><div class=\"num-list-custom\">\u00a0</div>"}, "jade__send-air-gapped-bitcoin-transactions-via-jadelink": {"title": "Send air-gapped Bitcoin transactions via JadeLink", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">In order to send bitcoin with your air-gapped </span><a style=\"background-color:#ffffff;font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" href=\"https://store.blockstream.com/products/jade-plus\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Plus</a><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">, you will need to create a transaction using a companion app and pass the information to your Jade Plus using </span><a style=\"background-color:#ffffff;font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" href=\"https://store.blockstream.com/products/jadelink-air-gapped-usb-drive\" target=\"_blank\" rel=\"noopener noreferrer\">JadeLink</a><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"> for authorization (or \"signing\"). After signing the transaction, Jade Plus will save the signed transaction as a file to JadeLink for your companion app to read so that it can be broadcast to the Bitcoin network.</span></p><blockquote class=\"note\">\n<strong>Note:</strong> This guide demonstrates air-gapped use with Sparrow. Please refer to your wallet app's specific instructions if not using this companion app.</blockquote><h2 id=\"h_01JEVA8T4QSPJE7MN1A9HGK9NS\">Sending Air-gapped JadeLink Transactions</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Open your <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">JadeLink-compatible companion app</a> and create a new transaction by entering the recipient's <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> and the intended amount to send.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-jadelink/41058248070041.png\" alt=\"Screenshot 2024-12-11 at 12.03.40\u202fPM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Choose to save your unsigned transaction to JadeLink, then eject the drive and connect it to Jade Plus.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-jadelink/41058979324313.png\" alt=\"1.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Start an <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/air-gapped-jade-plus-setup#entry:157@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">air-gapped Jade session</a> and select <strong>Options</strong> \u2192 <strong>USB Storage</strong> \u2192 <strong>Sign</strong>. Then select the Partially Signed Bitcoin Transaction (PSBT) file you would like to sign.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-jadelink/41058979326105.png\" alt=\"3.png\" /></p><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-jadelink/41058935469977.png\" alt=\"4.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">After confirming on your device that both the address and the amount match what you intended, Jade Plus will sign the transaction and save the file to JadeLink. You can then connect JadeLink to your companion app to load the signed PSBT to broadcast the transaction and finish the sending process.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-jadelink/41058935471129.png\" alt=\"7.png\" /></p><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-jadelink/41058979328921.png\" alt=\"8.png\" /></p>"}, "jade__supported-air-gapped-functionality-via-qr": {"title": "Supported air-gapped functionality via QR", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p>The <strong>Scan QR</strong> function available in an active session enables the <a href=\"https://store.blockstream.com/products/jade-plus\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Plus</a> camera to read many types of QR codes. This allows you to interact with your Jade Plus and a companion device fully air-gapped (without needing a USB or Bluetooth connection).</p><blockquote class=\"note\">\n<strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR. To send or receive Liquid assets, connect Jade to the Blockstream app using USB or Bluetooth.</blockquote><h2 id=\"h_01JF0TMXF2D1N73ZZB634PRVQS\">Scan QR Functionality</h2><p>The following data can be read as a QR code, either encoded in BC-UR format or as a plain text string:</p><ul>\n<li>\n<strong><a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-air-gapped-with-qr-pin-unlock#entry:650@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Device Unlock</a>:&nbsp;</strong>Perform a PIN Unlock using QR codes and a companion app</li>\n<li>\n<strong><a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-qr#entry:1033@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">PSBT</a>:&nbsp;</strong>Import transaction data from a companion device for Jade to sign and display back to your wallet app in the form of QR codes</li>\n<li>\n<strong><a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/verify-receive-addresses-with-an-air-gapped-jade-plus#entry:938@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Bitcoin address</a></strong>: Verify receive addresses generated by your companion app with Jade before sharing with a sender</li>\n<li>\n<strong><a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/air-gapped-jade-plus-setup#entry:157@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">SeedQR</a>:</strong> Quickly switch wallets during an active session (ideal for multisig users)</li>\n<li>\n<strong><a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade#entry:1128@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Multisig configuration</a>:&nbsp;</strong>Register a multisig configuration on Jade to enable receive and change <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> verification for a particular wallet</li>\n<li>\n<strong><a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-jade-as-a-2fa-authentication-device#entry:514@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">OTP</a>:</strong> Register a One-Time Password (OTP) record in order to use Jade as a 2FA authentication device</li>\n<li>\n<strong>Message:</strong> Sign messages with <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">supported companion apps</a>\n</li>\n</ul><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/supported-air-gapped-functionality-via-qr/41933488074265.png\" alt=\"3.png\" /></p>"}, "jade__supported-air-gapped-functionality-via-jadelink": {"title": "Supported air-gapped functionality via JadeLink", "cat": "Blockstream Jade", "section": "Use Jade Air-Gapped", "html": "<p><a href=\"https://store.blockstream.com/products/jadelink-air-gapped-usb-drive\" target=\"_blank\" rel=\"noopener noreferrer\">JadeLink</a> is a USB-C storage drive designed for pairing with <a href=\"https://store.blockstream.com/products/jade-plus\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Plus</a> to perform air-gapped firmware upgrades and transaction signing. When using JadeLink in combination with the Jade Plus camera, you can perform all functionality possible with a Jade Plus in a completely air-gapped manner (including device unlock and receive <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> verification).</p><blockquote class=\"note\">\n<strong>Note:</strong> You can use most generic USB drives and SD cards formatted to FAT32 for this functionality. JadeLink is not specifically required.</blockquote><h2 id=\"h_01JF0TMXF2D1N73ZZB634PRVQS\">JadeLink Functionality</h2><p>JadeLink currently supports the following functionality:</p><ul>\n<li>\n<strong><a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/perform-an-air-gapped-firmware-upgrade#entry:302@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Firmware Upgrades</a>: </strong>Download Blockstream-signed firmware binary and hash files to upgrade your Jade Plus in seconds</li>\n<li>\n<strong><a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/send-air-gapped-bitcoin-transactions-via-jadelink#entry:1082@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Transaction Signing</a></strong>: Save an unsigned transaction from a companion device to JadeLink, connect it to Jade Plus to sign the transaction, and broadcast it with your companion app<img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-air-gapped/supported-air-gapped-functionality-via-jadelink/41151429111193.png\" alt=\"3.png\" />\n</li>\n</ul>"}, "jade__enable-swaps-with-jade": {"title": "Enable swaps with Jade", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>The Blockstream app lets you swap between bitcoin, Lightning bitcoin, and Liquid bitcoin (LBTC) directly from your Jade account in the Blockstream app (mobile only).</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/429-6435.png?v=13\"/></figure><blockquote class=\"note\"><p><strong>Note:</strong> QR Mode currently does not support swaps.</p></blockquote><ol>\n<li>In the Blockstream app, tap <strong>Transact</strong> at the bottom of the screen, then tap <strong>Swap</strong>.<br/>\n</li>\n<li>Tap <strong>Enable Swaps</strong> in the <strong>Get More out of Jade</strong> popup panel.<br/>\n</li>\n<li>\n<strong>Connect Jade</strong> to the Blockstream app via BLE, USB (Android only).</li>\n<li>\n<strong>Unlock your Jade</strong> using your PIN.</li>\n<li>Select <strong>Scan QR</strong> on your Jade, then <strong>scan the QR code</strong> that displays on the Blockstream app.</li>\n</ol><p></p><p></p><ol start=\"6\"><li>With your mobile device, <strong>scan the QR code</strong> that displays on Jade.</li></ol><p></p><p>With Jade swaps enabled, you can now:</p><ul>\n<li>\n<a href=\"https://help.blockstream.com/blockstream-app/use-liquid-bitcoin/perform-an-on-chain-swap#entry:93@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">perform an on-chain swap with Jade</a>.</li>\n<li>\n<a href=\"https://help.blockstream.com/blockstream-app/use-lightning-bitcoin/receive-lbtc-via-lightning-and-pay-lightning-invoice-with-lbtc#entry:498@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">receive and send Lightning payments using LBTC</a>.</li>\n</ul>"}, "jade__enable-a-duress-pin": {"title": "Enable a duress PIN", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>A duress PIN is an alternate PIN that you can enable to automatically delete the encrypted wallet information from Jade if entered.</p><p>You will want to use a duress PIN:</p><ul>\n<li>\n<strong>In case of physical threat</strong>: You can provide this PIN to an attacker, rendering your wallet inaccessible via PIN.</li>\n<li>\n<strong>As a decoy</strong>: You can store a copy of your duress PIN with your Jade for a thief to enter if they locate and steal your device. After entering the duress PIN, it will appear that Jade simply experienced a failure by displaying the message \"Internal Error\".</li>\n</ul><blockquote class=\"warning\">\n<strong>Warning:</strong> If you create a wallet-erase PIN and subsequently enter it upon login, there is no way to regain access to your funds except by restoring your recovery phrase. <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/set-up-jade#entry:522@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">Make sure you have a backup</a> before proceeding.</blockquote><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-12.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-13.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">During an active Jade session, select <strong>Options</strong> \u2192 <strong>Authentication</strong> \u2192 <strong>Duress PIN</strong>.</p>\n</div><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Enter a PIN that is different from your normal PIN and confirm your selection. If an attacker enters this PIN on your Jade, it will delete the information from Jade and you will need to <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/restore-recovery-phrase-to-jade#entry:1040@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">restore with your recovery phase</a>.</p>\n</div><p></p><div class=\"num-list-custom\">\u00a0</div>"}, "jade__use-jade-as-a-stateless-signing-device": {"title": "Use Jade as a stateless signing device", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>Besides its traditional use as a hardware wallet, you can use your Jade as a stateless signing device.</p><p>A stateless signing device typically refers to hardware that does not store any wallet information and requires you to manually input your recovery phrase for every session. This operation mode is helpful for some users, especially those who have multiple different seeds for a multisig wallet, or those looking for fast access to Jade in an air-gapped manner.</p><p>When using Jade as a hardware wallet with PIN, your seed is encrypted <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">in cooperation with a blind oracle</a>. This requires Jade to communicate with a companion device to perform the decryption. However, using Jade as a stateless signing device does not require any PIN entry or communication with a companion device.</p><blockquote class=\"note\"><p><strong>Note:</strong> Many users prefer stateless signing because there is nothing of value to steal from the locked device. However, even when using Jade in a more traditional hardware wallet manner with PIN, all stored wallet information is encrypted, thus uniquely protecting it from the threat of physical key extraction if found by itself.</p></blockquote><h2 id=\"h_01JBF4W1B2YFYST5MWA9ZVP8WK\">Stateless Signing Methods</h2><p>In order to use Jade as a stateless signing device, you will need a recovery phrase or a SeedQR (preferred), both of which you can create using <strong>Advanced Setup</strong>. If your Jade is already set up and you need to create a SeedQR, you can do so by entering your recovery phrase manually in the Temporary Signer flow, explained below.\u00a0</p><h3 id=\"h_01JBF4W1B2QC2HBW9SJ2BN9R9C\">Scan SeedQR</h3><blockquote class=\"note\"><p><strong>Note:</strong> This feature is available for <a href=\"https://store.blockstream.com/products/jade-plus\" rel=\"noopener noreferrer\" target=\"_blank\">Jade Plus</a> only.</p></blockquote><p>This path is optimized for air-gapped QR users and <strong>does not support a USB or Bluetooth option</strong>. If you would like to connect Jade with these communication methods, view the Temporary Signer flow below.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-15.png?v=13\"/></figure><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-16.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on Jade and navigate to <strong>Scan SeedQR</strong>. For uninitialized Jades this option will be in the main menu, while initialized Jades will have this option under the\u00a0<strong>QR Mode</strong> menu.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Scan your SeedQR with Jade's camera. Once detected, your seed will load automatically and be ready for use.</p>\n</div><blockquote><p><strong>Tip:</strong> If you have multiple SeedQRs for a multisig setup, you can easily switch between seeds by using the Scan QR button within an active session.</p></blockquote><p></p><h3 id=\"h_01JBF4W1B28Z4D1VDTRREWRTMN\">Enter Recovery Phrase or Scan SeedQR</h3><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on Jade and navigate to <strong>Options</strong> \u2192\u00a0<strong>Temporary Signer</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Choose to enter your recovery phrase manually or scan a supported QR code. Then select your communication method and your seed will load to Jade and be ready for use.</p>\n</div><p></p>"}, "jade__use-jade-as-a-2fa-authentication-device": {"title": "Use Jade as a 2FA authentication device", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p><a href=\"https://blockstream.com/jade/\" rel=\"noopener noreferrer\" target=\"_blank\">Jade</a> provides similar one-time passwords (OTP) functionality to authenticator apps such as Google Authenticator, with the secrets held offline on a PIN-protected device.</p><p>You can use Jade to store and generate OTPs for any platform that supports two-factor authentication (2FA). Records can cover your email account, an exchange, a <a href=\"https://blockstream.com/app\" rel=\"noopener noreferrer\" target=\"_blank\">Blockstream app wallet</a>, or any other platform that uses time-based 2FA.</p><p>Importing accounts from 2FA apps and exporting OTP records require a recent Jade firmware version. See <a href=\"https://help.blockstream.com/hc/en-us/articles/4408030503577-Update-Jade-firmware\" rel=\"noopener noreferrer\" target=\"_blank\">Update Jade firmware</a> if you have not updated recently.\u00a0</p><blockquote class=\"note\"><p><strong>Note:</strong> QR Mode is not supported when using Jade as a 2FA authentication device.</p></blockquote><p>This guide covers:</p><ul><li data-list-item-id=\"ee33d03a8ddfc0699c4526fe36d6b164a\"><a href=\"#add-otp-record\">Add a new OTP record</a></li><li data-list-item-id=\"ef1cf4439e21fd2c508393c0d68204874\"><a href=\"#import-google-authenticator\">Import accounts from Your 2FA App</a></li><li data-list-item-id=\"edebbe357085ced3ef4075d0f7a672504\"><a href=\"#export-otp-records\">Export OTP records from Jade</a></li></ul><h2 id=\"add-otp-record\">Add a New OTP Record</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-18.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">During an active Jade session, select <strong>Options</strong> \u2192 <strong>Authentication</strong> \u2192 <strong>OTP</strong>.</p></div><p></p><p></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Add a new OTP record by scanning a supported QR code or by manually entering a Uniform Resource Identifier (URI) provided by the platform you are enabling 2FA for.</p></div><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-19.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">After setup, select <strong>View OTP</strong> and choose the record you want to view. The time-based OTP code displays along with a progress bar showing how long the current code is valid for.</p></div><p></p><p></p><h2 id=\"import-google-authenticator\">Import Accounts from Your 2FA App</h2><p>Jade can read your 2FA app's export QR format directly, so accounts already stored in 2FA can transfer to Jade without re-running setup for each platform.</p><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">In your phone's 2FA app, generate the export QR code for the account or accounts you want to move.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">During an active Jade session, select <strong>Options</strong> \u2192 <strong>Authentication</strong> \u2192 <strong>OTP</strong> \u2192 <strong>New OTP</strong> \u2192 <strong>Scan QR</strong>.</p></div><blockquote><p><strong>Tip:</strong> Alternatively, you can simply select <strong>Scan QR</strong> from Jade's home menu.</p></blockquote><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Point Jade's camera at the export QR code displayed in your 2FA app. Each scanned account is added to Jade as its own OTP record.</p></div><blockquote><p><strong>Tip:</strong> For the most reliable scan, export one account at a time from your 2FA app. If you export several accounts at once, zoom in on the QR code on your phone before scanning so Jade can read it cleanly.</p></blockquote><h2 id=\"export-otp-records\">Export OTP Records from Jade</h2><p>Stored records can be exported from Jade as a scannable QR code or as readable text. The exported secret is compatible with iOS and Android authenticator apps, so records can move to a secondary phone, an encrypted drive, or another authenticator app of your choice.</p><blockquote class=\"warning\"><p><strong>Warning:</strong> OTP records are tied to the Jade device they were created on. Restoring your recovery phrase to a new Jade brings back your bitcoin, but it does not bring back your 2FA records. If a Jade is lost, factory reset, or replaced without a prior export, the records on it cannot be recovered. Export your records to a secure backup location before you need to recover.</p></blockquote><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">During an active Jade session, select <strong>Options</strong> \u2192 <strong>Authentication</strong> \u2192 <strong>OTP</strong> \u2192 <strong>View OTP</strong>, then choose the record you want to export.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">When the OTP code displays, select <strong>Details</strong>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Select <strong>Export</strong>. Jade displays the secret as a scannable QR code on a screen labeled <strong>Scan Secret Key</strong>. Scan the QR with the authenticator app you want to import the record into.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">To view the same secret as text instead, select <strong>View Secret</strong>. Jade shows the secret on a screen titled <strong>Secret Key</strong>. Write the secret to a secure offline location or save it to an encrypted drive.</p></div><p>Once a record is exported and verified in your backup destination, it can be restored to a replacement Jade or used in a secondary authenticator app at any time.</p>"}, "jade__use-jade-as-a-bitcoin-miner": {"title": "Use Jade as a Bitcoin miner", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>A little known fact about the <a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app#entry:560@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Jade</a> (<strong>Classic only</strong>) is that you can use it as a Bitcoin miner; however, this feature is solely for fun. The odds of mining a block with Jade are <strong>extraordinarily low</strong> and <strong>you should</strong> <strong>not expect to earn any bitcoin</strong> by following these instructions. This feature is best for using Jade as a lottery miner, for educational purposes, or as a way to track the current Bitcoin <a href=\"https://glossary.blockstream.com/block-height/\" target=\"_blank\" rel=\"noopener noreferrer\">block height</a> on your Jade. You can use this feature without initializing Jade and without access a wallet.</p><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/use-jade-as-a-bitcoin-miner/17023719206297.png\" alt=\"1.png\" width=\"500\" /></p><blockquote class=\"note\">\n<strong>Note:</strong> Leaving your Jade plugged in continuously to use this feature <strong>will cause wear and tear</strong> on your device. <strong>U</strong><strong>se at your own discretion</strong>&nbsp;or <strong><a href=\"https://store.blockstream.com/products/blockstream-jade-hardware-wallet\" target=\"_blank\" rel=\"noopener noreferrer\">purchase a spare Jade</a></strong> solely for this purpose.</blockquote><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\"><a href=\"https://jademiner.blockstream.com/upgrade/fwupgrade.html\" target=\"_blank\" rel=\"noopener noreferrer\">Upgrade your Jade</a> to the miner supported firmware. You can <a href=\"https://jadefw.blockstream.com/upgrade/fwupgrade.html\" target=\"_blank\" rel=\"noopener noreferrer\">switch back</a> to a non-miner supported firmware at any time.</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Visit the <a href=\"https://jademiner.blockstream.com/\" target=\"_blank\" rel=\"noopener noreferrer\">companion webpage</a>&nbsp;and <strong>plug in your Jade</strong>. You will need to use a browser that supports Web Serial (e.g. Chrome). Then, enter the <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> you would like to mine to and click <strong>Start</strong>.</p>\n</div><p><img style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/use-jade-as-a-bitcoin-miner/17023836686745.png\" alt=\"2.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Your Jade will begin mining automatically. There is no need to initialize your device or access a wallet. You can view the current block height and your hash rate on Jade, as well as the block reward and the address that will receive bitcoin from a luckily mined block.&nbsp;</p>\n</div><blockquote>\n<strong>Tip:</strong> Jade will stop mining once you reboot it or once it receives another message from a companion wallet or device. If you unplug Jade without turning off, it will continue hashing, but it will disconnect from a node and the block height will no longer update.&nbsp;</blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/use-jade-as-a-bitcoin-miner/17023719206297.png\" alt=\"1.png\" width=\"500\" /></p>"}, "jade__use-jade-with-testnet": {"title": "Use Jade with testnet", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>Blockstream Jade works with Bitcoin mainnet as well as testnet (and regtest). Please note that once you save a wallet to Jade via PIN, the initialized wallet will only work with the network that was chosen during setup. However if users have a mainnet initialized Jade and want to temporarily use a wallet on testnet, they can do so by using <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-jade-as-a-stateless-signing-device#entry:400@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Temporary Signer</a>, which will prompt for a mainnet vs. testnet selection every time it is used and bypass the PIN-saved wallet.</p><h2 id=\"h_01HYGSDDN5YHF9BX3GS9S7G900\">Swap Between Mainnet and Testnet</h2><p>The following instructions are geared toward users with a mainnet initialized wallet protected via PIN, but would like to <strong>temporarily</strong> access testnet.</p><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on your Jade and select <strong>Options</strong> \u2192&nbsp;<strong>Temporary Signer</strong>.</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select <strong>Scan QR</strong> and point Jade's camera at a supported backup recovery QR (such as a SeedQR). Jade will automatically proceed to the next screen once your <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">QR is recognized</a>. Alternatively, select <strong>12 or 24 words </strong>to manually type your recovery phrase.</p>\n</div><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">When prompted for your desired connection method, choose <strong>USB</strong> or <strong>Bluetooth</strong> (mobile only) and connect Jade to your companion app. Then, choose <strong>Testnet</strong> as your network selection.</p>\n</div><blockquote class=\"note\"><p><strong>Note:&nbsp;</strong>You may need to <a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/set-up-testnet-wallet#entry:986@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">enable testnet</a> in the Blockstream app in order to have the option appear in your desktop or mobile version of the app.</p></blockquote><h2 id=\"h_01HYGSDDN5XSV0MXXNGQZCVYTW\">Change Initialized Wallet to Testnet</h2><p>If you are already using a mainnet initialized (PIN protected) wallet but would like to switch it to testnet, you will need to perform a <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/perform-a-factory-reset#entry:779@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">factory reset</a>. Then, continue through the normal <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/jade-overview#entry:198@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">setup</a> process and select <strong>Testnet</strong> when prompted for your network selection.</p><blockquote class=\"note\"><p><strong>Note:&nbsp;</strong>Again, you may need to <a href=\"https://help.blockstream.com/blockstream-app/perform-advanced-wallet-operations/set-up-testnet-wallet#entry:986@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">enable testnet</a> in the Blockstream app in order to have the option appear in your desktop or mobile version of the app.</p></blockquote>"}, "jade__add-a-bip39-passphrase-for-jade": {"title": "Add a BIP39 passphrase for Jade", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>A BIP39 passphrase is\u00a0an optional, advanced feature that allows you to add additional words or characters to your recovery phrase in order to create an entirely separate wallet than the one accessed with your recovery phrase alone. Entering two different passphrases will lead to two different valid wallets, even though both may share the exact same recovery phrase.</p><p>For example:</p><ul>\n<li>\n<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><strong>Recovery phrase A</strong>: (</span><span class=\"wysiwyg-underline\"><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">arrow garment kite ..... seminar actual genuine)</em></span><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\u00a0+ <strong>Passphrase B</strong>: (</span><span class=\"wysiwyg-underline\"><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">bitcoin</em></span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">)</em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\u00a0= </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Wallet X</strong>\n</li>\n<li>\n<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"><strong>Recovery phrase A</strong>: (</span><span class=\"wysiwyg-underline\"><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">arrow garment kite ..... seminar actual genuine)</em></span><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">\u00a0+ <strong>Passphrase C</strong>: (</span><span class=\"wysiwyg-underline\"><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">bitcoins</em></span><em style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">) </em><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">= </span><strong style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Wallet Y</strong>\n</li>\n</ul><blockquote class=\"warning\">\n<strong>Warning:</strong> This feature should only be used by those who fully understand its implications as using a passphrase can greatly increase the risk of lost funds due to user error.\u00a0</blockquote><h1 id=\"h_01JD01N00FDX7CNYM6R3NVBKXQ\">Using a Passphrase</h1><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/429-7371.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">In order to be prompted by Jade to enter a passphrase during login or setup, select <strong>Options</strong> on the main menu before a wallet is active and select <strong>BIP39 Passphrase</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select <strong>Frequency</strong> to change when you would like Jade to prompt you for a passphrase:</p>\n</div><ul>\n<li>\n<strong>Disabled:</strong> You will not be prompted for a passphrase during login.</li>\n<li>\n<strong>Next Login Only:</strong> You will be prompted for a passphrase <strong>only during the next</strong> login event via PIN or temporary access. You will need to navigate to this menu for every passphrase session, however this option will conceal the fact that you use a passphrase.</li>\n<li>\n<strong>Always Ask:</strong> The passphrase entry screen will appear during every login event.</li>\n</ul><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Select <strong>Method</strong> to change how you would to enter your passphrase:</p>\n</div><ul>\n<li>\n<strong>Manual:</strong> A keyboard will appear that allows you to enter specific characters, one-by-one. This option is the standard for most hardware devices and provides the option to use uppercase and lowercase letters, numbers, and more special characters.</li>\n<li>\n<strong>WordList:</strong> This entry method is designed for faster entry of higher entropy, long passphrases that are based on the <a href=\"https://github.com/bitcoin/bips/blob/master/bip-0039/english.txt\" rel=\"noopener noreferrer\" target=\"_blank\">BIP39 wordlist</a>. A random series of these words can be chosen as a passphrase and Jade will recommend BIP39 word options as you begin typing, which greatly speeds up the entry process. Passphrases using this method are easier to remember and can be typed faster than similarly secure, manual entry ASCII passphrases.</li>\n</ul><p></p><blockquote>\n<strong>Tip:</strong> The WordList method will automatically build your passphrase using the following format: <strong>lowercaseBIP39word + &lt;space&gt; + lowercaseBIP39word + &lt;space&gt; + lowercaseBIP39word</strong> and so on (for example: \"satoshi abandon guard\"). Passphrases are case-sensitive and spaces count as well, so this is important to remember if you want to enter your passphrase with Manual entry or using another hardware wallet. If you are not exactly sure of how the WordList method works, we <strong>recommend using Manual entry</strong>.</blockquote><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">If Jade is configured to use a passphrase, you will be prompted to enter it upon any attempt to access an active session (either after PIN entry or a temporary option like SeedQR). After entry, double check you are entering your desired passphrase. <strong>Remember that passphrases are case-sensitive and there is no concept of an incorrect passphrase, any \"typo\" will simply lead to a new wallet and you will not see your funds.</strong></p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">When logged into an active session with your passphrase, <strong>take note of your wallet fingerprint</strong> found in the lower right corner of Jade's display (ex. 8D688EA0). This 8-character string is unique to this wallet and its passphrase. This can serve as a check on subsequent sessions as it will not match your recorded fingerprint if you have a typo in your passphrase.</p>\n</div><p></p>"}, "jade__create-a-bip85-child-recovery-phrase": {"title": "Create a BIP85 child recovery phrase", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>Jade supports generating child BIP39 recovery phrases following the <a href=\"https://github.com/bitcoin/bips/blob/master/bip-0085.mediawiki\" rel=\"noopener noreferrer\" target=\"_blank\">BIP85</a> specification. It creates a child recovery phrase from an index number and stores the wallet on Jade, allowing you to easily derive recovery phrases from a parent (or \"master\") wallet.\u00a0</p><p>Child recovery phrases are useful for any situation that requires creating a new wallet when you do not want to expose your parent recovery phrase. If an attacker compromises your child recovery phrase, they still can't learn your parent recovery phrase.</p><p>For example, let's say you want to create a hot wallet on the Blockstream app for convenient spending and do not want to expose your Jade recovery phrase to a phone. You can simply generate a new recovery phrase using a specific index number. Instead of needing to back up an entire 12 or 24 word recovery phrase, you only need to keep track of the index number and the parent recovery phrase to restore the child wallet.</p><h2 id=\"h_01JCP083QX9ZS52Z4S72M6S5X0\">Child Recovery Phrase Generation Process</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/429-7547.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">During an active Jade session, select <strong>Options</strong> \u2192 <strong>Wallet</strong> \u2192 <strong>BIP85</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Choose either a 12 or 24 word recovery phrase and enter your desired index number. Back up the recovery phrase which is derived from the current active wallet on Jade (including passphrase if used) and your selected index. If you ever need to view this recovery phase again, simply load the same wallet to Jade and enter the index number.</p>\n</div><p></p><p></p><div class=\"num-list-custom\">\u00a0</div>"}, "jade__create-a-recovery-phrase-using-dice": {"title": "Create a recovery phrase using dice", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>Your Jade allows users to enter the first 11 or 23 words of a BIP39 recovery phrase, and will automatically calculate possible options for their final word. This is helpful for users who want to generate entropy manually (such as by rolling dice) to create a recovery phrase, but still need a safe way to calculate valid final word options.</p><p>First, view our <a href=\"https://help.blockstream.com/hc/article_attachments/21328564164505\" target=\"_blank\" rel=\"noopener noreferrer\">downloadable guide to create a recovery phrase using dice rolls</a>. You will need it to refer to the lookup table for corresponding words based on your dice rolls. Then, use your Jade to calculate the final word.</p><blockquote><p><strong>Tip:</strong> Keep in mind that you can use any alternative method that requires final word calculation, and this feature is not limited to the method shown in the linked guide.</p></blockquote><h2 id=\"h_01J08YSPNPRVWG6B8P7PGBG7YN\">Calculating Final Word</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on Jade and choose one of the following paths:</p>\n</div><ul>\n<li>\n<strong>Setup Jade </strong>\u2192&nbsp;<strong>Advanced Setup</strong> \u2192 <strong>Restore Wallet</strong> \u2192 <strong>12/24 Words</strong>\n</li>\n<li>\n<strong>Options</strong> \u2192 <strong>Temporary Signer</strong> \u2192 <strong>12/24 Words</strong>\n</li>\n</ul><p><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-jade/add-more-security-functionality/create-a-recovery-phrase-using-dice/41927954891417.png#asset:5279:url\" alt=\"restorecalc.png\" /></p><div class=\"num-list-custom\">&nbsp;</div><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Enter the first 11 or 23 words of your user-generated recovery phrase, then select <strong>Calculate</strong> when prompted. The keyboard for the final word will restrict your entry only to valid options. The <strong>Existing</strong> path is used if you already have a 12th or 24th word and want to enter that specifically.</p>\n</div><blockquote><p><strong>Tip:</strong> The keyboard for the final word entry will automatically start on a random letter. After choosing 1-2 letters, Jade will display the remaining list of options and will also begin its selection on a random word. Simply click through the calculation section if you would like Jade to randomly select a final word for you.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-production-assets/content/blockstream-jade/add-more-security-functionality/create-a-recovery-phrase-using-dice/41927954892313.png#asset:5280:url\" alt=\"calc.png\" /></p><p>&nbsp;</p>"}, "jade__calculate-the-final-word-from-a-provided-recovery-phrase-entry": {"title": "Calculate the final word from a provided recovery phrase entry", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p><a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app#entry:560@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">Blockstream Jade</a> allows users to enter the first 11 or 23 words of a BIP39 recovery phrase, and will automatically calculate possible options for their final word. This is especially helpful for users who want to generate entropy manually (such as by rolling dice) to create a recovery phrase, but still need a safe way to calculate valid final word options.</p><blockquote><p><strong>Tip:</strong> Check out the <a href=\"https://help.blockstream.com/hc/article_attachments/16045675995417\" rel=\"noopener noreferrer\" target=\"_blank\">recovery phrase creation guide using dice rolls here</a>. Keep in mind that any alternative method that requires final word calculation can be used and this feature is not limited to the method shown in the link above.</p></blockquote><h2 id=\"h_01KC7X1Z9JP96P4ZYNNN9NJMZZ\">Calculate Final Word</h2><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/430-7665.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Turn on your Blockstream Jade and choose to Initialize and <strong>Recover</strong> a wallet, or click <strong>Advanced</strong> and select <strong>Recovery Phrase Login</strong> if your Jade is already initialized.</p>\n</div><p></p><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">From either the Recover wallet or Recovery Phrase Login flow, choose <strong>Advanced</strong> then <strong>select the recovery phrase length</strong> you would like to calculate a final word for.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Enter the first 11 or 23 words of your user-generated recovery phrase, then select <strong>Calculate</strong>. The keyboard for the final word will restrict your entry only to valid options.</p>\n</div><blockquote><p><strong>Tip:</strong> The keyboard for the final word entry will automatically start on a random letter. After choosing 1-2 letters, Jade will display the remaining list of options and will also begin it's selection on a random word. Simply click through the calculation section if you would like Jade to randomly select a final word for you.</p></blockquote><p></p><h2 id=\"h_01KC7X1Z9JJDC4J7K1R1AF9Q38\">Dice Roll Guide</h2>"}, "jade__back-up-a-multisig-configuration-on-jade": {"title": "Back up a multisig configuration on Jade", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>Jade has the ability to register and back up multisig configurations on the device, allowing for receive and change <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> verification. This also enables you to export stored configurations to your companion app so you can rebuild the multisig wallet in the event of file loss.</p><blockquote class=\"tip\"><p><strong>Tip:</strong> You can register up to eight 8-of-8 multisigs with Jade.</p></blockquote><h2 id=\"h_01HF4RM9Y268HZ5B8TE9P2WJR6\">Backing Up Your Multisig Configuration</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">On your <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">companion app</a>, set up a multisig wallet using Jade as one of the keys. Next, prompt Jade to register the wallet in one of the following ways depending on your communication method:</p>\n</div><ul>\n<li class=\"num-list-text\">\n<strong>USB:</strong> On your companion app, select to verify or display an address on Jade while your device is connected and active.</li>\n<li class=\"num-list-text\">\n<strong>QR:</strong>&nbsp;Find the option to <strong>Export</strong> your wallet configuration using QRs on your companion app, then scan the config using <strong>Scan QR</strong> on Jade during an active session.</li>\n</ul><blockquote class=\"note\"><p><strong>Note:</strong> For this example, we are using Sparrow. Refer to your specific platform's documentation on how to set up multisig, as the instructions will vary.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade/41927951754905.png\" alt=\"1.png\" /></p><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade/42025607247641.png\" alt=\"Screenshot 2025-01-06 at 10.26.24\u202fAM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Proceed through the involved signers on Jade and confirm the relevant information for each of them. Each field is selectable and you can view full screen if desired.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging
