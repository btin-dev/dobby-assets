-assets/content/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade/41927951755545.png\" alt=\"2.png\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade/41927951756825.png\" alt=\"3.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">After confirming the registration, Jade will be able to verify receive addresses for this wallet and will automatically validate change addresses during signing. You can view this record later by navigating to <strong>Options</strong> \u2192 <strong>Wallet</strong> \u2192 <strong>Registered Wallets</strong> during an active session.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade/41927951757721.png\" alt=\"4.png\" /></p><h2 id=\"h_01K59QCPS4BM4NQMGFY5AVCQV6\">Exporting Your Backup</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Log in to Jade and select <strong>Options</strong> \u2192 <strong>Wallet</strong> \u2192 <strong>Registered Wallets</strong>. Select the registered multisig file you would like to export.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade/42025635192217.png\" alt=\"5.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Choose <strong>Export</strong> on Jade and find the option to import a wallet on your companion app. Scan the QR codes using your companion device until it successfully reads the file and rebuilds the multisig wallet.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade/42025607254169.png\" alt=\"6.png\" /></p><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade/42025607256345.png\" alt=\"Screenshot 2025-01-06 at 10.27.39\u202fAM.png\" /></p><div class=\"num-list-custom\">&nbsp;</div>"}, "jade__disable-bluetooth": {"title": "Disable Bluetooth", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>Jade offers a Bluetooth connection for users to conveniently communicate with the Blockstream App on mobile devices. Bluetooth is <strong>disabled by default</strong> and you must enable it to turn it on.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/430-7841.png?v=13\"/></figure><p>Some users may prefer to turn off this communication method, so we offer two different ways to disable Bluetooth on Jade:</p><ol>\n<li>\n<strong>Unlock the Jade</strong> by either USB, Bluetooth or QR.\u00a0</li>\n<li>\n<strong>Turn off Bluetooth in Jade settings:</strong> If enabled, you can disable Bluetooth by navigating to <strong>Options</strong> \u2192 <strong>Device</strong> \u2192 <strong>Settings</strong> \u2192 <strong>Bluetooth</strong> when logged in to your Jade.</li>\n<li>\n<strong>Flash the \"No-Radio\" firmware variant to Jade:</strong> When upgrading Jade, you will be presented with a \"<a href=\"https://jadefw.blockstream.com/upgrade/download.html\" rel=\"noopener noreferrer\" target=\"_blank\">No-Radio</a>\" firmware option. This firmware version does not include any of the drivers needed to communicate via Bluetooth, rendering the radio hardware useless. This option should be chosen for users who do not want Jade to be capable of communicating wirelessly at all.</li>\n</ol><div class=\"callout callout--warning\"><p>To enable or disable Bluetooth in the Jade settings, your Jade must be in an <strong>unlocked state</strong>. If your Jade displays \"Unlock Jade\" on the screen, you will need to unlock it first before you can access or modify the Bluetooth settings.</p></div>"}, "jade__manually-verify-firmware-binary": {"title": "Manually verify firmware binary", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>If you use <a href=\"https://store.blockstream.com/products/jadelink-air-gapped-usb-drive\" target=\"_blank\" rel=\"noopener noreferrer\">JadeLink</a> or perform updates locally via the upgrade script, you can ensure the update's firmware file matches the official firmware released by Blockstream.</p><h2 id=\"h_01K4WV9VPSXGSWQ8H77RPG62Y7\">For JadeLink Users</h2><ol>\n<li>Download and unzip the <a href=\"https://jadefw.blockstream.com/upgrade/download.html\" target=\"_blank\" rel=\"noopener noreferrer\">firmware binary</a>.</li>\n<li>Open Terminal and run <code>shasum -a 256 path/to/.bin/file</code>.</li>\n<li>Check the resulting hash against the list of published hashes here according to your firmware version.&nbsp;<br><br>The <code>cmphash</code> should match the result from Terminal:<ul>\n<li><a href=\"https://jadefw.blockstream.com/bin/jade2.0/index.json\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Plus</a></li>\n<li><a href=\"https://jadefw.blockstream.com/bin/jade1.1/index.json\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Classic</a></li>\n</ul>\n</li>\n</ol><h2 id=\"h_01K4WV9YJ9BDN1T2YKNA9H6BX7\">For Upgrade Script Users</h2><ol>\n<li>Clone the <a href=\"https://github.com/Blockstream/Jade\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream Jade repo</a>.</li>\n<li>Make sure to <a href=\"https://github.com/Blockstream/Jade/tree/master?tab=readme-ov-file#set-up-the-environment\" target=\"_blank\" rel=\"noopener noreferrer\">set up the environment</a>.&nbsp;</li>\n<li>Open terminal and from the Jade directory run <code>./update_jade_fw.py</code>.<br><br>Use the <code>--release</code> flag to choose from previous or beta firmware releases instead of the latest</li>\n<li>When asked to save a copy of downloaded firmware, type <code>y</code>.</li>\n<li>Run <code>shasum -a 256 path/to/.bin/file</code>\n</li>\n<li>Check the resulting hash against the list of published hashes here according to your firmware version.&nbsp;<br><br>The <code>cmphash</code> should match the result from Terminal:<ul>\n<li><a href=\"https://jadefw.blockstream.com/bin/jade2.0/index.json\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Plus</a></li>\n<li><a href=\"https://jadefw.blockstream.com/bin/jade1.1/index.json\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Classic</a></li>\n</ul>\n</li>\n</ol><h3 id=\"h_01K4WWP2ZG236JWAYDFR1MFCKQ\">Note: Uncompressed Firmware</h3><p>The above instructions are for compressed firmware files. If you wish to verify an uncompressed firmware file, you can run the following command instead:</p><pre class=\"wysiwyg-code-block\"><code class=\"language-plaintext\">printf \"\\x1f\\x8b\\x08\\x00\\x00\\x00\\x00\\x00\" | cat - path/to/.bin/file | gzip -qdc 2&gt;/dev/null | shasum -a 256</code></pre><p>In this case, you will be checking that the <code>fwhash</code> matches instead of the <code>cmphash</code>.</p><p>&nbsp;</p>"}, "jade__set-up-a-personal-blind-oracle": {"title": "Set up a personal blind oracle", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<blockquote><p>This is a preliminary, basic guide. More to come soon.</p><p>Jade uses a unique security model to protect your device from physical attacks by communicating with a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a> to unlock your device, essentially functioning as a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">virtual secure element</a>. By default, Jade will communicate with Blockstream's blind PIN oracle, however you also have the choice to run your own. This guide is recommended for more technical users who are comfortable with command-line, though it should be fairly simple to set up for varying skill levels.</p><blockquote class=\"note\"><p><strong>Note:&nbsp;</strong>This guide follows the basic process for setting up a personal PIN server on a Mac, however, the process should be fairly similar for other devices as well. You can only unlock Jade with this device if you follow these instructions, while more advanced users should understand how to set up a blind PIN server for remote access (via Tor to a Raspberry Pi for example), by adjusting the <code>--set-url</code> argument found in the python script below.</p></blockquote><h2 id=\"h_01J0V8DZ28JRQAVCRFPKP29M3X\">\n<a href=\"https://glossary.blockstream.com/blind-oracle/\" target=\"_blank\" rel=\"noopener noreferrer\">Blind Oracle</a> Setup Process</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Open a terminal window on the device you would like to run your blind oracle on and enter the following:</p>\n</div><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">$ git clone https://github.com/Blockstream/blind_pin_server.git\n$ cd blind_pin_server</code></pre><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Next, generate a new key using this command:</p>\n</div><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">$ python3 -m venv venv\n$ . venv/bin/activate\n$ pip install --require-hashes -r requirements.txt\n$ PYTHONPATH=.. python -m blind_pin_server.generateserverkey</code></pre><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Run this command to build the docker image:</p>\n</div><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">$ docker build -f Dockerfile . -t dockerized_pinserver</code></pre><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Next, prepare a PIN directory:</p>\n</div><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">$ mkdir pinsdir</code></pre><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Run the docker image (copy all of the following and paste in <strong>one line</strong>):</p>\n</div><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">$ docker run -v $PWD/server_private_key.key:/server_private_key.key -v $PWD/pinsdir:/pins -p 8096:8096 dockerized_pinserver</code></pre><h2 id=\"h_01J0V8DZ28S6J116CBSMQA9CA1\">Point Jade to Personal Blind Oracle</h2><p>Jade will need to be uninitialized in order to set a new blind oracle. If your Jade is already set up, you will need to perform a <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/perform-a-factory-reset#entry:779@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">factory reset</a> and <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/restore-recovery-phrase-to-jade#entry:1040@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">restore using your recovery phrase</a>.<strong> Your funds will be lost if you do not have the correct backup materials.</strong></p><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Open a new terminal window and enter the following:</p>\n</div><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">$ git clone https://github.com/Blockstream/Jade.git\n$ cd Jade</code></pre><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Plug in your uninitialized Jade and enter the command below:</p>\n</div><pre class=\"wysiwyg-code-block\"><code class=\"language-auto\">$ python3 set_jade_pinserver.py --serialport &lt;ENTERJADESERIALPORT&gt; --set-pubkey ../blind_pin_server/server_public_key.pub --set-url http://127.0.0.1:8096</code></pre><blockquote><p><strong>Tip:</strong> You can find the system location to enter for the --serialport argument on the Devices tab of the Blockstream app. For example: <code>--serialport /dev/cu.usbserial-01ETCB87</code>. Make sure to close the app afterwards otherwise you will be unable to run the command above.</p></blockquote><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\"><strong>Confirm</strong> your pubkey and URL on Jade's screen. Your Jade will now communicate with the PIN server running on your device instead of Blockstream's. Then, if you are able to initialize Jade and enter a PIN, everything is set up properly.&nbsp;</p>\n</div><blockquote class=\"note\"><p><strong>Note: </strong>If you experience errors when setting your PIN, you may factory reset your device to return to using the default Blockstream blind PIN server.</p></blockquote></blockquote>"}, "jade__set-up-a-personal-blind-oracle-with-umbrel": {"title": "Set up a personal blind oracle with Umbrel", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<blockquote class=\"note\"><p><strong>Note:</strong> This application is currently in beta and should only be attempted by those who are confident of their wallet recovery process.</p><p>Jade uses a powerful security model to protect your device from physical attacks by communicating with a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/jade-security-model-faqs#entry:402@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a> to unlock your device. A <a href=\"https://glossary.blockstream.com/blind-oracle/\" target=\"_blank\" rel=\"noopener noreferrer\">blind oracle</a> functions as a&nbsp;<a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">virtual secure element</a> and instead holds the decryption mechanism to your wallet off-device, which makes Jade <strong>invulnerable</strong> to physical key extraction. This is unlike typical secure element hardware devices, which hold everything needed to extract your keys on the actual device itself.</p><p>By default, Jade communicates with Blockstream's blind oracle, however you also have the choice to run your own if you'd like. The following guide covers a simple personal oracle setup using Umbrel, however more advanced users can <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle#entry:1199@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">follow our alternative guide</a> to run this on other software.</p><h2 id=\"h_01HBGPGE7V58ZZA6BFDCMXQKGQ\">Pre-Requisites</h2><ul>\n<li>A machine running <a href=\"https://umbrel.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Umbrel</a>\n</li>\n<li>An uninitialized Blockstream Jade<ul><li>If your Jade is already initialized, you will need to perform a <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/perform-a-factory-reset#entry:779@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">factory reset</a>.</li></ul>\n</li>\n<li>Knowledge of Tailscale and/or using Tor<ul><li>Tailscale is <strong>recommended</strong> for maximum reliability. Make sure the <a href=\"https://tailscale.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Tailscale</a> app is installed and enabled on Umbrel <strong>and</strong> any devices you want to connect Jade to before continuing.</li></ul>\n</li>\n</ul><h2 id=\"h_01HBGPGE7VDDRNPCQEGP8YZSPA\">Current Limitations</h2><p>The following functionality is not currently available if you run a personal blind oracle:</p><ul>\n<li>Accessing Jade using QR PIN Unlock</li>\n<li>Upgrading Jade using the <a href=\"https://jadefw.blockstream.com/upgrade/fwupgrade.html\" target=\"_blank\" rel=\"noopener noreferrer\">web portal</a>\n</li>\n<li>Switching between Tor and clearnet/Tailscale connections when using <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">third-party apps</a><ul><li>You will need to choose either Tor or Tailscale as your primary URL when unlocking Jade with apps that are not the native Blockstream app. The Blockstream app can use your alternate URL as a fallback.</li></ul>\n</li>\n</ul><h2 id=\"h_01HA4PE0VFC1DHW954FTHESHV7\">Personal Oracle Setup Process</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Navigate to the Umbrel App Store and install the Blockstream <strong>Blind Oracle</strong> app.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle-with-umbrel/41928161473049.png\" alt=\"Screenshot 2024-12-05 at 3.34.41\u202fPM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Open the Blind Oracle app to view your oracle details. The default URL is your onion address, however if you have Tailscale set up, we recommend pasting the following into your browser address bar to set Tailscale as the default.</p>\n</div><ul><li>http://umbrel.local:3344/?urla=umbrel&amp;urlb=[insert onion address]</li></ul><blockquote><p><strong>Tip:</strong> Using the above URL will allow you to unlock Jade while on the local network, as well as remotely if Tailscale is installed on your device (for example your phone that is running the Blockstream app).</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle-with-umbrel/41928161478937.png\" alt=\"Screenshot 2024-12-05 at 3.36.39\u202fPM.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Turn on Jade and access the boot menu by clicking (<strong>not holding</strong>) the center button once while the logo screen is showing. Select <strong>Blind Oracle</strong> \u2192 <strong>Scan Oracle QR</strong>. Confirm the on-screen details and continue setting up Jade with PIN on your preferred companion app. Your Jade will now communicate with your personal blind oracle in order to initialize and unlock your device.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle-with-umbrel/41928156255129.png\" alt=\"1.png\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle-with-umbrel/41928161480985.png\" alt=\"2.png\" /></p><blockquote class=\"note\"><p><strong>Note:</strong> If you have trouble connecting to your personal oracle, you can factory reset Jade to reconnect to Blockstream's oracle.</p></blockquote></blockquote>"}, "jade__use-cases-for-temporary-signer": {"title": "Use cases for Temporary Signer", "cat": "Blockstream Jade", "section": "Add More Security & Functionality", "html": "<p>Jade's <strong>Temporary Signer</strong> feature allows you to temporarily access a wallet, ideally by scanning a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/what-is-a-seedqr#entry:1099@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">SeedQR</a>. This will not affect your PIN-accessible wallet, and Jade will forget the Temporary Signer wallet as soon as you turn off your Jade.</p><p><a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/use-jade-as-a-stateless-signing-device#entry:400@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">View our guide</a> to learn how to use Temporary Signer for stateless signing.</p><blockquote class=\"note\"><p><strong>Note:</strong> Users typically leverage Temporary Signer to bypass <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">PIN server</a> interaction, which can be helpful for the situations described below.</p></blockquote><h3 id=\"h_01K6DH3FGNGDJTWSZX6WXZM4R8\">Access a QR Session</h3><p>People who use Jade's <strong>Scan QR</strong> feature are typically trying to avoid USB and Bluetooth connections, which are currently the only available methods to unlock Jade via PIN. In order to access Jade for air-gapped functions, Temporary Signer is necessary.</p><blockquote><p><strong>Tip:</strong> View <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-plus-air-gapped-with-seedqr#entry:765@1:url\">this guide</a> for more information about accessing a QR session.</p></blockquote><h3 id=\"h_01K6DH3FGNDT2X3RWK4G584AHQ\">Signing with Jade Connected to an Offline Device</h3><p>Jade uses a <a href=\"https://help.blockstream.com/blockstream-jade/faqs/how-does-jade-protect-my-recovery-phrase-with-a-blind-oracle#entry:179@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">blind PIN server</a> to help protect your assets, which essentially functions as a \"remote secure element\". This feature provides additional security, but it requires your <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">companion app</a> to have communication with the PIN server (and thus an internet connection) in order to log in to your Jade.</p><p>However, some users may want to use an <strong>offline device</strong>&nbsp;to create and sign transactions. Choosing to access a wallet using Temporary Signer will not require communication with the PIN server, so you can still use your Jade in such a setup. Simply create your transaction using a compatible platform (such as <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum#entry:426@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Electrum</a>), log in to your Jade using Temporary Signer, sign the transaction on your Jade, then save or export the transaction from your companion app for broadcasting using an online device.</p><h3 id=\"h_01K6DH3FGNAZ0XEQ66R9V6EBNQ\">Temporary/Multiple Wallet Access</h3><p>There could be several reasons you may prefer to only access your wallets temporarily. For example:</p><ul>\n<li>If you only log in using this feature and never fully initialize your Jade, it will appear to anyone who finds your Jade that you do not have a wallet set up. This provides some obfuscation as your wallet is actually only accessible using your recovery phrase backup.</li>\n<li>You may choose to set up a wallet via PIN, but also keep a separate wallet only as a recovery phrase backup that you may log in to using this feature to spend funds.</li>\n<li>If you have multiple recovery phrases, <strong>you can access them all using one Jade</strong> without the hassle of factory resetting your device and erasing the current wallet before using the next one.</li>\n</ul><h3 id=\"h_01K6DH3FGN8QS7JRTV45E3XNCC\">PIN Server Outage</h3><p>In the unlikely event your Jade's PIN server were to ever experience an outage, you would not be able to unlock Jade using the typical PIN entry method. Instead, you can use Temporary Signer to access Jade and spend any funds in an emergency situation.</p><blockquote><p><strong>Tip:</strong> Jade also allows you to <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/set-up-a-personal-blind-oracle#entry:1199@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">run and specify your own PIN server</a> so you are not dependent on Blockstream, however this requires some additional technical expertise to set up.</p></blockquote>"}, "jade__best-platforms-for-jade-plus-qr-scan": {"title": "Best platforms for Jade Plus QR Scan", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p>\n    <a href=\"https://store.blockstream.com/products/jade-plus\" target=\"_blank\" rel=\"noopener noreferrer\">Jade Plus</a> QR Scan allows users to communicate with a companion app solely using QR codes. Each compatible platform has several <strong>benefits</strong> and <strong>tradeoffs</strong>, and users may find certain platforms more favorable to use for different circumstances.\n</p>\n<blockquote class=\"note\">\n    <p>\n        <strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR. To send or receive Liquid assets, connect Jade to the Blockstream app using USB or Bluetooth.\n    </p>\n</blockquote>\n<div class=\"mobile_table_scroll\">\n    <figure class=\"wysiwyg-table wysiwyg-table-align-left\">\n        <figure class=\"table\">\n            <table class=\"docutils align-default\" id=\"overflow-table\">\n                <thead>\n                    <tr class=\"row-odd\">\n                        <th style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                PLATFORM\n                            </p>\n                        </th>\n                        <th class=\"head\" style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                BEST FOR\n                            </p>\n                        </th>\n                        <th style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                BENEFITS\n                            </p>\n                        </th>\n                        <th style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                TRADEOFFS\n                            </p>\n                        </th>\n                    </tr>\n                </thead>\n                <tbody>\n                    <tr>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/use-jade-plus-qr-scan-with-nunchuk#entry:545@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/best-platforms-for-jade-plus-qr-scan/12152738199833.png\" alt=\"nunchuk.png\" />Nunchuk</a>\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Optimal Jade Plus QR experience on mobile\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Advanced multisig setups along with singlesig support\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Collaborative wallet features\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Unique security model options with inheritance planning\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Camera auto-focus\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Error correction frames to improve scanning experience\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Nunchuk mitigates tradeoffs of using small phone screens by providing QR density options to improve scanning\n                            </p>\n                        </td>\n                    </tr>\n                    <tr>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/use-jade-plus-qr-scan-with-specter#entry:685@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/best-platforms-for-jade-plus-qr-scan/12152736449689.png\" alt=\"specter.png\" />Specter</a>\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Optimal Jade Plus QR experience on desktop\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Large multisig transactions with many inputs and/or outputs\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Resizable QR PSBTs are easily scanned by Jade's camera\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Uses error correction frames for quicker scanning\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                May require a good laptop/desktop camera or use <a href=\"https://support.apple.com/en-us/HT213244\" target=\"_blank\" rel=\"noopener noreferrer\">Continuity Camera</a> and similar alternatives for improved performance\n                            </p>\n                        </td>\n                    </tr>\n                    <tr class=\"row-even\">\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/use-jade-plus-qr-scan-with-bluewallet#entry:811@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/best-platforms-for-jade-plus-qr-scan/12152648684313.png\" alt=\"blue.png\" />BlueWallet</a>\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Spending on-the-go using mobile app\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Medium sized transactions\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Can be paired with high quality phone camera allowing for quick scans from Jade\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Coin selection to ensure smaller transaction sizes which are more easily scanned\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Small phone screen is not as ideal to scan from\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                No error correction frames so large transactions may be difficult to read\n                            </p>\n                        </td>\n                    </tr>\n                    <tr class=\"row-odd\">\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow#entry:961@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/best-platforms-for-jade-plus-qr-scan/12152651793177.png\" alt=\"sparrow.png\" />Sparrow</a>\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                Medium to large transaction sizes\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                HD Capture for improved scanning and ability to change to a higher resolution camera, such as a mobile phone\n                            </p>\n                            <p class=\"wysiwyg-text-align-center\">\n                                Uses error correction frames for quicker scanning and provides QR density settings\n                            </p>\n                        </td>\n                        <td style=\"padding:1px;\">\n                            <p class=\"wysiwyg-text-align-center\">\n                                May require a high quality laptop/desktop camera for scanning, if not using in conjunction with a mobile phone's camera\n                            </p>\n                        </td>\n                    </tr>\n                </tbody>\n            </table>\n        </figure>\n    </figure>\n</div>"}, "jade__compatible-services-with-jade": {"title": "Compatible services with Jade", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p>In addition to wide-ranging compatibility with <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/download-a-companion-app-for-jade#entry:340@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">popular companion apps</a>, Blockstream Jade can easily connect to many different services that facilitate collaborative custody, exchange withdrawal, and more.</p><p>Below is a list of Jade-supported services. Click on the provided links to learn more:</p><figure class=\"wysiwyg-table wysiwyg-table-align-left\" style=\"width:100%;\"><figure class=\"table\"><table style=\"border-collapse:collapse;\"><tbody><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><strong>Service</strong></td><td style=\"height:22px;text-align:center;width:10.1905%;\"><strong>Connection</strong></td><td style=\"height:22px;text-align:center;width:39.5715%;\"><strong>Type</strong></td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://www.swanbitcoin.com/vault/\" target=\"_blank\" rel=\"noopener noreferrer\">Swan Vault</a></td><td style=\"height:22px;text-align:center;width:10.1905%;\">USB</td><td style=\"height:22px;text-align:center;width:39.5715%;\">Collaborative Custody</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://btcpayserver.org/\" target=\"_blank\" rel=\"noopener noreferrer\">BTCPay Server</a></td><td style=\"height:22px;text-align:center;width:10.1905%;\">USB</td><td style=\"height:22px;text-align:center;width:39.5715%;\">Payment Processing</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://sideswap.io/\" target=\"_blank\" rel=\"noopener noreferrer\">SideSwap</a></td><td style=\"height:22px;text-align:center;width:10.1905%;\">USB</td><td style=\"height:22px;text-align:center;width:39.5715%;\"><a href=\"https://glossary.blockstream.com/layer-2/\" target=\"_blank\" rel=\"noopener noreferrer\">Layer-2</a> Asset Trading</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://nunchuk.io/individuals\" target=\"_blank\" rel=\"noopener noreferrer\">Nunchuk</a></td><td style=\"height:22px;text-align:center;width:10.1905%;\">QR</td><td style=\"height:22px;text-align:center;width:39.5715%;\">Collaborative Custody</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://wizardsardine.com/liana/plans/\" target=\"_blank\" rel=\"noopener noreferrer\">Liana</a></td><td style=\"height:22px;text-align:center;width:10.1905%;\">USB</td><td style=\"height:22px;text-align:center;width:39.5715%;\">Inheritance Plan</td></tr><tr style=\"height:22px;\"><td style=\"height:22px;width:16.6667%;\"><a href=\"https://getbittr.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Bittr</a></td><td style=\"height:22px;text-align:center;width:10.1905%;\">USB</td><td style=\"height:22px;text-align:center;width:39.5715%;\">Bitcoin Exchange</td></tr><tr><td><a href=\"https://unchained.com\" target=\"_blank\" rel=\"noopener noreferrer\">Unchained</a></td><td style=\"text-align:center;\">USB</td><td style=\"text-align:center;\">Collaborative Custody</td></tr></tbody></table></figure></figure>"}, "jade__use-jade-with-electrum": {"title": "Use Jade with Electrum", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p><a href=\"https://electrum.org/#home\" target=\"_blank\" rel=\"noopener noreferrer\">Electrum</a> is a popular Bitcoin wallet that supports Jade. Electrum's focus is on simplifying Bitcoin and on fast operation with low resource usage.</p><p>Before beginning, ensure you have <a href=\"https://help.blockstream.com/blockstream-jade/set-up-transact-recover-your-wallet/jade-overview#entry:198@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">initialized</a> your Jade device. Review <a style=\"background-color:#ffffff;font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" href=\"https://electrum.readthedocs.io/en/latest/\" target=\"_blank\" rel=\"noopener noreferrer\">Electrum's documentation</a><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"> to further understand the platform. Do not proceed without understanding how Electrum works.</span></p><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\"><a href=\"https://electrum.org/#download\" target=\"_blank\" rel=\"noopener noreferrer\">Download</a> Electrum.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum/9369871431833.png\" alt=\"1.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Enter a name then click <strong>Next</strong> to create a new wallet.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum/9373342292505.png\" alt=\"2.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Choose the <strong>type</strong> of wallet you would like to create, then click <strong>Next</strong>. If you are not sure which option to select, choose <strong>Standard wallet</strong>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum/9373403661081.png\" alt=\"3.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Select to <strong>Use a hardware device</strong> and connect your <strong>Blockstream Jade via USB</strong>.</p>\n</div><blockquote><p><strong>Tip:</strong> Before connecting your Jade, make sure the Blockstream app is not open. If it is, this may cause issues preventing Electrum from detecting your Jade.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum/9373420649113.png\" alt=\"4.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Choose your Jade from the list of hardware devices then click <strong>Next</strong>. You will then be prompted to <strong>enter your PIN</strong> on Jade.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum/9373446438681.png\" alt=\"5.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">Select your desired<strong> <a href=\"https://glossary.blockstream.com/address-bitcoin/\" target=\"_blank\" rel=\"noopener noreferrer\">address</a> type</strong> and <strong>derivation path.</strong> After clicking <strong>Next</strong>, you will be asked whether or not you would like to encrypt your wallet. If you would like to view your transactions without Jade plugged in, choose not to encrypt your wallet.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If you have previously used Jade as a singlesig wallet with the Blockstream app and would like to view your transactions in Electrum, make sure the address type matches the account type that contains your funds in the Blockstream app. You will also need the derivation path to match as well.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum/9373524444313.png\" alt=\"6.png\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">7.</p>\n<p class=\"num-list-text\">You have now successfully set up your wallet and you can begin <strong>receiving</strong>, <strong>storing</strong>, and <strong>spending</strong> your bitcoin using Electrum and Jade.</p>\n</div><blockquote><p><strong>Tip:</strong> If you were previously using Jade with the Blockstream app as a <a href=\"https://help.blockstream.com/blockstream-jade/add-more-security-functionality/back-up-a-multisig-configuration-on-jade#entry:1128@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Multisig Shield</a> wallet, you should <strong>not</strong> expect your new Electrum wallet to show the same balance\u2014these are different wallets. To access your Multisig Shield wallet again, simply connect your Jade back to the Blockstream app.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-electrum/9373600991385.png\" alt=\"7.png\" /></p>"}, "jade__use-jade-plus-qr-scan-with-nunchuk": {"title": "Use Jade Plus QR Scan with Nunchuk", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p>Jade Plus's QR Scan functionality allows it to be used with Nunchuk, a popular mobile Bitcoin application. Nunchuk offers unique multi-user collaborative wallets and encrypted messaging in-app.</p><blockquote class=\"note\">\n<strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR.</blockquote><div class=\"num-list-custom\"><p class=\"num-list-text\">Prior to setup, prepare Jade Plus for <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock#entry:549@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">QR Mode</a>. Then <a href=\"https://nunchuk.io/\" rel=\"noopener noreferrer\" style=\"background-color:#ffffff;font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" target=\"_blank\">download</a> Nunchuk<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">.</span></p></div><p>You will first need to set up Jade Plus as a key in order to use it with a Nunchuk wallet.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-30.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Unlock Jade Plus, ideally by <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock#entry:549@1:url\" rel=\"noopener noreferrer\" target=\"_blank\"><strong>accessing QR mode</strong></a>.</p>\n</div><p> </p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Navigate to <strong>Options </strong>\u2192\u00a0<strong>Wallet</strong> \u2192 <strong>Export Xpub</strong>. Jade will then display your xpub as an animated QR code.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> The default path is m/84'/0'/0', which is used for singlesig, Native SegWit wallets. If you would like, you may change this path to Nested SegWit (m/49'/0'/0') by selecting Options.</p></blockquote><p> </p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Open Nunchuk and choose to <strong>Add a key</strong>, then select <strong>Add air-gapped key</strong>.</p>\n</div><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-31.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\"><strong>Name</strong> your key and select <strong>Scan QR</strong>. Scan the QR code shown on Jade using Nunchuk, then choose <strong>Add key</strong> once the data is imported.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Return to the home screen and select to <strong>Add a wallet</strong> then choose to <strong>Create a wallet</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\"><strong>Name</strong> your wallet and match the <strong><a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a> type</strong> to the xpub you decided to export. Choose <strong>Native Segwit</strong> for m/84'/0'/0' and <strong>Nested Segwit</strong> for m/49'/0'/0'.\u00a0<br/><br/>This guide covers setting up a Singlesig wallet, so add Jade Plus as a <strong>key</strong> for your wallet and leave the required keys option as <strong>1</strong>. Review and confirm your wallet details, then your wallet will be successfully set up.</p>\n</div><blockquote class=\"warning\"><p><strong>Warning:</strong> If you do not match the address type with your xpub path, <strong>the correct wallet will not be generated</strong>.</p></blockquote><p></p><h2 id=\"h_01GG5GKM5DV3WJT8HGWRCCT83Z\">Receive Bitcoin</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\"><strong>Select</strong> your newly created wallet and choose <strong>Receive</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">From the Jade Plus home screen, navigate to <strong>Scan QR </strong>and point its camera at your Nunchuk Bitcoin address QR code.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Once the address is recognized by Jade Plus, <strong>confirm</strong> it matches the address shown on Nunchuk and select <strong>Yes</strong> to continue. <span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Jade Plus will <strong>check</strong> if the address does indeed belong to your wallet.</span></p>\n</div><p> </p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">After the address is verified, <strong>share</strong> it with the sender to receive your funds.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If Jade Plus is unable to verify your address, this does <strong>not</strong> necessarily mean there is malicious activity involved. Make sure to review our <a rel=\"noopener noreferrer\" target=\"_blank\">address verification guide</a> for more tips on how this process works and common troubleshooting steps.</p></blockquote><p></p><h2 id=\"h_01GG5GKSZBAXPRX6PZQ93ZEY2V\">Send Bitcoin</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Navigate to your wallet and select <strong>Send</strong>. Enter your intended <strong>amount</strong> and recipient <strong>address</strong> and choose to create your <strong>transaction</strong>. Then, select <strong>Sign</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">In order to display and sign your Partially Signed Bitcoin Transaction (PSBT), select <strong>Export transaction</strong> then choose <strong>Jade format</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Select <strong>Scan QR </strong>on your Jade Plus and <strong>point</strong> the camera at the QR PSBT. Jade Plus will need to capture every frame that is displayed to continue. Change the <strong>density options</strong> to improve scanning performance.</p>\n</div><blockquote><p><strong>Tip:</strong> The progress bar will fill up as you successfully scan new frames. If the progress bar is not updating, change Jade Plus's angle or distance from the QR until you find the optimal placement for scanning. <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">View more scanning tips</a><strong>.</strong></p></blockquote><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Once Jade Plus has successfully read the PSBT, it will display the transaction details on your device for you to <strong>review</strong> and <strong>confirm</strong>.</p>\n</div><p> </p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">Jade Plus will then <strong>display</strong> your signed transaction as a series of QR codes. Select <strong>Sign</strong> once more, <strong>Import signature</strong>, then choose <strong>Jade format</strong>. <strong>Scan</strong> Jade Plus's screen with Nunchuk until all frames have been captured.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">After Nunchuk has successfully scanned the signed transaction, select <strong><a href=\"https://glossary.blockstream.com/broadcast-transaction/\" rel=\"noopener noreferrer\" target=\"_blank\">Broadcast transaction</a></strong> to broadcast it to the network.</p>\n</div><p></p>"}, "jade__use-jade-plus-qr-scan-with-specter": {"title": "Use Jade Plus QR Scan with Specter", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p><a href=\"https://specter.solutions/\" rel=\"noopener noreferrer\" target=\"_blank\">Specter</a> is a convenient and user-friendly GUI built around <a href=\"https://glossary.blockstream.com/bitcoin-core/\" rel=\"noopener noreferrer\" target=\"_blank\">Bitcoin Core</a>, with a focus on multisignature setups with hardware wallets and air-gapped devices. The following guide covers using Jade with Specter in a <strong>fully air-gapped</strong> manner, however a USB connection is also supported.</p><blockquote class=\"note\"><p><strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR.</p></blockquote><div class=\"num-list-custom\"><p class=\"num-list-text\">Prior to setup, prepare Jade Plus for <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock#entry:549@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">QR Mode</a>. Then <a href=\"https://specter.solutions/\" rel=\"noopener noreferrer\" style=\"background-color:#ffffff;font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" target=\"_blank\">download</a> Specter<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">.</span></p></div><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-30.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Unlock Jade Plus, ideally by <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-plus-air-gapped-with-seedqr#entry:765@1:url\" rel=\"noopener noreferrer\" target=\"_blank\"><strong>accessing QR mode</strong></a>.</p></div><p> </p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Navigate to <strong>Options</strong> \u2192 <strong>Wallet</strong> \u2192 <strong>Export Xpub</strong>. Jade will then display your xpub as an animated QR code.</p></div><blockquote class=\"note\"><p><strong>Note:</strong> The default xpub shown is for singlesig, Native SegWit wallets. If you would like, you may change the path to Nested SegWit (m/49'/0'/0') by selecting <strong>Options</strong>.</p></blockquote><p> </p><div class=\"num-list-custom\"><p class=\"num-list-text\"><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">3. </span>Open Specter and <strong>add a new device</strong>, then choose <strong>Jade</strong>.</p></div><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-31.png?v=13\"/></figure><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Select <strong>Scan QR code</strong> and scan the xpub QR from Jade Plus's screen using Specter. Once scanned, Specter will automatically detect which key was displayed. Click <strong>Continue</strong> once you are ready. You may repeat this step to upload each relevant key by changing the xpub that is shown by choosing <strong>Options</strong> on Jade's Export Xpub screen.</p></div><blockquote><p><strong>Tip:</strong> Older versions of Specter may not show the Scan QR code option on Jade. To resolve this, return to the device selection screen and simply select to add a <strong>Keystone</strong>. You may then follow the flow as usual with your Jade, it does not matter that the device does not match.</p></blockquote><p></p><div class=\"num-list-custom\"><p class=\"num-list\">5.</p><p class=\"num-list-text\">Next follow the prompts to select your desired wallet and script types, then click <strong>Create wallet</strong>.</p></div><p></p><h2 id=\"h_01GGG3S2THR8M2KH948BNMVXHJ\">Send Bitcoin</h2><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Choose the <strong>Send</strong> option in the top menu bar, then enter your recipient's <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\"><strong>address</strong></a>\u00a0and the <strong>intended</strong> amount. Select <strong>Create unsigned transaction</strong> to continue.</p></div><p></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Next, select to sign with your Jade Plus, then choose <strong>Sign with QR codes</strong> to view the PSBT in this format. Navigate to the <strong>QR</strong> <strong>Scan</strong> function on your Jade Plus and point the camera at the QR codes. Jade will need to capture every frame that is displayed to continue.</p></div><blockquote><p><strong>Tip:</strong> The progress bar will fill up as you successfully scan new frames. If the progress bar is not updating, change Jade Plus's angle or distance from the QR until you find the <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">optimal placement</a> for scanning. Specter also allows you to <strong>increase the size</strong> of the displayed QR, which will allow for a faster scan with Jade.</p></blockquote><p></p><div class=\"num-list-custom\"><p class=\"num-list\">3.</p><p class=\"num-list-text\">Once Jade Plus has successfully read the PSBT, it will display the transaction details on your device for you to <strong>review</strong> and <strong>confirm</strong>.\u00a0</p></div><p> </p><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Jade Plus will then <strong>display</strong> your signed transaction as a series of QR codes. Click <strong>Scan signed transaction</strong> and scan Jade Plus's screen with Specter until all frames have been captured.</p></div><blockquote><p><strong>Tip:</strong> For a better scan experience, you may also adjust the <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">QR settings</a> on Jade.</p></blockquote><p></p><div class=\"num-list-custom\"><p class=\"num-list\">5.</p><p class=\"num-list-text\">After Specter has successfully scanned back the signed transaction, select <strong>Send transaction</strong> and your bitcoin will be sent.</p></div><p></p>"}, "jade__use-jade-plus-qr-scan-with-bluewallet": {"title": "Use Jade Plus QR Scan with BlueWallet", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p>Jade Plus's QR Scan functionality allows it to be used with BlueWallet, a popular mobile Bitcoin application. BlueWallet offers a simple interface while also providing the option for advanced features.</p><blockquote class=\"note\">\n<strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR.</blockquote><div class=\"num-list-custom\"><p class=\"num-list-text\">Prior to setup, prepare Jade Plus for <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock#entry:549@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">QR Mode</a>. Then <a href=\"https://bluewallet.io/\" rel=\"noopener noreferrer\" style=\"background-color:#ffffff;font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" target=\"_blank\">download BlueWallet</a><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">.</span></p></div><p>In order to receive bitcoin and create transactions for Jade Plus to sign, your Jade Plus will need to be set up for watch-only functionality with BlueWallet first. This process only <strong>needs to be done once</strong> for each device you use Jade Plus as a signer on.</p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-30.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Unlock Jade Plus, ideally by <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock#entry:549@1:url\" rel=\"noopener noreferrer\" target=\"_blank\"><strong>accessing QR mode</strong></a>.</p>\n</div><p> </p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Navigate to <strong>Options</strong> \u2192 <strong>Wallet</strong> \u2192<strong> Export Xpub</strong>. Jade will then display your xpub as an animated QR code.</p>\n</div><blockquote class=\"warning\"><p><strong>Warning:</strong> We <strong>do not recommend</strong> changing the default settings unless you are absolutely certain of the implications of selecting Wrapped Segwit or Multisig, as this may cause you to create the incorrect wallet.</p></blockquote><p> </p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\"><a href=\"https://bluewallet.io/\" rel=\"noopener noreferrer\" target=\"_blank\">Open BlueWallet</a> and select <strong>Add a wallet</strong>, then select <strong>Import wallet</strong>.</p>\n</div><p></p><figure class=\"image grp staged\"><img alt=\"\" src=\"_staging/471-31.png?v=13\"/></figure><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\"><strong>Scan</strong> the animated QR code shown on Jade using BlueWallet. BlueWallet will show a progress indicator and will proceed automatically once it has read every frame.</p>\n</div><p></p><h2 id=\"h_01GFRJ0EZWV9Y139NYJQ52T59H\">Receive Bitcoin</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Select your newly created watch-only wallet and tap <strong>Receive</strong>.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Navigate to\u00a0<strong>Scan QR</strong> on Jade Plus and <strong>point</strong> its camera at your BlueWallet Bitcoin <a href=\"https://glossary.blockstream.com/address-bitcoin/\" rel=\"noopener noreferrer\" target=\"_blank\">address</a> QR code.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Once the address is recognized by Jade Plus, <strong>confirm</strong> it matches the address shown on BlueWallet and select <strong>Yes</strong> to continue. <span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">Jade Plus will <strong>check</strong> if the address does indeed belong to your wallet.</span></p>\n</div><p> </p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">After the address is verified, <strong>share</strong> it with the sender to receive your funds.</p>\n</div><blockquote class=\"note\"><p><strong>Note:</strong> If Jade Plus is unable to verify your address, this does <strong>not</strong> necessarily mean there is malicious activity involved. Make sure to review our <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/verify-receive-addresses-with-an-air-gapped-jade-plus#entry:938@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">address verification guide</a> for more tips on how this process works and common troubleshooting steps.</p></blockquote><p></p><h2 id=\"h_01GFRJ0KGQKSYY30PCQP0YXWMH\">Send Bitcoin</h2><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\">Select your wallet and tap <strong>Send</strong>. Enter the recipient's <strong>address</strong> and <strong>amount</strong>, then choose <strong>Next</strong> to display the Partially Signed Bitcoin Transaction (PSBT) as an animated QR code.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Select\u00a0<strong>Scan QR</strong> on your Jade Plus and <strong>point</strong> the camera at the QR PSBT. If the QR code is animated, Jade will need to capture every frame that is displayed to continue.</p>\n</div><blockquote><p><strong>Tip:</strong> The progress bar will fill up as you successfully scan new frames. If the progress bar is not updating, change Jade Plus's angle or distance from the QR until you find the optimal placement for scanning. <a href=\"https://help.blockstream.com/blockstream-jade/troubleshooting/fix-issues-scanning-qr-codes#entry:653@1:url\" rel=\"noopener noreferrer\" target=\"_blank\">View more scanning tips</a>.</p></blockquote><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Once Jade Plus has successfully read the PSBT, it will display the transaction details on your device for you to <strong>review</strong> and <strong>confirm</strong>.</p>\n</div><p> </p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">Jade Plus will then <strong>display</strong> your signed transaction as a series of QR codes. <strong>Scan</strong> the Jade Plus screen with BlueWallet until all frames have been captured.</p>\n</div><p></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">After BlueWallet has successfully scanned the signed transaction, select <strong>Send Now</strong> to broadcast it to the network.</p>\n</div><p></p>"}, "jade__use-jade-with-nunchuk-honey-badger-wallet": {"title": "Use Jade with Nunchuk Honey Badger wallet", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p>Jade is a supported device for <a href=\"https://nunchuk.io/pricing\" target=\"_blank\" rel=\"noopener noreferrer\">Nunchuk's Honey Badger assisted wallet</a>, which allows for seamless multisig onboarding with additional features such as inheritance planning, emergency lockdowns, and granular control over spending.</p><div class=\"num-list-custom\"><p class=\"num-list-text\">Prior to setup, <a href=\"https://jadefw.blockstream.com/upgrade/fwupgrade.html\" target=\"_blank\" rel=\"noopener noreferrer\">upgrade Jade</a> to 0.1.42 or greater. Then <a style=\"background-color:#ffffff;font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" href=\"https://nunchuk.io/\" target=\"_blank\" rel=\"noopener noreferrer\">download</a> Nunchuk<span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\"> for your mobile device, </span><a style=\"background-color:#ffffff;font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" href=\"https://nunchuk.io/pricing\" target=\"_blank\" rel=\"noopener noreferrer\">sign up for a Honey Badger plan</a>, <span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">and login to your account on the Nunchuk app.</span></p></div><div class=\"num-list-custom\">\n<p class=\"num-list\">1.</p>\n<p class=\"num-list-text\"><strong>Start the setup wizard</strong> and follow the prompts to begin the creation of your Honey Badger wallet.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14822139327897.png\" alt=\"1.png\" width=\"400\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">2.</p>\n<p class=\"num-list-text\">Continue to the add key section and choose to <strong>add a hardware key</strong> after setting up your TAPSIGNER. Select to use an <strong>air-gapped</strong> device.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14822363805593.png\" alt=\"2.png\" width=\"400\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">3.</p>\n<p class=\"num-list-text\">Nunchuk will prompt you to initialize your hardware key and unlock the device. At this point, turn on your Jade and <strong>unlock it via PIN or by </strong><a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-plus-air-gapped-with-seedqr#entry:765@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>scanning a SeedQR</strong></a>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14823116713753.png\" alt=\"4.png\" width=\"306\" /><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14823141910169.png\" alt=\"5.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">4.</p>\n<p class=\"num-list-text\">On Jade, Navigate to <strong>Options</strong> \u2192 <strong>Wallet</strong> \u2192 <strong>Export Xpub.</strong></p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14823222481689.png\" alt=\"6.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/55341849732377.png\" alt=\"3.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">5.</p>\n<p class=\"num-list-text\">The default option that will be displayed for Export Xpub is <strong>Singlesig</strong> - m/84'/0'/0'. You will need to change this path to <strong>Native Segwit Multisig</strong> - m/48'/0'/0'/2' by selecting <strong>Options</strong>, then toggling the <strong>Wallet</strong>&nbsp;setting until it displays Multisig. Use the back button and confirm that your xpub path now shows <strong>m/48'/0'/0'/2'</strong>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14823959981465.png\" alt=\"7.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14823943297817.png\" alt=\"8.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">6.</p>\n<p class=\"num-list-text\">Return to the Nunchuk app and add your air-gapped Jade key by tapping <strong>Scan QR</strong> and pointing your phone's camera at Jade's screen while it is showing your Xpub. Hold this position until Nunchuk has successfully scanned every QR frame.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14824243836441.png\" alt=\"10.png\" width=\"400\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">7.</p>\n<p class=\"num-list-text\">After Nunchuk has captured your xpub, the camera will close and your key spec will be displayed. Choose <strong>Add key</strong> to confirm, then <strong>Add</strong> your next Hardware key. If you are using a second Jade for Hardware key #3, simply repeat the instructions above.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14824388441369.png\" alt=\"11.png\" width=\"400\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">8.</p>\n<p class=\"num-list-text\">Continue through the setup wizard to add your platform key and provide security questions. Then, you'll be prompted to register your multisig configuration on Jade for additional security. Tap <strong>Show wallet QR code</strong> and select the <strong>Jade</strong> format.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14843958238617.png\" alt=\"12.png\" width=\"400\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">9.</p>\n<p class=\"num-list-text\">Select the <strong>Scan</strong> button on Jade's home screen and point the camera at the QR codes until the progress bar is filled.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14844081192473.png\" alt=\"13.png\" width=\"400\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">10.</p>\n<p class=\"num-list-text\">Once scanned, Jade will display the details of your multisig configuration for confirmation on your device. After review, select to <strong>register the multisig</strong>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14844288309529.png\" alt=\"14.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14844288309657.png\" alt=\"15.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">11.</p>\n<p class=\"num-list-text\">In order to proceed with your Honey Badger wallet setup, Nunchuk will now ask you to sign two \"dummy\" transactions using two of your hardware keys. To use Jade for one of these signatures, tap <strong>Sign</strong>, <strong>Export Transaction</strong>, then choose the <strong>Jade format</strong>.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14844378164761.png\" alt=\"16.png\" width=\"250\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">12.</p>\n<p class=\"num-list-text\">Select the <strong>Scan</strong> button on Jade's home screen and point the camera at the QR codes until the progress bar is filled.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14844556104729.png\" alt=\"17.png\" width=\"400\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">13.</p>\n<p class=\"num-list-text\"><strong>Confirm</strong> the \"dummy\" transaction details in order to sign it.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/55341849732633.png\" alt=\"txconf.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/55341849733145.png\" alt=\"fee.png\" width=\"306\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">14.</p>\n<p class=\"num-list-text\">Jade will then display the signed transaction on it's display as QR codes. Tap <strong>Import Signature</strong> on Nunchuk and point the camera at your Jade's screen until all QR frames are captured and Nunchuk proceeds to the next screen.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14844723699993.png\" alt=\"18.png\" width=\"400\" /></p><div class=\"num-list-custom\">\n<p class=\"num-list\">15.</p>\n<p class=\"num-list-text\">After you have signed both dummy transactions, you may continue through the setup wizard until the process is complete. Congratulations! Your Jade is now set up as a hardware key with your Honey Badger assisted wallet and you may begin receiving and sending bitcoin.</p>\n</div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-nunchuk-honey-badger-wallet/14844820167449.png\" alt=\"19.png\" width=\"250\" /></p>"}, "jade__use-jade-qr-scan-with-sparrow": {"title": "Use Jade QR Scan with Sparrow", "cat": "Blockstream Jade", "section": "Use Jade with Third-Party Apps", "html": "<p><a href=\"https://sparrowwallet.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Sparrow</a> is a Bitcoin wallet that supports <a href=\"https://help.blockstream.com/blockstream-jade/faqs/blockstream-jade-vs-blockstream-app#entry:560@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">Blockstream Jade</a> and features an emphasis on security, privacy and usability. The following guide covers using Jade with Sparrow in a <strong>fully air-gapped</strong> manner, however a <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-with-third-party-apps/use-jade-with-sparrow#entry:1049@1:url\">connection via USB</a> is also supported.</p><blockquote class=\"note\"><p><strong>Note:</strong> QR mode supports Bitcoin transactions only. Liquid is not supported via QR.</p></blockquote><ul><li data-list-item-id=\"e16dcd42ebe2233a70974f1e00ddca059\"><a href=\"#h_01GGG2CWPHS2WEPW60HWKEHV0N\">Setup Wallet</a></li><li data-list-item-id=\"e98f3a05e876828b14e13d9053ef15c66\"><a href=\"https://help.blockstream.com/hc/en-us/articles/11243167612697\" target=\"_blank\" rel=\"noopener noreferrer\">Receive</a></li><li data-list-item-id=\"e60790e0fe51483f7086869c363107891\"><a href=\"#h_01GGG2DAMDQ3QRGYRET2KRTQPW\">Send</a></li></ul><h2 id=\"h_01KHY9V9G0PSMZZ7D90W6T2K6S\">Pre-requisites</h2><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Prepare Jade for <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/seedqr-vs-qr-pin-unlock#entry:549@1:url\" target=\"_blank\" rel=\"noopener noreferrer\">QR Mode</a>.</p></div><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\"><a href=\"https://sparrowwallet.com/\" target=\"_blank\" rel=\"noopener noreferrer\">Download Sparrow</a>.</p></div><h2 id=\"h_01GGG2CWPHS2WEPW60HWKEHV0N\">Setup</h2><div class=\"num-list-custom\"><p class=\"num-list\">1.</p><p class=\"num-list-text\">Unlock Blockstream Jade, ideally by <a href=\"https://help.blockstream.com/blockstream-jade/use-jade-air-gapped/access-jade-plus-air-gapped-with-seedqr#entry:765@1:url\" target=\"_blank\" rel=\"noopener noreferrer\"><strong>accessing QR mode</strong></a>.</p></div><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/55341715244569.png\" alt=\"connect.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/55341715244825.png\" alt=\"menuqrmode.png\" width=\"306\" /></p><div class=\"num-list-custom\"><p class=\"num-list\">2.</p><p class=\"num-list-text\">Navigate to <strong>Options</strong>, <strong>Wallet</strong>&nbsp;and select <strong>Xpub Export</strong>. Jade will then display your xpub as an animated QR code.</p></div><blockquote class=\"note\"><p><strong>Note:</strong> The default xpub shown is for singlesig, Native SegWit wallets. If you would like, you may change the path to Nested SegWit (m/49'/0'/0') by selecting <strong>Options</strong>.</p></blockquote><p><img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/55341673315609.png\" alt=\"3.png\" width=\"306\" /> <img src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/55341715245209.png\" alt=\"4.png\" width=\"306\" /></p><div class=\"num-list-custom\"><p class=\"num-list-text\"><span style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\">3. </span>Open Sparrow and create a new wallet. Choose the <strong>policy type</strong> and <strong>script type</strong> that matches the xpub shown on Jade, then select <strong>Airgapped Hardware Wallet</strong>.</p></div><p><img style=\"font-family:'-apple-system', BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\" src=\"https://storage.googleapis.com/dxp-staging-assets/content/blockstream-jade/use-jade-with-third-party-apps/use-jade-qr-scan-with-sparrow/11891398486169.png\" alt=\"1.png\" /></p><div class=\"num-list-custom\"><p class=\"num-list\">4.</p><p class=\"num-list-text\">Locate Jade in the list of devices and click <strong>Scan</strong>. Sparrow will then turn on your webcam which you can use to scan the xpub QR displayed on Jade. If you <strong>do not see</strong> J
